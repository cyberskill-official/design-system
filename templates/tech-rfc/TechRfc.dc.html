<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Tech · RFC / design doc" description="CyberSkill technical design doc — status, context, proposal, trade-offs, and rollout. Honest about trade-offs by default. Bilingual (English · Tiếng Việt)." -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>
<div data-theme="{{ rootTheme }}" lang="{{ langAttr }}" data-cs-element="{{ elAttr }}" data-cs-variant="{{ vaAttr }}" data-cs-expression="{{ exAttr }}" style="background:var(--cs-color-surface-raised);min-height:100vh;padding:40px 16px;font-family:var(--cs-font-family-ui);color:var(--cs-color-text-primary)">
  <div style="max-width:820px;margin:0 auto;background:var(--cs-color-surface-panel);border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);box-shadow:var(--cs-shadow-sm);overflow:hidden">
    <header style="background:var(--cs-accent-strong);color:#fff;padding:26px 48px;display:flex;align-items:center;gap:12px">
      <x-import component-from-global-scope="CyberSkillDS.Logo" size="28" hint-size="28px,28px"></x-import>
      <span style="font-weight:800;font-size:16px">CyberSkill · RFC</span>
      <span style="margin-left:auto"><x-import component-from-global-scope="CyberSkillDS.Badge" variant="ochre" hint-size="90px,22px">{{ badge }}</x-import></span>
    </header>
    <div style="padding:40px 48px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--cs-color-text-accent);font-family:var(--cs-font-family-mono)">{{ kicker }}</div>
      <h1 style="font-size:30px;font-weight:800;letter-spacing:-0.02em;margin:8px 0 18px">{{ h1 }}</h1>
      <dl style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px 24px;margin:0 0 26px">
        <div><dt style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--cs-color-text-muted)">{{ dtAuthor }}</dt><dd style="margin:2px 0 0;font-size:14px">An Le</dd></div>
        <div><dt style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--cs-color-text-muted)">{{ dtRev }}</dt><dd style="margin:2px 0 0;font-size:14px">Bảo, Chi</dd></div>
        <div><dt style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--cs-color-text-muted)">{{ dtStatus }}</dt><dd style="margin:2px 0 0;font-size:14px">{{ ddStatus }}</dd></div>
        <div><dt style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--cs-color-text-muted)">{{ dtTarget }}</dt><dd style="margin:2px 0 0;font-size:14px">v1.7.0</dd></div>
      </dl>

      <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0 0 8px">{{ ctxH }}</h2>
      <p style="font-size:15px;line-height:1.7;margin:0 0 22px">{{ ctxP }}</p>

      <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0 0 10px">{{ propH }}</h2>
      <div style="margin:0 0 22px">
        <x-import component-from-global-scope="CyberSkillDS.CodeBlock" filename="pipeline" code="{{ code }}" hint-size="100%,120px"></x-import>
      </div>

      <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0 0 10px">{{ toH }}</h2>
      <div style="display:grid;gap:10px;margin-bottom:24px">
        <x-import component-from-global-scope="CyberSkillDS.Alert" variant="success" title="{{ gainsT }}" hint-size="100%,72px">{{ gainsB }}</x-import>
        <x-import component-from-global-scope="CyberSkillDS.Alert" variant="warning" title="{{ costsT }}" hint-size="100%,72px">{{ costsB }}</x-import>
      </div>

      <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0 0 12px">{{ rollH }}</h2>
      <x-import component-from-global-scope="CyberSkillDS.Steps" steps="{{ steps }}" current="{{ 1 }}" hint-size="100%,90px"></x-import>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;language&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;English&quot;,&quot;Tiếng Việt&quot;],&quot;default&quot;:&quot;English&quot;,&quot;tsType&quot;:&quot;\&quot;English\&quot; | \&quot;Tiếng Việt\&quot;&quot;,&quot;section&quot;:&quot;Content&quot;},
  &quot;element&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Thổ · studio&quot;,&quot;Thổ · clay&quot;,&quot;Thổ · sand&quot;,&quot;Hỏa · ember&quot;,&quot;Hỏa · lava&quot;,&quot;Hỏa · plasma&quot;,&quot;Thủy · river&quot;,&quot;Thủy · ocean&quot;,&quot;Thủy · mist&quot;,&quot;Mộc · leaf&quot;,&quot;Mộc · bamboo&quot;,&quot;Mộc · forest&quot;,&quot;Kim · champagne&quot;,&quot;Kim · steel&quot;,&quot;Kim · titanium&quot;],&quot;default&quot;:&quot;Thổ · studio&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Element (Ngũ Hành)&quot;},
  &quot;expression&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Liquid glass · default&quot;,&quot;Solid&quot;,&quot;Dense&quot;,&quot;Paper&quot;,&quot;Soft&quot;,&quot;Bold&quot;,&quot;Luxe&quot;],&quot;default&quot;:&quot;Liquid glass · default&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Expression&quot;},
  &quot;theme&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;\&quot;light\&quot; | \&quot;dark\&quot;&quot;,&quot;section&quot;:&quot;Theme&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const EX = {"Liquid glass · default":"","Solid":"solid","Dense":"dense","Paper":"paper","Soft":"soft","Bold":"bold","Luxe":"luxe"};
    const exAttr = EX[this.props.expression] ?? "";
    const EL = {"Thổ · studio":["tho",""],"Thổ · clay":["tho","clay"],"Thổ · sand":["tho","sand"],"Hỏa · ember":["hoa",""],"Hỏa · lava":["hoa","lava"],"Hỏa · plasma":["hoa","plasma"],"Thủy · river":["thuy",""],"Thủy · ocean":["thuy","ocean"],"Thủy · mist":["thuy","mist"],"Mộc · leaf":["moc",""],"Mộc · bamboo":["moc","bamboo"],"Mộc · forest":["moc","forest"],"Kim · champagne":["kim",""],"Kim · steel":["kim","steel"],"Kim · titanium":["kim","titanium"]};
    const [elAttr, vaAttr] = EL[this.props.element] || EL["Thổ · studio"];
    const code = "tokens.tokens.json  →  style-dictionary\n   ├─ css   (--cs-*)\n   ├─ ts / swift / kotlin\n   └─ flutter + provenance.json";
    const vn = this.props.language === "Tiếng Việt";
    const en = {
      badge:"In review", kicker:"RFC-041 · Platform", h1:"Token pipeline: multi-target export",
      dtAuthor:"Author", dtRev:"Reviewers", dtStatus:"Status", ddStatus:"In review", dtTarget:"Target",
      ctxH:"Context",
      ctxP:"Design tokens ship as CSS today. Native (Swift/Kotlin) and Flutter teams hand-copy values, which drifts. We propose one DTCG source compiling to every target with provenance.",
      propH:"Proposal", toH:"Trade-offs",
      gainsT:"Gains", gainsB:"Single source of truth; provenance JSON per token; no hand-copying across platforms.",
      costsT:"Costs (honest)", costsB:"A new build step and DTCG learning curve. Migrating 159 tokens is ~1 sprint of careful work.",
      rollH:"Rollout",
      steps: [ { title:"RFC approved" }, { title:"Pilot: colors" }, { title:"All 159 tokens" }, { title:"Deprecate hand-copy" } ],
    };
    const vi = {
      badge:"Đang rà soát", kicker:"RFC-041 · Nền tảng", h1:"Đường ống token: xuất đa nền tảng",
      dtAuthor:"Tác giả", dtRev:"Người rà soát", dtStatus:"Trạng thái", ddStatus:"Đang rà soát", dtTarget:"Mục tiêu",
      ctxH:"Bối cảnh",
      ctxP:"Hôm nay token thiết kế chỉ xuất ra CSS. Các đội native (Swift/Kotlin) và Flutter phải chép tay giá trị, dẫn đến sai lệch. Chúng tôi đề xuất một nguồn DTCG duy nhất biên dịch ra mọi nền tảng kèm nguồn gốc.",
      propH:"Đề xuất", toH:"Đánh đổi",
      gainsT:"Được gì", gainsB:"Một nguồn sự thật duy nhất; JSON nguồn gốc cho mỗi token; không còn chép tay giữa các nền tảng.",
      costsT:"Mất gì (thẳng thắn)", costsB:"Thêm một bước build và thời gian làm quen DTCG. Chuyển đổi 159 token tốn khoảng một sprint làm cẩn thận.",
      rollH:"Triển khai",
      steps: [ { title:"Duyệt RFC" }, { title:"Thử nghiệm: màu" }, { title:"Toàn bộ 159 token" }, { title:"Ngừng chép tay" } ],
    };
    return Object.assign({ langAttr: (this.props.language ?? "English") === "Tiếng Việt" ? "vi" : "en", exAttr, elAttr, vaAttr, code, rootTheme: this.props.theme === "dark" ? "dark" : "" }, vn ? vi : en);
  }
}
</script>
</body>
</html>
