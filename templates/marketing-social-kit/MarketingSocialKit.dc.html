<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Marketing · Social post kit" description="CyberSkill social canvases — 1080×1080 square, 1200×630 link card, 1080×1920 story. Element wash + slogan lockups; bilingual (English · Tiếng Việt); snapshot each canvas to export." -->
<helmet>
<script src="./ds-base.js"></script>
<script src="../../image-slot.js"></script>
</helmet>
<div lang="{{ langAttr }}" data-cs-element="{{ elAttr }}" data-cs-variant="{{ vaAttr }}" data-cs-expression="{{ exAttr }}" class="cs-canvas-desk" style="background:#2a1a0d;padding:28px;font-family:var(--cs-font-family-ui);display:grid;gap:28px;justify-items:center">

  <div id="square" style="width:1080px;height:1080px;position:relative;overflow:hidden;background:var(--cs-accent-ink);color:#fff;display:flex;flex-direction:column;justify-content:center;padding:0 96px;box-sizing:border-box;box-shadow:var(--cs-shadow-xl)">
    <image-slot id="cs-social-square" shape="rect" placeholder="Drop a brand image" style="position:absolute;inset:0"></image-slot>
    <div class="cs-aurora-wash" style="position:absolute;inset:0;opacity:0.55;pointer-events:none"></div>
    <div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(42,26,13,0.58),rgba(42,26,13,0.44))"></div>
    <div style="position:relative;display:flex;align-items:center;gap:16px;margin-bottom:44px">
      <x-import component-from-global-scope="CyberSkillDesignSystem_847b3c.Logo" size="56" hint-size="56px,56px"></x-import>
      <span style="font-weight:800;font-size:28px;letter-spacing:-0.01em">CyberSkill</span>
    </div>
    <div style="position:relative;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--cs-accent-bright)">{{ sqKicker }}</div>
    <div style="position:relative;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.06;margin:18px 0 16px">Turn Your Will<br>Into Real</div>
    <div style="position:relative;font-size:30px;opacity:0.9">Hiện Thực Hoá Ý Chí</div>
    <div style="position:relative;margin-top:52px"><span style="display:inline-block;background:var(--cs-accent-bright);color:var(--cs-accent-on);font-weight:700;font-size:26px;padding:20px 40px;border-radius:var(--cs-radius-full)">cyberskill.world</span></div>
  </div>

  <div id="linkcard" style="width:1200px;height:630px;position:relative;overflow:hidden;background:var(--cs-accent-ink);color:#fff;display:flex;align-items:center;box-sizing:border-box;box-shadow:var(--cs-shadow-xl)">
    <image-slot id="cs-social-link" shape="rect" placeholder="Drop a brand image" style="position:absolute;inset:0"></image-slot>
    <div class="cs-aurora-wash" style="position:absolute;inset:0;opacity:0.5;pointer-events:none"></div>
    <div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(42,26,13,0.72),rgba(42,26,13,0.4))"></div>
    <div style="position:relative;padding:0 88px;max-width:820px">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:30px">
        <x-import component-from-global-scope="CyberSkillDesignSystem_847b3c.Logo" size="44" hint-size="44px,44px"></x-import>
        <span style="font-weight:800;font-size:23px">CyberSkill</span>
      </div>
      <div style="font-size:52px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;margin-bottom:16px">{{ lcLine1 }}<br><span style="color:var(--cs-accent-bright)">{{ lcLine2 }}</span></div>
      <div style="font-size:22px;opacity:0.85">{{ lcSub }}</div>
    </div>
  </div>

  <div id="story" style="width:1080px;height:1920px;position:relative;overflow:hidden;background:var(--cs-accent-ink);color:#fff;display:flex;flex-direction:column;justify-content:center;padding:0 100px;box-sizing:border-box;box-shadow:var(--cs-shadow-xl)">
    <image-slot id="cs-social-story" shape="rect" placeholder="Drop a brand image" style="position:absolute;inset:0"></image-slot>
    <div class="cs-aurora-wash" style="position:absolute;inset:0;opacity:0.55;pointer-events:none"></div>
    <div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(42,26,13,0.58),rgba(42,26,13,0.46))"></div>
    <div style="position:relative;display:flex;align-items:center;gap:16px;margin-bottom:60px">
      <x-import component-from-global-scope="CyberSkillDesignSystem_847b3c.Logo" size="60" hint-size="60px,60px"></x-import>
      <span style="font-weight:800;font-size:30px">CyberSkill</span>
    </div>
    <div style="position:relative;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--cs-accent-bright)">{{ stKicker }}</div>
    <div style="position:relative;font-size:88px;font-weight:800;letter-spacing:-0.02em;line-height:1.05;margin:22px 0 20px">{{ stLine1 }}<br>{{ stLine2 }}</div>
    <div style="position:relative;font-size:32px;opacity:0.9;line-height:1.4;max-width:760px">{{ stSub }}</div>
    <div style="position:relative;margin-top:70px"><span style="display:inline-block;background:var(--cs-accent-bright);color:var(--cs-accent-on);font-weight:700;font-size:28px;padding:22px 44px;border-radius:var(--cs-radius-full)">join@cyberskill.world ↑</span></div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;language&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;English&quot;,&quot;Tiếng Việt&quot;],&quot;default&quot;:&quot;English&quot;,&quot;tsType&quot;:&quot;\&quot;English\&quot; | \&quot;Tiếng Việt\&quot;&quot;,&quot;section&quot;:&quot;Content&quot;},
  &quot;element&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Thổ · studio&quot;,&quot;Thổ · clay&quot;,&quot;Thổ · sand&quot;,&quot;Hỏa · ember&quot;,&quot;Hỏa · lava&quot;,&quot;Hỏa · plasma&quot;,&quot;Thủy · river&quot;,&quot;Thủy · ocean&quot;,&quot;Thủy · mist&quot;,&quot;Mộc · leaf&quot;,&quot;Mộc · bamboo&quot;,&quot;Mộc · forest&quot;,&quot;Kim · champagne&quot;,&quot;Kim · steel&quot;,&quot;Kim · titanium&quot;],&quot;default&quot;:&quot;Thổ · studio&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Element (Ngũ Hành)&quot;},
  &quot;expression&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Liquid glass · default&quot;,&quot;Solid&quot;,&quot;Dense&quot;,&quot;Paper&quot;,&quot;Soft&quot;,&quot;Bold&quot;,&quot;Luxe&quot;],&quot;default&quot;:&quot;Liquid glass · default&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Expression&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const EL = {"Thổ · studio":["tho",""],"Thổ · clay":["tho","clay"],"Thổ · sand":["tho","sand"],"Hỏa · ember":["hoa",""],"Hỏa · lava":["hoa","lava"],"Hỏa · plasma":["hoa","plasma"],"Thủy · river":["thuy",""],"Thủy · ocean":["thuy","ocean"],"Thủy · mist":["thuy","mist"],"Mộc · leaf":["moc",""],"Mộc · bamboo":["moc","bamboo"],"Mộc · forest":["moc","forest"],"Kim · champagne":["kim",""],"Kim · steel":["kim","steel"],"Kim · titanium":["kim","titanium"]};
    const [elAttr, vaAttr] = EL[this.props.element] || EL["Thổ · studio"];
    const EX = {"Liquid glass · default":"","Solid":"solid","Dense":"dense","Paper":"paper","Soft":"soft","Bold":"bold","Luxe":"luxe"};
    const vn = this.props.language === "Tiếng Việt";
    const en = { sqKicker:"Make a wish", lcLine1:"A wish in one sentence.", lcLine2:"Software that lasts.", lcSub:"Senior Saigon studio · honest about trade-offs · EN·VN", stKicker:"Hiring · Saigon", stLine1:"Build things", stLine2:"that last", stSub:"Senior Product Engineer · Platform squad · Tiếng Việt · English" };
    const vi = { sqKicker:"Gửi điều ước", lcLine1:"Một điều ước, một câu.", lcLine2:"Phần mềm bền lâu.", lcSub:"Studio Sài Gòn cấp cao · thành thật về đánh đổi · EN·VN", stKicker:"Tuyển dụng · Sài Gòn", stLine1:"Làm những thứ", stLine2:"bền lâu", stSub:"Kỹ sư sản phẩm cấp cao · nhóm Platform · Tiếng Việt · English" };
    return Object.assign({ langAttr: (this.props.language ?? "English") === "Tiếng Việt" ? "vi" : "en", elAttr, vaAttr, exAttr: EX[this.props.expression] ?? "" }, vn ? vi : en);
  }
}
</script>
</body>
</html>
