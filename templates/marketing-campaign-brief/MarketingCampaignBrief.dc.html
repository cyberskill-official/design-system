<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Marketing · Campaign brief" description="CyberSkill campaign brief — objective, audience, message, channels, timeline, and success metrics. Bilingual (English · Tiếng Việt). Document-style page." -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>
<div data-theme="{{ rootTheme }}" lang="{{ langAttr }}" data-cs-element="{{ elAttr }}" data-cs-variant="{{ vaAttr }}" data-cs-expression="{{ exAttr }}" style="background:var(--cs-color-surface-raised);min-height:100vh;padding:40px 16px;font-family:var(--cs-font-family-ui);color:var(--cs-color-text-primary)">
  <div style="max-width:860px;margin:0 auto;background:var(--cs-color-surface-panel);border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);box-shadow:var(--cs-shadow-sm);overflow:hidden">
    <header style="background:var(--cs-accent-ink);color:#fff;padding:28px 52px;display:flex;align-items:center;gap:12px">
      <x-import component-from-global-scope="CyberSkillDS.Logo" size="28" hint-size="28px,28px"></x-import>
      <span style="font-weight:800;font-size:16px">CyberSkill · {{ hdr }}</span>
      <span style="margin-left:auto"><x-import component-from-global-scope="CyberSkillDS.Badge" variant="ochre" hint-size="80px,22px">{{ draft }}</x-import></span>
    </header>
    <div style="padding:40px 52px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--cs-color-text-accent)">{{ eyebrow }}</div>
      <h1 style="font-size:30px;font-weight:800;letter-spacing:-0.02em;margin:8px 0 22px">{{ h1 }}</h1>

      <div style="background:var(--cs-color-surface-raised);border-left:4px solid var(--cs-accent);border-radius:var(--cs-radius-md);padding:16px 20px;margin-bottom:26px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cs-color-text-muted);font-weight:700;margin-bottom:4px">{{ objL }}</div>
        <p style="margin:0;font-size:16px;line-height:1.6;font-weight:600">{{ objP }}</p>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:26px">
        <div><h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cs-color-text-muted);margin:0 0 8px">{{ audL }}</h2><p style="font-size:15px;line-height:1.6;margin:0">{{ audP }}</p></div>
        <div><h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cs-color-text-muted);margin:0 0 8px">{{ msgL }}</h2><p style="font-size:15px;line-height:1.6;margin:0">{{ msgP }}</p></div>
      </div>

      <h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cs-color-text-muted);margin:0 0 10px">{{ chL }}</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px">
        <span class="cs-tag">{{ ch1 }}</span><span class="cs-tag">{{ ch2 }}</span><span class="cs-tag">LinkedIn</span><span class="cs-tag">{{ ch4 }}</span><span class="cs-tag">{{ ch5 }}</span>
      </div>

      <h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cs-color-text-muted);margin:0 0 12px">{{ tlL }}</h2>
      <div style="margin-bottom:26px">
        <x-import component-from-global-scope="CyberSkillDS.Steps" steps="{{ steps }}" current="{{ 1 }}" hint-size="100%,90px"></x-import>
      </div>

      <h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cs-color-text-muted);margin:0 0 14px">{{ smL }}</h2>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px">
        <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ m1 }}" value="+40%" trend="up" delta="{{ m1d }}" hint-size="150px,72px"></x-import>
        <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ m2 }}" value="120" trend="up" delta="Q4" hint-size="150px,72px"></x-import>
        <x-import component-from-global-scope="CyberSkillDS.Stat" label="CAC" value="−15%" trend="up" delta="{{ m3d }}" hint-size="150px,72px"></x-import>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;language&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;English&quot;,&quot;Tiếng Việt&quot;],&quot;default&quot;:&quot;English&quot;,&quot;tsType&quot;:&quot;\&quot;English\&quot; | \&quot;Tiếng Việt\&quot;&quot;,&quot;section&quot;:&quot;Content&quot;},
  &quot;element&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Thổ · studio&quot;,&quot;Thổ · clay&quot;,&quot;Thổ · sand&quot;,&quot;Hỏa · ember&quot;,&quot;Hỏa · lava&quot;,&quot;Hỏa · plasma&quot;,&quot;Thủy · river&quot;,&quot;Thủy · ocean&quot;,&quot;Thủy · mist&quot;,&quot;Mộc · leaf&quot;,&quot;Mộc · bamboo&quot;,&quot;Mộc · forest&quot;,&quot;Kim · champagne&quot;,&quot;Kim · steel&quot;,&quot;Kim · titanium&quot;],&quot;default&quot;:&quot;Thổ · studio&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Element (Ngũ Hành)&quot;},
  &quot;expression&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Liquid glass · default&quot;,&quot;Solid&quot;,&quot;Dense&quot;,&quot;Paper&quot;,&quot;Soft&quot;,&quot;Bold&quot;,&quot;Luxe&quot;],&quot;default&quot;:&quot;Liquid glass · default&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Expression&quot;},
  &quot;theme&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;\&quot;light\&quot; | \&quot;dark\&quot;&quot;,&quot;section&quot;:&quot;Theme&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const EX = {"Liquid glass · default":"","Solid":"solid","Dense":"dense","Paper":"paper","Soft":"soft","Bold":"bold","Luxe":"luxe"};
    const exAttr = EX[this.props.expression] ?? "";
    const EL = {"Thổ · studio":["tho",""],"Thổ · clay":["tho","clay"],"Thổ · sand":["tho","sand"],"Hỏa · ember":["hoa",""],"Hỏa · lava":["hoa","lava"],"Hỏa · plasma":["hoa","plasma"],"Thủy · river":["thuy",""],"Thủy · ocean":["thuy","ocean"],"Thủy · mist":["thuy","mist"],"Mộc · leaf":["moc",""],"Mộc · bamboo":["moc","bamboo"],"Mộc · forest":["moc","forest"],"Kim · champagne":["kim",""],"Kim · steel":["kim","steel"],"Kim · titanium":["kim","titanium"]};
    const [elAttr, vaAttr] = EL[this.props.element] || EL["Thổ · studio"];
    const vn = this.props.language === "Tiếng Việt";
    const en = {
      hdr:"Campaign brief", draft:"Draft", eyebrow:"Q4 2026 · Growth", h1:"\u201cMake a wish\u201d launch campaign",
      objL:"Objective", objP:"Grow qualified \u201cwish\u201d submissions 40% in Q4 by telling one clear story: a wish, granted by a real team.",
      audL:"Audience", audP:"Founders & product leads at Vietnamese SMEs and regional scale-ups who need software shipped — bilingual EN/VN.",
      msgL:"Core message", msgP:"Turn Your Will Into Real. Tell us a wish; Lumi and a real team make it software you run.",
      chL:"Channels", ch1:"Landing page", ch2:"Email", ch4:"Founder events", ch5:"Referral",
      tlL:"Timeline", smL:"Success metrics", m1:"Wish submissions", m1d:"target", m2:"Qualified leads", m3d:"vs Q3",
      steps:[{title:"Brief & assets"},{title:"Soft launch"},{title:"Paid push"},{title:"Report"}],
    };
    const vi = {
      hdr:"Bản brief chiến dịch", draft:"Bản nháp", eyebrow:"Q4 2026 · Tăng trưởng", h1:"Chiến dịch ra mắt \u201cGửi điều ước\u201d",
      objL:"Mục tiêu", objP:"Tăng 40% số \u201cđiều ước\u201d đạt chuẩn trong Q4 bằng một câu chuyện rõ ràng: một điều ước, được một đội ngũ thật thực hiện.",
      audL:"Đối tượng", audP:"Nhà sáng lập & trưởng sản phẩm tại các SME Việt Nam và scale-up khu vực cần đưa phần mềm ra thị trường — song ngữ EN/VN.",
      msgL:"Thông điệp cốt lõi", msgP:"Hiện Thực Hoá Ý Chí. Kể cho chúng tôi một điều ước; Lumi và một đội ngũ thật biến nó thành phần mềm bạn vận hành.",
      chL:"Kênh", ch1:"Landing page", ch2:"Email", ch4:"Sự kiện nhà sáng lập", ch5:"Giới thiệu",
      tlL:"Tiến độ", smL:"Chỉ số thành công", m1:"Điều ước gửi về", m1d:"mục tiêu", m2:"Lead đạt chuẩn", m3d:"so với Q3",
      steps:[{title:"Brief & tư liệu"},{title:"Ra mắt nhẹ"},{title:"Đẩy quảng cáo"},{title:"Báo cáo"}],
    };
    return Object.assign({ langAttr: (this.props.language ?? "English") === "Tiếng Việt" ? "vi" : "en", elAttr, vaAttr, exAttr, rootTheme: this.props.theme === "dark" ? "dark" : "" }, vn ? vi : en);
  }
}
</script>
</body>
</html>
