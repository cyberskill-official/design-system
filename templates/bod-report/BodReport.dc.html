<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="omelette-owns-print" content="1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Board · Quarterly report" description="CyberSkill board business review — KPI stats, highlights, portfolio table, risks, and an AI-assisted disclosure. Document-style page. Bilingual (English · Tiếng Việt)." -->
<helmet>
<script src="./ds-base.js"></script>
<style>@page{size:letter;margin:0.6in}@media print{html,body{background:#fff!important}.cs-desk{background:#fff!important;padding:0!important;min-height:0!important}.cs-sheet{box-shadow:none!important;border:none!important;max-width:none!important;border-radius:0!important}.cs-avoid{break-inside:avoid}}</style>
</helmet>
<div lang="{{ langAttr }}" data-cs-element="{{ elAttr }}" data-cs-variant="{{ vaAttr }}" data-cs-expression="{{ exAttr }}" class="cs-desk" style="background:var(--cs-color-surface-raised);min-height:100vh;padding:40px 16px;font-family:var(--cs-font-family-ui);color:var(--cs-color-text-primary)">
  <div class="cs-sheet" style="max-width:880px;margin:0 auto;background:var(--cs-color-surface-panel);border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);box-shadow:var(--cs-shadow-sm);overflow:hidden">
    <header style="background:var(--cs-accent-strong);color:#fff;padding:30px 52px;display:flex;align-items:center;gap:12px">
      <x-import component-from-global-scope="CyberSkillDS.Logo" size="30" hint-size="30px,30px"></x-import>
      <span style="font-weight:800;font-size:17px">{{ headTitle }}</span>
      <span style="margin-left:auto"><x-import component-from-global-scope="CyberSkillDS.Badge" variant="solid" hint-size="120px,22px">{{ conf }}</x-import></span>
    </header>
    <div style="padding:40px 52px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--cs-color-text-accent)">{{ kicker }}</div>
      <h1 style="font-size:32px;font-weight:800;letter-spacing:-0.02em;margin:8px 0 24px">{{ h1 }}</h1>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:24px;padding:22px 26px;background:var(--cs-color-surface-raised);border:1px solid var(--cs-color-border-default);border-radius:12px;margin-bottom:26px">
        <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ st1 }}" value="₫12.4B" delta="+18%" trend="up" hint-size="150px,72px"></x-import>
        <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ st2 }}" value="14" delta="+4" trend="up" hint-size="150px,72px"></x-import>
        <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ st3 }}" value="{{ runway }}" delta="{{ steady }}" trend="flat" hint-size="150px,72px"></x-import>
        <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ st4 }}" value="38" delta="+6" trend="up" hint-size="150px,72px"></x-import>
      </div>

      <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0 0 10px">{{ hlH }}</h2>
      <p style="font-size:15px;line-height:1.7;margin:0 0 12px">{{ hlBody }}</p>
      <div style="margin-bottom:24px"><x-import component-from-global-scope="CyberSkillDS.AIDisclosureBadge" label="{{ aiLabel }}" details="{{ aiDetails }}" sources="{{ sources }}" hint-size="180px,40px"></x-import></div>

      <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0 0 12px">{{ portH }}</h2>
      <div style="border:1px solid var(--cs-color-border-default);border-radius:10px;padding:6px 18px 12px;margin-bottom:26px">
        <x-import component-from-global-scope="CyberSkillDS.DataTable" columns="{{ cols }}" rows="{{ rows }}" row-key="name" hint-size="100%,200px"></x-import>
      </div>

      <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0 0 12px">{{ riskH }}</h2>
      <div style="display:grid;gap:10px">
        <x-import component-from-global-scope="CyberSkillDS.Alert" variant="warning" title="{{ risk1t }}" hint-size="100%,72px">{{ risk1b }}</x-import>
        <x-import component-from-global-scope="CyberSkillDS.Alert" variant="info" title="{{ risk2t }}" hint-size="100%,72px">{{ risk2b }}</x-import>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;language&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;English&quot;,&quot;Tiếng Việt&quot;],&quot;default&quot;:&quot;English&quot;,&quot;tsType&quot;:&quot;\&quot;English\&quot; | \&quot;Tiếng Việt\&quot;&quot;,&quot;section&quot;:&quot;Content&quot;},
  &quot;element&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Thổ · studio&quot;,&quot;Thổ · clay&quot;,&quot;Thổ · sand&quot;,&quot;Hỏa · ember&quot;,&quot;Hỏa · lava&quot;,&quot;Hỏa · plasma&quot;,&quot;Thủy · river&quot;,&quot;Thủy · ocean&quot;,&quot;Thủy · mist&quot;,&quot;Mộc · leaf&quot;,&quot;Mộc · bamboo&quot;,&quot;Mộc · forest&quot;,&quot;Kim · champagne&quot;,&quot;Kim · steel&quot;,&quot;Kim · titanium&quot;],&quot;default&quot;:&quot;Thổ · studio&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Element (Ngũ Hành)&quot;},
  &quot;expression&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Liquid glass · default&quot;,&quot;Solid&quot;,&quot;Dense&quot;,&quot;Paper&quot;,&quot;Soft&quot;,&quot;Bold&quot;,&quot;Luxe&quot;],&quot;default&quot;:&quot;Liquid glass · default&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Expression&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const EX = {"Liquid glass · default":"","Solid":"solid","Dense":"dense","Paper":"paper","Soft":"soft","Bold":"bold","Luxe":"luxe"};
    const exAttr = EX[this.props.expression] ?? "";
    const EL = {"Thổ · studio":["tho",""],"Thổ · clay":["tho","clay"],"Thổ · sand":["tho","sand"],"Hỏa · ember":["hoa",""],"Hỏa · lava":["hoa","lava"],"Hỏa · plasma":["hoa","plasma"],"Thủy · river":["thuy",""],"Thủy · ocean":["thuy","ocean"],"Thủy · mist":["thuy","mist"],"Mộc · leaf":["moc",""],"Mộc · bamboo":["moc","bamboo"],"Mộc · forest":["moc","forest"],"Kim · champagne":["kim",""],"Kim · steel":["kim","steel"],"Kim · titanium":["kim","titanium"]};
    const [elAttr, vaAttr] = EL[this.props.element] || EL["Thổ · studio"];
    const vn = this.props.language === "Tiếng Việt";
    const en = {
      headTitle:"CyberSkill · Board report", conf:"Confidential",
      kicker:"Q3 2026 · Business review", h1:"The quarter in one page",
      st1:"Revenue (QoQ)", st2:"Wishes granted", st3:"Runway", st4:"Headcount", steady:"steady", runway:"19 mo",
      hlH:"Highlights",
      hlBody:"Revenue grew 18% QoQ on two enterprise wins and a renewed retainer. The design system reached v1.6 and now underpins every new build, cutting delivery time. Hiring is on plan; the Saigon studio is at healthy capacity.",
      aiLabel:"AI-assisted summary",
      aiDetails:"This narrative was drafted with AI from the quarter's metrics and reviewed by the leadership team before circulation.",
      portH:"Portfolio",
      riskH:"Risks & asks",
      risk1t:"Key-person risk", risk1b:"AI squad depends on one senior lead. Ask: approve a second senior hire in Q4.",
      risk2t:"Decision needed", risk2b:"Sign off on the CyberOS infra spend to unblock the provenance ledger (target Q1 2027).",
      sources: ["Status Hub", "Finance close Q3"],
      cols: [ { key:"name", header:"Project" }, { key:"client", header:"Client" }, { key:"status", header:"Status" }, { key:"value", header:"Value" } ],
      rows: [
        { name:"Checkout rebuild", client:"Retailer A", status:"Shipped", value:"₫3.1B" },
        { name:"Ops console", client:"Logistics B", status:"In progress", value:"₫2.4B" },
        { name:"Design System", client:"Internal", status:"In progress", value:"—" },
        { name:"Agent spine", client:"Internal", status:"Blocked", value:"—" },
      ],
    };
    const vi = {
      headTitle:"CyberSkill · Báo cáo Hội đồng", conf:"Mật",
      kicker:"Quý 3 2026 · Đánh giá kinh doanh", h1:"Cả quý gói gọn trong một trang",
      st1:"Doanh thu (QoQ)", st2:"Điều ước đã thực hiện", st3:"Số tháng còn vốn", st4:"Nhân sự", steady:"ổn định", runway:"19 tháng",
      hlH:"Điểm nổi bật",
      hlBody:"Doanh thu tăng 18% so với quý trước nhờ hai hợp đồng doanh nghiệp và một hợp đồng duy trì được gia hạn. Hệ thống thiết kế đạt v1.6 và nay là nền của mọi sản phẩm mới, rút ngắn thời gian bàn giao. Tuyển dụng đúng kế hoạch; studio Sài Gòn đang ở công suất lành mạnh.",
      aiLabel:"Tóm tắt có AI hỗ trợ",
      aiDetails:"Bản tường thuật này được AI soạn nháp từ các chỉ số của quý và được ban lãnh đạo rà soát trước khi lưu hành.",
      portH:"Danh mục dự án",
      riskH:"Rủi ro & đề xuất",
      risk1t:"Rủi ro nhân sự chủ chốt", risk1b:"Đội AI phụ thuộc vào một trưởng nhóm cấp cao. Đề xuất: duyệt tuyển thêm một nhân sự cấp cao trong Q4.",
      risk2t:"Cần quyết định", risk2b:"Phê duyệt chi phí hạ tầng CyberOS để mở đường cho sổ cái nguồn gốc (mục tiêu Q1 2027).",
      sources: ["Status Hub", "Chốt sổ tài chính Q3"],
      cols: [ { key:"name", header:"Dự án" }, { key:"client", header:"Khách hàng" }, { key:"status", header:"Trạng thái" }, { key:"value", header:"Giá trị" } ],
      rows: [
        { name:"Làm lại checkout", client:"Nhà bán lẻ A", status:"Đã ra mắt", value:"₫3.1B" },
        { name:"Bảng điều hành vận hành", client:"Logistics B", status:"Đang làm", value:"₫2.4B" },
        { name:"Design System", client:"Nội bộ", status:"Đang làm", value:"—" },
        { name:"Xương sống agent", client:"Nội bộ", status:"Tạm dừng", value:"—" },
      ],
    };
    return Object.assign({ langAttr: (this.props.language ?? "English") === "Tiếng Việt" ? "vi" : "en", exAttr, elAttr, vaAttr }, vn ? vi : en);
  }
}
</script>
</body>
</html>
