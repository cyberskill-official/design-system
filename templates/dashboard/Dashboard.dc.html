<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Dashboard" description="CyberSkill portfolio dashboard — umber header, KPI stats, board / table lenses, and status cards. Bilingual (English · Tiếng Việt). Built on the Status Hub product surface." -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>
<div data-theme="{{ rootTheme }}" lang="{{ langAttr }}" data-cs-element="{{ elAttr }}" data-cs-variant="{{ vaAttr }}" style="font-family:var(--cs-font-family-ui);color:var(--cs-color-text-primary);background:var(--cs-color-surface-page);min-height:100vh">
  <header style="background:var(--cs-accent-strong);color:#fff;border-bottom:3px solid var(--cs-accent)">
    <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:18px 28px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:14px">
        <span style="width:42px;height:42px;border-radius:12px;background:var(--cs-accent-bright);display:grid;place-items:center;overflow:hidden">
          <x-import component-from-global-scope="CyberSkillDS.Logo" size="42" decorative="{{ true }}" hint-size="42px,42px"></x-import>
        </span>
        <div>
          <h1 style="margin:0;font-size:22px;letter-spacing:0.2px">Status Hub</h1>
          <p style="margin:2px 0 0;font-size:13px;opacity:0.8">{{ tagline }}</p>
        </div>
      </div>
      <span>
        <x-import component-from-global-scope="CyberSkillDS.Button" variant="primary" size="sm" hint-size="130px,36px">{{ newBtn }}</x-import>
      </span>
    </div>
  </header>

  <div style="max-width:1280px;margin:0 auto;padding:28px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;padding:22px 24px;background:var(--cs-color-surface-panel);border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);box-shadow:var(--cs-shadow-sm)">
      <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ s1 }}" value="6" hint-size="140px,70px"></x-import>
      <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ s2 }}" value="4" hint-size="140px,70px"></x-import>
      <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ s3 }}" value="1" hint-size="140px,70px"></x-import>
      <x-import component-from-global-scope="CyberSkillDS.Stat" label="{{ s4 }}" value="70%" delta="{{ s4d }}" trend="up" hint-size="140px,70px"></x-import>
    </div>

    <div style="margin:24px 0 20px">
      <x-import component-from-global-scope="CyberSkillDS.Tabs" tabs="{{ tabs }}" value="{{ lens }}" on-change="{{ setLens }}" hint-size="100%,44px"></x-import>
    </div>

    <sc-if value="{{ isBoard }}" hint-placeholder-val="{{ true }}">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px">
        <div style="background:var(--cs-color-surface-panel);border:1px solid var(--cs-accent);border-radius:var(--cs-radius-lg);padding:18px">
          <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
            <h3 style="margin:0;font-size:15px"><span style="font-family:var(--cs-font-family-mono);color:var(--cs-color-text-accent);font-weight:700">CDS</span> · Design System v1.6</h3>
            <span style="font-size:12.5px;color:var(--cs-color-text-muted)">72%</span>
          </div>
          <p style="margin:8px 0 0;font-size:13px;color:var(--cs-color-text-muted)">{{ c1 }}</p>
          <div style="margin:14px 0 12px">
            <x-import component-from-global-scope="CyberSkillDS.ProgressBar" value="72" label="Design System v1.6 progress" hint-size="100%,10px"></x-import>
          </div>
          <x-import component-from-global-scope="CyberSkillDS.Badge" variant="ochre" hint-size="70px,22px">{{ stInprog }}</x-import>
        </div>
        <div style="background:var(--cs-color-surface-panel);border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);padding:18px">
          <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
            <h3 style="margin:0;font-size:15px"><span style="font-family:var(--cs-font-family-mono);color:var(--cs-color-text-accent);font-weight:700">SITE</span> · cyberskill.world</h3>
            <span style="font-size:12.5px;color:var(--cs-color-text-muted)">84%</span>
          </div>
          <p style="margin:8px 0 0;font-size:13px;color:var(--cs-color-text-muted)">{{ c2 }}</p>
          <div style="margin:14px 0 12px">
            <x-import component-from-global-scope="CyberSkillDS.ProgressBar" value="84" label="Site progress" hint-size="100%,10px"></x-import>
          </div>
          <x-import component-from-global-scope="CyberSkillDS.Badge" variant="ochre" hint-size="70px,22px">{{ stInprog }}</x-import>
        </div>
        <div style="background:var(--cs-color-surface-panel);border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);padding:18px">
          <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
            <h3 style="margin:0;font-size:15px"><span style="font-family:var(--cs-font-family-mono);color:var(--cs-color-text-accent);font-weight:700">OS</span> · CyberOS Agent Spine</h3>
            <span style="font-size:12.5px;color:var(--cs-color-text-muted)">41%</span>
          </div>
          <p style="margin:8px 0 0;font-size:13px;color:var(--cs-color-text-muted)">{{ c3 }}</p>
          <div style="margin:14px 0 12px">
            <x-import component-from-global-scope="CyberSkillDS.ProgressBar" value="41" variant="umber" label="OS progress" hint-size="100%,10px"></x-import>
          </div>
          <x-import component-from-global-scope="CyberSkillDS.Badge" variant="danger" hint-size="60px,22px">{{ stBlocked }}</x-import>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isTable }}">
      <div style="background:var(--cs-color-surface-panel);border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);padding:6px 18px 12px">
        <x-import component-from-global-scope="CyberSkillDS.DataTable" caption="{{ tblCap }}" columns="{{ cols }}" rows="{{ rows }}" row-key="key" hint-size="100%,240px"></x-import>
      </div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;language&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;English&quot;,&quot;Tiếng Việt&quot;],&quot;default&quot;:&quot;English&quot;,&quot;tsType&quot;:&quot;\&quot;English\&quot; | \&quot;Tiếng Việt\&quot;&quot;,&quot;section&quot;:&quot;Content&quot;},
  &quot;element&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Thổ · studio&quot;,&quot;Thổ · clay&quot;,&quot;Thổ · sand&quot;,&quot;Hỏa · ember&quot;,&quot;Hỏa · lava&quot;,&quot;Hỏa · plasma&quot;,&quot;Thủy · river&quot;,&quot;Thủy · ocean&quot;,&quot;Thủy · mist&quot;,&quot;Mộc · leaf&quot;,&quot;Mộc · bamboo&quot;,&quot;Mộc · forest&quot;,&quot;Kim · champagne&quot;,&quot;Kim · steel&quot;,&quot;Kim · titanium&quot;],&quot;default&quot;:&quot;Thổ · studio&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Element (Ngũ Hành)&quot;},
  &quot;theme&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;\&quot;light\&quot; | \&quot;dark\&quot;&quot;,&quot;section&quot;:&quot;Theme&quot;},
  &quot;defaultView&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;board&quot;,&quot;table&quot;],&quot;default&quot;:&quot;board&quot;,&quot;tsType&quot;:&quot;\&quot;board\&quot; | \&quot;table\&quot;&quot;,&quot;section&quot;:&quot;Behavior&quot;}
}">
class Component extends DCLogic {
  state = { lens: null };
  get lens() { return this.state.lens ?? (this.props.defaultView || "board"); }
  renderVals() {
    const EL = {"Thổ · studio":["tho",""],"Thổ · clay":["tho","clay"],"Thổ · sand":["tho","sand"],"Hỏa · ember":["hoa",""],"Hỏa · lava":["hoa","lava"],"Hỏa · plasma":["hoa","plasma"],"Thủy · river":["thuy",""],"Thủy · ocean":["thuy","ocean"],"Thủy · mist":["thuy","mist"],"Mộc · leaf":["moc",""],"Mộc · bamboo":["moc","bamboo"],"Mộc · forest":["moc","forest"],"Kim · champagne":["kim",""],"Kim · steel":["kim","steel"],"Kim · titanium":["kim","titanium"]};
    const [elAttr, vaAttr] = EL[this.props.element] || EL["Thổ · studio"];
    const lens = this.lens;
const vn = this.props.language === "Tiếng Việt";
    const en = { tagline:"Portfolio · one page, three lenses", newBtn:"New project", s1:"Projects", s2:"In progress", s3:"Shipped", s4:"Avg progress", s4d:"+6 this week", boardL:"Board", tableL:"Table", c1:"Liquid Glass component bindings + 50 style packs.", c2:"Bilingual storytelling landing; lead capture live.", c3:"BRAIN memory store + human-in-the-loop gates.", stInprog:"In progress", stBlocked:"Blocked", tblCap:"Projects", cKey:"Key", cName:"Project", cSquad:"Squad", cProg:"Progress", cStatus:"Status" };
    const vi = { tagline:"Danh mục · một trang, ba lăng kính", newBtn:"Dự án mới", s1:"Dự án", s2:"Đang làm", s3:"Đã ra mắt", s4:"Tiến độ TB", s4d:"+6 tuần này", boardL:"Bảng", tableL:"Danh sách", c1:"Gắn component Liquid Glass + 50 style pack.", c2:"Landing kể chuyện song ngữ; thu lead đã chạy.", c3:"Kho ký ức BRAIN + cổng có con người kiểm duyệt.", stInprog:"Đang làm", stBlocked:"Bị chặn", tblCap:"Dự án", cKey:"Mã", cName:"Dự án", cSquad:"Nhóm", cProg:"Tiến độ", cStatus:"Trạng thái" };
    const t = vn ? vi : en;
    return Object.assign({ langAttr: (this.props.language ?? "English") === "Tiếng Việt" ? "vi" : "en", elAttr, vaAttr, rootTheme: this.props.theme === "dark" ? "dark" : "", lens, isBoard: lens === "board", isTable: lens === "table",
      tabs: [{ value: "board", label: t.boardL }, { value: "table", label: t.tableL, count: 3 }],
      setLens: (v) => this.setState({ lens: v }),
      cols: [ { key: "key", header: t.cKey }, { key: "name", header: t.cName }, { key: "squad", header: t.cSquad }, { key: "pct", header: t.cProg, render: (r) => r.pct + "%" }, { key: "status", header: t.cStatus } ],
      rows: [
        { key: "CDS", name: "Design System v1.6", squad: "Platform", pct: 72, status: t.stInprog },
        { key: "SITE", name: "cyberskill.world", squad: "Growth", pct: 84, status: t.stInprog },
        { key: "OS", name: "CyberOS Agent Spine", squad: "Platform", pct: 41, status: t.stBlocked },
      ]}, t);
  }
}
</script>
</body>
</html>
