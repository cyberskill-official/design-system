<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="omelette-owns-print" content="1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Marketing · Press release" description="CyberSkill press release — FOR IMMEDIATE RELEASE, dateline, body, boilerplate, media contact. Bilingual (English · Tiếng Việt). Letter-sized, print-ready." -->
<helmet>
<script src="./ds-base.js"></script>
<style>@page{size:letter;margin:0.6in}@media print{html,body{background:#fff!important}.cs-desk{background:#fff!important;padding:0!important;min-height:0!important}.cs-sheet{box-shadow:none!important;border:none!important;max-width:none!important;border-radius:0!important;padding:0!important}.cs-avoid{break-inside:avoid}}</style>
</helmet>
<div lang="{{ langAttr }}" data-cs-element="{{ elAttr }}" data-cs-variant="{{ vaAttr }}" data-cs-expression="{{ exAttr }}" class="cs-desk" style="background:#efe6d8;min-height:100vh;padding:40px 16px;font-family:var(--cs-font-family-ui);color:var(--cs-color-text-primary)">
  <div class="cs-sheet" style="max-width:816px;margin:0 auto;background:#fff;border:1px solid var(--cs-color-border-default);border-radius:12px;box-shadow:var(--cs-shadow-md);padding:56px 64px">
    <header style="display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--cs-color-brand-umber);padding-bottom:18px;margin-bottom:24px">
      <x-import component-from-global-scope="CyberSkillDesignSystem_847b3c.Logo" size="34" hint-size="34px,34px"></x-import>
      <div><div style="font-weight:800;font-size:17px;color:var(--cs-color-brand-umber);line-height:1.1">CyberSkill</div><div style="font-size:11px;color:var(--cs-color-text-muted)">Hiện Thực Hoá Ý Chí · Turn Your Will Into Real</div></div>
      <span style="margin-left:auto;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--cs-color-text-accent)">{{ kicker }}</span>
    </header>
    <h1 style="font-size:26px;font-weight:800;letter-spacing:-0.02em;line-height:1.2;margin:0 0 8px">{{ h1 }}</h1>
    <p style="font-size:14px;font-weight:600;color:var(--cs-color-text-muted);margin:0 0 20px">{{ sub }}</p>
    <p style="font-size:13.5px;line-height:1.75;margin:0 0 14px">{{ lead }}</p>
    <p style="font-size:13.5px;line-height:1.75;margin:0 0 14px">{{ body2 }}</p>
    <p style="font-size:13.5px;line-height:1.75;margin:0 0 22px">{{ body3 }}</p>
    <div class="cs-avoid" style="background:var(--cs-accent-tint);border-radius:10px;padding:16px 20px;margin-bottom:22px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--cs-color-text-muted);font-weight:700;margin-bottom:4px">{{ glanceL }}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;font-size:12.5px;line-height:1.55">
        <div><b style="color:var(--cs-color-text-accent)">{{ g1t }}</b><br>{{ g1b }}</div>
        <div><b style="color:var(--cs-color-text-accent)">{{ g2t }}</b><br>{{ g2b }}</div>
        <div><b style="color:var(--cs-color-text-accent)">{{ g3t }}</b><br>{{ g3b }}</div>
      </div>
    </div>
    <sc-if value="{{ showBoilerplate }}" hint-placeholder-val="{{ true }}">
    <div class="cs-avoid" style="border-top:1px solid var(--cs-color-border-default);padding-top:16px;margin-bottom:16px">
      <h2 style="font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cs-color-text-muted);margin:0 0 6px">{{ aboutL }}</h2>
      <p style="font-size:12.5px;line-height:1.7;margin:0;color:var(--cs-color-text-muted)">{{ aboutP }}</p>
    </div>
    </sc-if>
    <div class="cs-avoid" style="display:flex;gap:24px;font-size:12.5px;line-height:1.6">
      <div><b>{{ mediaL }}</b><br>press@cyberskill.world<br>{{ place }}</div>
      <div style="margin-left:auto;text-align:right;color:var(--cs-color-text-muted)">{{ assetsL }}<br><span style="font-family:var(--cs-font-family-mono)">###</span></div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;language&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;English&quot;,&quot;Tiếng Việt&quot;],&quot;default&quot;:&quot;English&quot;,&quot;tsType&quot;:&quot;\&quot;English\&quot; | \&quot;Tiếng Việt\&quot;&quot;,&quot;section&quot;:&quot;Content&quot;},
  &quot;element&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Thổ · studio&quot;,&quot;Thổ · clay&quot;,&quot;Thổ · sand&quot;,&quot;Hỏa · ember&quot;,&quot;Hỏa · lava&quot;,&quot;Hỏa · plasma&quot;,&quot;Thủy · river&quot;,&quot;Thủy · ocean&quot;,&quot;Thủy · mist&quot;,&quot;Mộc · leaf&quot;,&quot;Mộc · bamboo&quot;,&quot;Mộc · forest&quot;,&quot;Kim · champagne&quot;,&quot;Kim · steel&quot;,&quot;Kim · titanium&quot;],&quot;default&quot;:&quot;Thổ · studio&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Element (Ngũ Hành)&quot;},
  &quot;expression&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Liquid glass · default&quot;,&quot;Solid&quot;,&quot;Dense&quot;,&quot;Paper&quot;,&quot;Soft&quot;,&quot;Bold&quot;,&quot;Luxe&quot;],&quot;default&quot;:&quot;Liquid glass · default&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Expression&quot;},
  &quot;showBoilerplate&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const EX = {"Liquid glass · default":"","Solid":"solid","Dense":"dense","Paper":"paper","Soft":"soft","Bold":"bold","Luxe":"luxe"};
    const exAttr = EX[this.props.expression] ?? "";
    const EL = {"Thổ · studio":["tho",""],"Thổ · clay":["tho","clay"],"Thổ · sand":["tho","sand"],"Hỏa · ember":["hoa",""],"Hỏa · lava":["hoa","lava"],"Hỏa · plasma":["hoa","plasma"],"Thủy · river":["thuy",""],"Thủy · ocean":["thuy","ocean"],"Thủy · mist":["thuy","mist"],"Mộc · leaf":["moc",""],"Mộc · bamboo":["moc","bamboo"],"Mộc · forest":["moc","forest"],"Kim · champagne":["kim",""],"Kim · steel":["kim","steel"],"Kim · titanium":["kim","titanium"]};
    const [elAttr, vaAttr] = EL[this.props.element] || EL["Thổ · studio"];
    const vn = this.props.language === "Tiếng Việt";
    const en = {
      kicker:"For immediate release",
      h1:"CyberSkill opens Lumi to every business: describe a wish, get working software",
      sub:"The Saigon studio's golden genie now takes wishes in Vietnamese and English — with honest advice first, and a human team behind every build.",
      lead:"HO CHI MINH CITY, 18 July 2026 — CyberSkill, the Saigon software studio behind Status Hub, today opened Lumi, its wish-capture assistant, to all businesses. Anyone can describe an outcome in one sentence; Lumi replies with plain advice, then hands the wish to a senior human team that scopes it honestly and builds it to last.",
      body2:"Unlike tools that generate throwaway code, every Lumi wish ends with people. \u201cAI drafts, humans answer for the result,\u201d said the studio's founder. \u201cWe put our names on what ships — that changes what you're willing to ship.\u201d",
      body3:"Lumi is bilingual by default (Tiếng Việt · English), discloses when AI is involved, and never contacts anyone without consent. Since 2020 the studio has granted 40+ wishes for retail, logistics, and internal-tools teams across Vietnam.",
      glanceL:"At a glance", g1t:"Free to wish", g1b:"Advice first; no signup to ask.", g2t:"Human in the loop", g2b:"Every wish reviewed by a person.", g3t:"One business day", g3b:"First reply, guaranteed.",
      aboutL:"About CyberSkill", aboutP:"CyberSkill is a Saigon software studio, est. 2020. Slogan: Turn Your Will Into Real — Hiện Thực Hoá Ý Chí. A small, senior team that turns a clear wish into software that ships and lasts: web and mobile products, internal systems, and honest AI. cyberskill.world",
      mediaL:"Media contact", place:"District 1, Saigon", assetsL:"Assets: logo & Lumi renders on request",
    };
    const vi = {
      kicker:"Phát hành ngay",
      h1:"CyberSkill mở Lumi cho mọi doanh nghiệp: nói một điều ước, nhận phần mềm chạy được",
      sub:"Vị thần đèn vàng của studio Sài Gòn nay nhận điều ước bằng cả tiếng Việt và tiếng Anh — lời khuyên thành thật trước, và một đội ngũ con người phía sau mỗi bản build.",
      lead:"TP. HỒ CHÍ MINH, 18 tháng 7 năm 2026 — CyberSkill, studio phần mềm Sài Gòn đứng sau Status Hub, hôm nay mở Lumi, trợ lý tiếp nhận điều ước, cho mọi doanh nghiệp. Bất kỳ ai cũng có thể mô tả kết quả trong một câu; Lumi trả lời bằng lời khuyên thẳng thắn, rồi trao điều ước cho một đội ngũ con người cấp cao xác định phạm vi thành thật và làm để bền lâu.",
      body2:"Khác với các công cụ sinh mã dùng một lần, mọi điều ước của Lumi đều kết thúc ở con người. \u201cAI soạn nháp, con người chịu trách nhiệm về kết quả,\u201d nhà sáng lập studio nói. \u201cChúng tôi đặt tên mình lên thứ được bàn giao — điều đó thay đổi thứ bạn sẵn lòng bàn giao.\u201d",
      body3:"Lumi song ngữ mặc định (Tiếng Việt · English), công khai khi có AI tham gia, và không bao giờ liên hệ ai khi chưa được đồng ý. Từ 2020, studio đã thực hiện hơn 40 điều ước cho các đội bán lẻ, logistics và công cụ nội bộ khắp Việt Nam.",
      glanceL:"Tóm tắt", g1t:"Ước miễn phí", g1b:"Lời khuyên trước; không cần đăng ký để hỏi.", g2t:"Con người trong vòng lặp", g2b:"Mọi điều ước đều có người rà soát.", g3t:"Một ngày làm việc", g3b:"Phản hồi đầu tiên, cam kết.",
      aboutL:"Về CyberSkill", aboutP:"CyberSkill là studio phần mềm Sài Gòn, thành lập 2020. Khẩu hiệu: Turn Your Will Into Real — Hiện Thực Hoá Ý Chí. Một đội ngũ nhỏ, giàu kinh nghiệm, biến điều ước rõ ràng thành phần mềm chạy được và bền lâu: sản phẩm web và di động, hệ thống nội bộ, và AI tử tế. cyberskill.world",
      mediaL:"Liên hệ báo chí", place:"Quận 1, Sài Gòn", assetsL:"Tư liệu: logo & ảnh Lumi khi có yêu cầu",
    };
    return Object.assign({ langAttr: (this.props.language ?? "English") === "Tiếng Việt" ? "vi" : "en", elAttr, vaAttr, exAttr, showBoilerplate: this.props.showBoilerplate ?? true }, vn ? vi : en);
  }
}
</script>
</body>
</html>
