<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Slide deck" description="CyberSkill 16:9 slide deck — umber title + closing, ochre accents, and light content layouts. Bilingual (English · Tiếng Việt). Brand-ready presentation shell." -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>
<div data-theme="{{ rootTheme }}" lang="{{ langAttr }}" data-cs-element="{{ elAttr }}" data-cs-variant="{{ vaAttr }}" data-cs-expression="{{ exAttr }}" class="cs-canvas-desk" style="background:#2a1a0d;padding:28px;font-family:var(--cs-font-family-ui)">
  <div style="display:grid;gap:28px;max-width:1280px;margin:0 auto">

    <section style="position:relative;width:100%;aspect-ratio:16/9;background:var(--cs-accent-ink);color:#fff;border-radius:var(--cs-radius-lg);overflow:hidden;box-shadow:var(--cs-shadow-xl);display:flex;flex-direction:column;justify-content:center;padding:0 88px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
        <x-import component-from-global-scope="CyberSkillDS.Logo" size="48" hint-size="48px,48px"></x-import>
        <span style="font-weight:800;font-size:22px;letter-spacing:-0.01em">CyberSkill</span>
      </div>
      <div style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--cs-accent-bright)">{{ s1kicker }}</div>
      <h1 style="font-size:64px;font-weight:800;letter-spacing:-0.02em;line-height:1.02;color:var(--cs-accent-bright);margin:14px 0 8px">{{ s1h }}</h1>
      <p style="font-size:22px;opacity:0.9;margin:0">{{ s1sub }}</p>
      <div style="position:absolute;bottom:44px;left:88px;font-size:15px;opacity:0.7">Lumi · CyberSkill · Saigon</div>
      <sc-if value="{{ showNumbers }}" hint-placeholder-val="{{ true }}"><div style="position:absolute;bottom:44px;right:88px;font-family:var(--cs-font-family-mono);font-size:14px;color:var(--cs-accent-bright)">01 / 04</div></sc-if>
    </section>

    <section style="position:relative;width:100%;aspect-ratio:16/9;background:var(--cs-color-surface-panel);color:var(--cs-color-text-primary);border-radius:var(--cs-radius-lg);overflow:hidden;box-shadow:var(--cs-shadow-xl);padding:72px 88px;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--cs-color-text-accent)">{{ s2kicker }}</div>
      <h2 style="font-size:46px;font-weight:800;letter-spacing:-0.02em;margin:10px 0 40px">{{ s2h }}</h2>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:28px">
        <div style="border-top:3px solid var(--cs-accent);padding-top:18px">
          <div style="font-family:var(--cs-font-family-mono);font-weight:700;color:var(--cs-color-text-accent)">01</div>
          <h3 style="font-size:24px;margin:8px 0 6px">Liquid Glass</h3>
          <p style="color:var(--cs-color-text-muted);font-size:16px;margin:0;line-height:1.5">{{ f1 }}</p>
        </div>
        <div style="border-top:3px solid var(--cs-accent);padding-top:18px">
          <div style="font-family:var(--cs-font-family-mono);font-weight:700;color:var(--cs-color-text-accent)">02</div>
          <h3 style="font-size:24px;margin:8px 0 6px">{{ f2h }}</h3>
          <p style="color:var(--cs-color-text-muted);font-size:16px;margin:0;line-height:1.5">{{ f2 }}</p>
        </div>
        <div style="border-top:3px solid var(--cs-accent);padding-top:18px">
          <div style="font-family:var(--cs-font-family-mono);font-weight:700;color:var(--cs-color-text-accent)">03</div>
          <h3 style="font-size:24px;margin:8px 0 6px">{{ f3h }}</h3>
          <p style="color:var(--cs-color-text-muted);font-size:16px;margin:0;line-height:1.5">{{ f3 }}</p>
        </div>
      </div>
      <sc-if value="{{ showNumbers }}"><div style="position:absolute;bottom:44px;right:88px;font-family:var(--cs-font-family-mono);font-size:14px;color:var(--cs-color-text-muted)">02 / 04</div></sc-if>
    </section>

    <section style="position:relative;width:100%;aspect-ratio:16/9;background:var(--cs-accent-ink);color:#fff;border-radius:var(--cs-radius-lg);overflow:hidden;box-shadow:var(--cs-shadow-xl);padding:0 96px;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:40px;font-weight:700;line-height:1.25;max-width:900px">{{ quoteA }}<span style="color:var(--cs-accent-bright)">{{ quoteB }}</span>{{ quoteC }}</div>
      <div style="margin-top:28px;font-size:16px;opacity:0.75">{{ quoteWho }}</div>
      <sc-if value="{{ showNumbers }}"><div style="position:absolute;bottom:44px;right:96px;font-family:var(--cs-font-family-mono);font-size:14px;color:var(--cs-accent-bright)">03 / 04</div></sc-if>
    </section>

    <section style="position:relative;width:100%;aspect-ratio:16/9;background:var(--cs-accent-ink);color:#fff;border-radius:var(--cs-radius-lg);overflow:hidden;box-shadow:var(--cs-shadow-xl);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 88px">
      <x-import component-from-global-scope="CyberSkillDS.Logo" size="64" hint-size="64px,64px"></x-import>
      <h2 style="font-size:52px;font-weight:800;letter-spacing:-0.02em;color:var(--cs-accent-bright);margin:24px 0 8px">{{ closeH }}</h2>
      <p style="font-size:20px;opacity:0.9;margin:0">{{ closeP }}</p>
      <sc-if value="{{ showNumbers }}"><div style="position:absolute;bottom:44px;right:88px;font-family:var(--cs-font-family-mono);font-size:14px;color:var(--cs-accent-bright)">04 / 04</div></sc-if>
    </section>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;language&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;English&quot;,&quot;Tiếng Việt&quot;],&quot;default&quot;:&quot;English&quot;,&quot;tsType&quot;:&quot;\&quot;English\&quot; | \&quot;Tiếng Việt\&quot;&quot;,&quot;section&quot;:&quot;Content&quot;},
  &quot;element&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Thổ · studio&quot;,&quot;Thổ · clay&quot;,&quot;Thổ · sand&quot;,&quot;Hỏa · ember&quot;,&quot;Hỏa · lava&quot;,&quot;Hỏa · plasma&quot;,&quot;Thủy · river&quot;,&quot;Thủy · ocean&quot;,&quot;Thủy · mist&quot;,&quot;Mộc · leaf&quot;,&quot;Mộc · bamboo&quot;,&quot;Mộc · forest&quot;,&quot;Kim · champagne&quot;,&quot;Kim · steel&quot;,&quot;Kim · titanium&quot;],&quot;default&quot;:&quot;Thổ · studio&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Element (Ngũ Hành)&quot;},
  &quot;expression&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Liquid glass · default&quot;,&quot;Solid&quot;,&quot;Dense&quot;,&quot;Paper&quot;,&quot;Soft&quot;,&quot;Bold&quot;,&quot;Luxe&quot;],&quot;default&quot;:&quot;Liquid glass · default&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Expression&quot;},
  &quot;theme&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;\&quot;light\&quot; | \&quot;dark\&quot;&quot;,&quot;section&quot;:&quot;Theme&quot;},
  &quot;showPageNumbers&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const EX = {"Liquid glass · default":"","Solid":"solid","Dense":"dense","Paper":"paper","Soft":"soft","Bold":"bold","Luxe":"luxe"};
    const EL = {"Thổ · studio":["tho",""],"Thổ · clay":["tho","clay"],"Thổ · sand":["tho","sand"],"Hỏa · ember":["hoa",""],"Hỏa · lava":["hoa","lava"],"Hỏa · plasma":["hoa","plasma"],"Thủy · river":["thuy",""],"Thủy · ocean":["thuy","ocean"],"Thủy · mist":["thuy","mist"],"Mộc · leaf":["moc",""],"Mộc · bamboo":["moc","bamboo"],"Mộc · forest":["moc","forest"],"Kim · champagne":["kim",""],"Kim · steel":["kim","steel"],"Kim · titanium":["kim","titanium"]};
    const [elAttr, vaAttr] = EL[this.props.element] || EL["Thổ · studio"];
    const vn = this.props.language === "Tiếng Việt";
    const en = { s1kicker:"Product review · Q3 2026", s1h:"Turn Your Will Into Real", s1sub:"Hiện Thực Hoá Ý Chí · a look at what shipped", s2kicker:"What we'll cover", s2h:"Three things that shipped", f1:"Five materials, now bound to components.", f2h:"50 style packs", f2:"Verified, zero warnings across the set.", f3h:"Lumi genie", f3:"A wish-capture flow, human in the loop.", quoteA:"\u201cA clear wish, granted by a real team — ", quoteB:"built to ship, built to last.", quoteC:"\u201d", quoteWho:"The CyberSkill promise", closeH:"Make a wish", closeP:"cyberskill.world · we reply within one business day" };
    const vi = { s1kicker:"Đánh giá sản phẩm · Q3 2026", s1h:"Hiện Thực Hoá Ý Chí", s1sub:"Turn Your Will Into Real · điểm lại những gì đã ra mắt", s2kicker:"Nội dung trình bày", s2h:"Ba thứ đã ra mắt", f1:"Năm vật liệu, nay gắn vào component.", f2h:"50 style pack", f2:"Đã kiểm định, không một cảnh báo.", f3h:"Thần đèn Lumi", f3:"Luồng tiếp nhận điều ước, có con người trong vòng lặp.", quoteA:"\u201cMột điều ước rõ ràng, được một đội ngũ thật thực hiện — ", quoteB:"làm để chạy được, làm để bền lâu.", quoteC:"\u201d", quoteWho:"Lời hứa của CyberSkill", closeH:"Gửi điều ước", closeP:"cyberskill.world · chúng tôi phản hồi trong một ngày làm việc" };
    return Object.assign({ langAttr: (this.props.language ?? "English") === "Tiếng Việt" ? "vi" : "en", elAttr, vaAttr, exAttr: EX[this.props.expression] ?? "", rootTheme: this.props.theme === "dark" ? "dark" : "", showNumbers: this.props.showPageNumbers ?? true }, vn ? vi : en);
  }
}
</script>
</body>
</html>
