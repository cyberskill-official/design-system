<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; }
  .tile { width: 1280px; height: 854px; display: flex; font-family: var(--cs-font-family-ui); }
  .main { flex: 1; background: var(--cs-color-brand-umber); display: flex; align-items: center; justify-content: center; }
  .main img { width: 440px; height: 440px; display: block; }
  .strip { width: 320px; display: flex; flex-direction: column; }
  .strip i { flex: 1; display: block; }
</style></head>
<body>
<div class="tile">
  <div class="main">
    <img src="assets/logo-mark.svg" alt="CyberSkill" />
  </div>
  <div class="strip">
    <i style="background:#F4BA17"></i>
    <i style="background:#E0632B"></i>
    <i style="background:#7A9B57"></i>
    <i style="background:#4E8E9B"></i>
  </div>
</div>
</body></html>
