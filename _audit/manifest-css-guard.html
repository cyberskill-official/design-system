<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>CyberSkill — manifest CSS path guard</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--cs-font-family-ui);background:#efe6d8;color:#231a12;padding:16px 20px}
  h1{font-size:16px;margin:0 0 6px}.lede{font-size:13px;color:#6b5d4f;max-width:900px;line-height:1.5}
  .row{font:12.5px ui-monospace,monospace;padding:4px 8px;border-radius:5px;margin:2px 0;max-width:920px}
  .ok{background:#dcfce7;color:#166534}.bad{background:#FEE2E2;color:#B42318;font-weight:700}
  #sum{font-size:15px;font-weight:800;margin:12px 0}
</style></head><body>
<h1>Manifest CSS path guard</h1>
<p class="lede">Asserts every <code>_ds_manifest.json</code> <code>globalCssPaths</code> entry exists on disk (HTTP 200 raw CSS, not HTML) and that every <code>@import</code> in <code>styles.css</code> is listed. Prevents deleted token packs from lingering as compiler truth. <code>window.__cssguard.pass</code>.</p>
<div id="list"></div><div id="sum">running…</div>
<script>
const list=document.getElementById('list');
function row(ok,t){const d=document.createElement('div');d.className='row '+(ok?'ok':'bad');d.textContent=(ok?'✓ ':'✗ ')+t;list.appendChild(d);}
(async()=>{
  const fails=[];
  const M=await (await fetch('../_ds_manifest.json',{cache:'no-store'})).json();
  const paths=M.globalCssPaths||[];
  const styles=await (await fetch('../styles.css',{cache:'no-store'})).text();
  const imports=[...styles.matchAll(/@import\s+url\(["']?([^"')]+)["']?\)/g)].map(m=>m[1].replace(/^\.\//,''));
  // normalize paths
  const norm=p=>p.replace(/^\.\//,'');
  for(const p of paths){
    const url='../'+norm(p);
    try{
      const r=await fetch(url,{cache:'no-store'});
      const t=await r.text();
      if(!r.ok) fails.push('missing '+p+' HTTP '+r.status);
      else if(/^\s*<(!doctype|html)/i.test(t)) fails.push(p+' intercepted as HTML');
      else if(!/\.css$/i.test(p)) fails.push(p+' not a .css path');
      else row(true, p);
    }catch(e){ fails.push(p+' fetch error '+e); }
  }
  for(const imp of imports){
    const n=norm(imp);
    if(!paths.some(p=>norm(p)===n || norm(p).endsWith(n) || n.endsWith(norm(p).replace(/^tokens\//,'') ))){
      // styles uses relative tokens/foo.css
      if(!paths.includes(n) && !paths.includes(n.replace(/^\//,''))){
        // allow if path is in globalCssPaths with same suffix
        const hit=paths.some(p=>p.endsWith(n.replace(/^tokens\//,'tokens/')) || p===n || p.endsWith('/'+n.split('/').pop()));
        if(!hit && !paths.includes(n)) fails.push('styles @import not in manifest: '+n);
      }
    }
  }
  // retired packs must not appear
  for(const bad of ['tokens/density.css','tokens/expressions.css']){
    if(paths.includes(bad)) fails.push('retired pack still listed: '+bad);
    if(styles.includes(bad)) fails.push('styles still imports: '+bad);
  }
  fails.forEach(f=>row(false,f));
  const pass=fails.length===0;
  window.__cssguard={pass,paths:paths.length,imports:imports.length,fails};
  const s=document.getElementById('sum');
  s.textContent=pass?('✓ PASS — '+paths.length+' paths resolve · '+imports.length+' @imports'):('✗ FAIL — '+fails.length);
  s.style.color=pass?'#166534':'#B42318';
})();
</script></body></html>
