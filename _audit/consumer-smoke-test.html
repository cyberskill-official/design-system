<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- CONSUMER SMOKE TEST — imports the design system exactly as an external
     consuming project would: the single stylesheet + the compiled bundle, then
     reads components off window.<Namespace> and mounts them. Proves the packaged
     path (bundle load · namespace · component render · token resolution) works
     end to end, not just the in-repo sources. -->
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--cs-font-family-ui);background:var(--cs-color-surface-page);color:var(--cs-color-text-primary);padding:26px 30px}h1{font-size:18px;margin:0 0 4px}h1 b{color:var(--cs-color-brand-umber)}.sub{color:var(--cs-color-text-muted);font-size:13px;margin:0 0 20px}#report{font-family:var(--cs-font-family-mono);font-size:12px;white-space:pre-wrap;border:1px solid var(--cs-color-border-default);border-radius:10px;background:var(--cs-color-surface-panel);padding:14px 16px;margin-bottom:18px}.demo{display:flex;gap:12px;flex-wrap:wrap;align-items:center;border:1px dashed var(--cs-color-border-default);border-radius:10px;padding:16px}</style>
</head><body>
<h1><b>CyberSkill</b> · Consumer smoke test</h1>
<p class="sub">Imports <code>styles.css</code> + <code>_ds_bundle.js</code> and mounts real components from the namespace — the external consumer path.</p>
<div id="report">running…</div>
<div id="root" class="demo"></div>
<script>
const out = { steps: [], pass: true };
function step(name, ok, detail){ out.steps.push((ok?"✓ ":"✗ ")+name+(detail?" — "+detail:"")); if(!ok) out.pass=false; }
// 1) bundle exposed the namespace
const NS = window.CyberSkillDesignSystem_847b3c;
step("bundle loaded + namespace present", !!NS, NS?Object.keys(NS).length+" exports":"MISSING");
// 2) core tokens resolve from styles.css
const cs = getComputedStyle(document.documentElement);
const umber = cs.getPropertyValue('--cs-color-brand-umber').trim();
step("tokens resolve (styles.css linked)", umber.toLowerCase()==="#45210e", "umber="+umber);
// 3) a representative set of components exist on the namespace
const need = ["Button","TextField","Badge","Card","Stat","Tabs","Tab","Alert","Switch","Logo","Icon"];
const missing = need.filter(n=>!NS || typeof NS[n]==="undefined");
step("key components exported", missing.length===0, missing.length?"missing: "+missing.join(","):need.length+" present");
// 4) actually mount some and confirm real DOM + class hooks
let mountErr=null, mountedTags=0, hasBtnClass=false, hasStatValue=false;
try{
  const h=React.createElement;
  const App = h("div",{style:{display:"flex",gap:"12px",flexWrap:"wrap",alignItems:"center"}},
    h(NS.Button,{variant:"primary"},"Make a wish"),
    h(NS.Badge,{variant:"ochre"},"New"),
    NS.Stat?h(NS.Stat,{label:"Shipped",value:"128"}):null,
    NS.Switch?h(NS.Switch,{label:"Dark"}):null,
    NS.Logo?h(NS.Logo,{size:28}):null
  );
  ReactDOM.createRoot(document.getElementById('root')).render(App);
}catch(e){ mountErr=String(e).slice(0,120); }
setTimeout(()=>{
  const root=document.getElementById('root');
  mountedTags = root.querySelectorAll('*').length;
  hasBtnClass = !!root.querySelector('.cs-button');
  hasStatValue = !!root.querySelector('.cs-stat__value') || /128/.test(root.innerText);
  step("components mount without error", !mountErr, mountErr||"");
  step("rendered real DOM (.cs-button + Stat)", hasBtnClass && mountedTags>3, mountedTags+" nodes");
  const btn = root.querySelector('.cs-button');
  const bg = btn?getComputedStyle(btn).backgroundColor:"";
  step("component picks up brand token (umber button)", /69, ?33, ?14/.test(bg), bg);
  window.__smoke = out;
  document.getElementById('report').textContent =
    "CONSUMER SMOKE TEST — "+(out.pass?"✓ PASS":"✗ FAIL")+"\n\n"+out.steps.join("\n");
}, 500);
</script>
</body></html>
