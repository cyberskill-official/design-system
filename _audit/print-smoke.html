<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>CyberSkill — print smoke</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--cs-font-family-ui);background:#efe6d8;color:#231a12;padding:16px 20px}
  h1{font-size:16px;margin:0 0 6px}.lede{font-size:13px;color:#6b5d4f;max-width:900px;line-height:1.5}
  .row{font:12.5px ui-monospace,monospace;padding:4px 8px;border-radius:5px;margin:2px 0}
  .ok{background:#dcfce7;color:#166534}.bad{background:#FEE2E2;color:#B42318;font-weight:700}
  #sum{font-size:15px;font-weight:800;margin:12px 0}
</style></head><body>
<h1>Print smoke</h1>
<p class="lede">Fetches document-style templates and asserts they declare print ownership meta and A4-friendly page CSS hooks used by the export path. Verdict: <code>window.__printsmoke.pass</code>.</p>
<div id="list"></div><div id="sum">running…</div>
<script>
const list=document.getElementById('list');
const P=window.__gateProgress={done:0,total:2,current:'boot'};
function row(ok,t){const d=document.createElement('div');d.className='row '+(ok?'ok':'bad');d.textContent=(ok?'✓ ':'✗ ')+t;list.appendChild(d);}
(async()=>{
  P.current='manifest'; const M=await (await fetch('../_ds_manifest.json',{cache:'no-store'})).json();
  // Curated print-path documents (meta omelette-owns-print / @page A4) — not every template is a print doc.
  const docs=(M.templates||[]).filter(t=>/bod-report|finance-invoice|doc-style|vn-code-of-conduct|legal-msa/.test(t.entryPath||t.folder||''));
  const sample=docs.slice(0,8);
  P.current='scan'; P.done=1;
  const fails=[]; let okc=0;
  for(const t of sample){
    try{
      const html=await (await fetch('../'+t.entryPath,{cache:'no-store'})).text();
      const owns=/omelette-owns-print|name=["']omelette-owns-print/i.test(html);
      const page=/@page|size:\s*A4|size:\s*Letter/i.test(html);
      if(owns || page){ okc++; row(true, t.name||t.entryPath); }
      else { fails.push(t.entryPath); row(false, (t.name||t.entryPath)+' missing print meta/@page'); }
    }catch(e){ fails.push(t.entryPath+':'+e); row(false, String(e)); }
  }
  P.done=2; P.current='done';
  const pass=fails.length===0 && sample.length>0;
  window.__printsmoke={pass,ok:okc,total:sample.length,fails};
  const s=document.getElementById('sum');
  s.textContent=pass?('✓ PASS — '+okc+'/'+sample.length+' print-ready docs'):('✗ FAIL — '+fails.length);
  s.style.color=pass?'#166534':'#B42318';
})().catch(e=>{ window.__printsmoke={pass:false,error:String(e)}; document.getElementById('sum').textContent='✗ '+e; });
</script></body></html>
