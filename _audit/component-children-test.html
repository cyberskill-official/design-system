<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<div id="report" style="font-family:monospace;padding:16px;white-space:pre"></div>
<script>
const NS = window.CyberSkillDesignSystem_847b3c || {};
const h = React.createElement;
const root = ReactDOM.createRoot(document.getElementById('root'));
// Each entry: mount the component WITH children (the pre-fix crash trigger)
const tests = [
  ["Checkbox", () => h(NS.Checkbox, {label:"A"}, "stray child")],
  ["Radio", () => h(NS.Radio, {label:"A"}, "stray child")],
  ["Switch", () => h(NS.Switch, {label:"A"}, "stray child")],
  ["SearchField", () => h(NS.SearchField, {}, "stray child")],
  ["NumberField", () => h(NS.NumberField, {}, "stray child")],
  ["Slider", () => h(NS.Slider, {}, "stray child")],
  ["Divider", () => h(NS.Divider, {}, "stray child")],
  ["TextField", () => h(NS.TextField, {label:"A"}, "stray child")],
];
const results = [];
class Boundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:String(e).slice(0,60)};}
  render(){return this.state.err ? h("span",null,"THREW: "+this.state.err) : this.props.children;}
}
window.__result = "pending";
try {
  root.render(h(React.Fragment, null, tests.map(([name,make],i)=>
    h("div",{key:i}, h(Boundary,null,make()))
  )));
  setTimeout(()=>{
    const missing = tests.filter(([n])=>!NS[n]).map(([n])=>n);
    const threw = document.body.innerText.includes("THREW");
    window.__result = { allPresent: missing.length===0, missing, anyThrew: threw };
    document.getElementById('report').textContent = JSON.stringify(window.__result,null,2);
  }, 400);
} catch(e){ window.__result = {fatal:String(e)}; }
</script>
</body></html>
