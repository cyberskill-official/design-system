<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>CyberSkill — axe smoke</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--cs-font-family-ui);background:#efe6d8;color:#231a12;padding:16px 20px}
  h1{font-size:16px;margin:0 0 6px}.lede{font-size:13px;color:#6b5d4f;max-width:900px;line-height:1.5}
  .row{font:12.5px ui-monospace,monospace;padding:4px 8px;border-radius:5px;margin:2px 0;max-width:900px}
  .ok{background:#dcfce7;color:#166534}.bad{background:#FEE2E2;color:#B42318;font-weight:700}
  #sum{font-size:15px;font-weight:800;margin:12px 0}
  #stage{position:fixed;left:-6000px;top:0;width:800px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script src="./vendor/axe.min.js"></script>
</head><body>
<h1>Axe smoke</h1>
<p class="lede">Mounts a small bilingual component cluster and runs <b>axe-core</b> 4.10.0 (vendored at <code>_audit/vendor/axe.min.js</code>) serious/critical rules. Hard gate on the fast board. Verdict: <code>window.__axesmoke.pass</code>.</p>
<div id="list"></div><div id="sum">running…</div><div id="stage"></div>
<script>
const list=document.getElementById('list'), stage=document.getElementById('stage');
const P=window.__gateProgress={done:0,total:3,current:'boot'};
function row(ok,t){const d=document.createElement('div');d.className='row '+(ok?'ok':'bad');d.textContent=(ok?'✓ ':'✗ ')+t;list.appendChild(d);}
(async()=>{
  const fails=[];
  P.current='preflight'; P.done=0;
  if(typeof axe==='undefined'){ fails.push('axe-core vendor failed to load (_audit/vendor/axe.min.js)'); }
  const NS=window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))];
  if(!NS) fails.push('bundle namespace missing');
  if(fails.length){ finish(false,fails); return; }
  P.current='mount'; P.done=1;
  const h=React.createElement;
  const root=ReactDOM.createRoot(stage);
  root.render(h('div',{lang:'en',className:'cs-stack'},
    h(NS.Button,{children:'Save'}),
    h(NS.Alert,{tone:'info',children:'Axe cluster'}),
    h(NS.TextField,{label:'Name','aria-label':'Name'}),
    h(NS.Checkbox,{label:'Agree'})
  ));
  await new Promise(r=>setTimeout(r,200));
  P.current='axe'; P.done=2;
  try{
    const res=await axe.run(stage,{ runOnly:{type:'tag',values:['wcag2a','wcag2aa']}});
    const serious=(res.violations||[]).filter(v=>v.impact==='serious'||v.impact==='critical');
    row(serious.length===0, 'axe serious/critical: '+serious.length+' (total violations '+(res.violations||[]).length+')');
    serious.slice(0,8).forEach(v=>row(false, v.id+': '+v.help));
    finish(serious.length===0, serious.map(v=>v.id));
  }catch(e){ finish(false,[String(e)]); }
  function finish(pass, fails){
    P.current='done'; P.done=3;
    window.__axesmoke={pass,fails:fails||[]};
    const s=document.getElementById('sum');
    s.textContent=pass?'✓ PASS — no serious/critical axe hits':'✗ FAIL — '+(fails||[]).join(', ');
    s.style.color=pass?'#166534':'#B42318';
  }
})();
</script></body></html>
