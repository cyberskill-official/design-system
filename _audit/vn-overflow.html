<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>VN overflow audit</title>
<style>body{margin:0;font-family:system-ui}#f{border:0;width:1300px;height:1000px;background:#fff}#s{position:fixed;top:0;right:0;background:#111;color:#0f0;font:12px monospace;padding:6px 10px;z-index:9}</style>
</head><body>
<div id="s">idle</div>
<iframe id="f"></iframe>
<script>
const SLUGS = ["app-shell/AppShell","article/Article","auth/Auth","bod-deck/BodDeck","bod-investor-update/BodInvestorUpdate","bod-memo/BodMemo","bod-minutes/BodMinutes","bod-report/BodReport","bod-resolution/BodResolution","culture-event-invite/CultureEventInvite","dashboard/Dashboard","delivery-change-note/DeliveryChangeNote","delivery-kickoff/DeliveryKickoff","delivery-qbr-deck/DeliveryQbrDeck","delivery-runbook/DeliveryRunbook","delivery-status-email/DeliveryStatusEmail","email/Email","finance-dunning-email/FinanceDunningEmail","finance-expense-report/FinanceExpenseReport","finance-invoice/FinanceInvoice","finance-quote/FinanceQuote","hr-announcement/HrAnnouncement","hr-interview-kit/HrInterviewKit","hr-offboarding/HrOffboarding","hr-performance-review/HrPerformanceReview","hr-pip/HrPip","legal-msa/LegalMsa","legal-sow/LegalSow","marketing-campaign-brief/MarketingCampaignBrief","marketing-case-study/MarketingCaseStudy","marketing-launch/MarketingLaunch","marketing-newsletter/MarketingNewsletter","marketing-page/MarketingPage","marketing-press-release/MarketingPressRelease","marketing-social-kit/MarketingSocialKit","sales-one-pager/SalesOnePager","sales-proposal-deck/SalesProposalDeck","settings/Settings","slide-deck/SlideDeck","team-meeting-agenda/TeamMeetingAgenda","tech-incident-report/TechIncidentReport","tech-release-notes/TechReleaseNotes","tech-retro/TechRetro","tech-rfc/TechRfc"];
const f = document.getElementById('f'), s = document.getElementById('s');
const wait = ms => new Promise(r=>setTimeout(r,ms));
window.__vn = { done:0, total:SLUGS.length, results:[] };
function measure(doc, win){
  const diacritic = /[ăâđêôơưàáảãạằắẳẵặèéẻẽẹìíỉĩịòóỏõọùúủũụ]/i;
  const vnApplied = diacritic.test(doc.body.innerText||"");
  let clip=[], hclip=0;
  for(const el of doc.querySelectorAll('section,div,span,a,button,h1,h2,td,li,p')){
    const cs = win.getComputedStyle(el);
    const oy = cs.overflowY, ox = cs.overflowX, o = cs.overflow;
    if((oy==='hidden'||o==='hidden') && el.clientHeight>50 && el.scrollHeight-el.clientHeight>4){
      const t=(el.innerText||"").slice(0,42).replace(/\s+/g,' ').trim();
      clip.push((el.tagName.toLowerCase())+' +'+(el.scrollHeight-el.clientHeight)+'px "'+t+'"');
    }
    if((ox==='hidden'||o==='hidden') && cs.whiteSpace==='nowrap' && el.scrollWidth-el.clientWidth>3) hclip++;
  }
  const pageX = doc.documentElement.scrollWidth - win.innerWidth > 3;
  return { vnApplied, clipCount:clip.length, clip:clip.slice(0,4), hclipNowrap:hclip, pageOverflowX:pageX };
}
async function run(){
  for(const slug of SLUGS){
    s.textContent = (window.__vn.done+1)+'/'+SLUGS.length+' '+slug;
    const [dir,pas]=slug.split('/');
    await new Promise(res=>{
      f.onload = async () => {
        try{
          const win=f.contentWindow;
          for(let i=0;i<40 && !win.__dcRootName;i++) await wait(120); // wait for boot
          await wait(400);
          const root = win.__dcRootName && win.__dcRootName();
          if(win.__dcSetProps && root) win.__dcSetProps(root, { language:"Tiếng Việt" });
          await wait(1100); // re-render VN
          const m = measure(f.contentDocument, win);
          window.__vn.results.push(Object.assign({slug:dir}, m));
        }catch(e){ window.__vn.results.push({slug:dir, err:String(e).slice(0,80)}); }
        window.__vn.done++;
        res();
      };
      f.src = '../templates/'+dir+'/'+pas+'.dc.html';
    });
  }
  s.textContent = 'DONE '+window.__vn.results.length;
  window.__vn.complete = true;
}
run();
</script>
</body></html>
