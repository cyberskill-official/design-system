<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- NAMESPACE-PORTABILITY GUARD — the compiler names the bundle global
     window.CyberSkillDesignSystem_<6-hex-project-id>. That suffix is derived from
     the PROJECT ID, so it changes whenever this system is imported into another
     project. Any source file that HARDCODES a specific suffix (…_847b3c) breaks on
     re-import until someone global-replaces it. This guard fetches every
     manifest-indexed source (84 template entries + 56 cards) plus the bundle-consuming
     UI-kit pages and FAILS if any hardcodes a project-id suffix. The portable patterns
     are immune and expected: the prefix-resolver
       window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))]
     and the ds-base.js alias window.CyberSkillDS.  window.__nsguard holds the verdict. -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--cs-font-family-ui);background:var(--cs-color-surface-page);color:var(--cs-color-text-primary);padding:26px 30px;max-width:940px}
  h1{font-size:18px;margin:0 0 4px}h1 b{color:var(--cs-color-brand-umber)}
  .sub{color:var(--cs-color-text-muted);font-size:13px;margin:0 0 18px;line-height:1.55}
  .sub code{font-family:var(--cs-font-family-mono);font-size:11px;background:var(--cs-color-surface-raised);border-radius:4px;padding:0 4px}
  #report{font-family:var(--cs-font-family-mono);font-size:12px;line-height:1.65;white-space:pre-wrap;border:1px solid var(--cs-color-border-default);border-radius:10px;background:var(--cs-color-surface-panel);padding:16px 18px}
  #report.pass{border-color:#166534}#report.fail{border-color:var(--cs-color-danger,#B42318)}
  .b{display:inline-block;font-weight:800;font-size:13px;padding:2px 10px;border-radius:999px;margin-bottom:10px}
  .b.pass{background:#DCFCE7;color:#166534}.b.fail{background:#FEE2E2;color:#B42318}
</style>
</head><body>
<h1><b>CyberSkill</b> · Namespace-portability guard</h1>
<p class="sub">Fails if any manifest-indexed source hardcodes the compiler's project-id namespace suffix (e.g. <code>CyberSkillDesignSystem_847b3c</code>) instead of resolving it by prefix or via the <code>window.CyberSkillDS</code> alias. Verdict on <code>window.__nsguard</code>.</p>
<div id="report">running…</div>
<script>
const out = { steps: [], pass: true, offenders: [] };
function step(name, ok, detail){ out.steps.push((ok?"\u2713 ":"\u2717 ")+name+(detail?" \u2014 "+detail:"")); if(!ok) out.pass=false; }

// Matches a HARDCODED suffix (…_ + 6 literal hex). Does NOT match the portable
// prefix-resolver / alias regexes (there the char after the underscore is "[").
const BAD = /CyberSkillDesignSystem_[0-9a-f]{6}/;

async function get(path){
  try { const r = await fetch('../'+path); if(!r.ok) return {path, err:'HTTP '+r.status}; return {path, text: await r.text()}; }
  catch(e){ return {path, err:String(e).slice(0,60)}; }
}
async function pool(paths, n){
  const res=[]; let i=0;
  async function worker(){ while(i<paths.length){ const p=paths[i++]; res.push(await get(p)); } }
  await Promise.all(Array.from({length:Math.min(n,paths.length)}, worker));
  return res;
}

(async () => {
  const mr = await get('_ds_manifest.json');
  if (mr.err){ step('fetch manifest', false, mr.err); return finish(); }
  const M = JSON.parse(mr.text);

  const templatePaths = M.templates.map(t => t.entryPath);
  const cardPaths     = M.cards.map(c => c.path);
  // Bundle-consuming pages NOT in the manifest (UI-kit React page + the raw standalone email).
  const extraPaths    = ['ui_kits/website/chat.html', 'templates/email/Email-VN-standalone.html'];
  const all = [...templatePaths, ...cardPaths, ...extraPaths];

  const results = await pool(all, 24);
  const missing = results.filter(r => r.err);
  const scanned = results.filter(r => r.text);
  for (const r of scanned){
    const m = r.text.match(BAD);
    if (m) out.offenders.push(r.path + '  (\u00ab' + m[0] + '\u00bb)');
  }

  step('manifest indexes the full set', templatePaths.length>50 && cardPaths.length>40,
       templatePaths.length+' templates + '+cardPaths.length+' cards + '+extraPaths.length+' kit pages');
  step('all sources fetched', missing.length===0,
       missing.length? ('could not fetch: '+missing.map(m=>m.path+' ('+m.err+')').slice(0,6).join(', ')) : (scanned.length+' files read'));
  step('no source hardcodes a project-id namespace suffix', out.offenders.length===0,
       out.offenders.length? (out.offenders.length+' offender(s):\n    '+out.offenders.join('\n    ')) : ('scanned '+scanned.length+' files'));

  // Positive proof the portable machinery is actually present.
  const dsbase = await get('templates/app-shell/ds-base.js');
  step('ds-base.js publishes the stable window.CyberSkillDS alias',
       !!dsbase.text && /window\.CyberSkillDS\s*=/.test(dsbase.text),
       dsbase.err || '');
  const anyTpl = scanned.find(r => templatePaths.includes(r.path) && /component-from-global-scope/.test(r.text));
  step('templates mount components via the CyberSkillDS alias',
       !!anyTpl && /component-from-global-scope="CyberSkillDS\./.test(anyTpl.text),
       anyTpl ? anyTpl.path : 'no template with component-from-global-scope found');

  finish();
})().catch(e => { step('guard ran', false, String(e).slice(0,140)); finish(); });

function finish(){
  const r = document.getElementById('report');
  r.className = out.pass ? 'pass' : 'fail';
  r.innerHTML = '<span class="b '+(out.pass?'pass':'fail')+'">'+(out.pass?'\u2713 PASS':'\u2717 FAIL')+'</span>\nNAMESPACE-PORTABILITY GUARD\n\n'+out.steps.join('\n');
  window.__nsguard = out;
}
</script>
</body></html>
