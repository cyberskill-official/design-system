<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CyberSkill · Tokens</title>
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}html,body{height:100%}
  body{margin:0;font-family:var(--cs-font-family-ui);background:var(--cs-color-surface-page);color:var(--cs-color-text-primary);display:flex;flex-direction:column}
  .bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px;padding:12px 16px;background:var(--cs-color-surface-panel);border-block-end:1px solid var(--cs-color-border-default)}
  .bar h1{font-size:15px;font-weight:800;margin:0;letter-spacing:-.01em}
  .bar h1 b{color:var(--cs-color-brand-umber)}
  [data-theme="dark"] .bar h1 b{color:var(--cs-color-brand-ochre)}
  .modes{display:flex;gap:4px;padding:3px;border-radius:999px;background:var(--cs-color-surface-page);border:1px solid var(--cs-color-border-default)}
  .modes button{appearance:none;border:0;background:transparent;font:600 12.5px var(--cs-font-family-ui);padding:6px 12px;border-radius:999px;cursor:pointer;color:var(--cs-color-text-primary)}
  .modes button[aria-pressed="true"]{background:var(--cs-color-brand-umber);color:var(--cs-color-text-inverse)}
  .filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-inline-start:auto}
  .filters input,.filters select{font:inherit;font-size:12.5px;padding:6px 10px;border-radius:8px;border:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-page);color:var(--cs-color-text-primary);min-width:0}
  .filters input{width:min(220px,40vw)}
  .meta{font:12px/1.4 var(--cs-font-family-mono);font-weight:600;color:var(--cs-color-text-primary)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;background:var(--cs-color-surface-panel);border-block-end:1px solid var(--cs-color-border-default)}
  .chips button{appearance:none;border:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-page);color:var(--cs-color-text-primary);font:600 11.5px var(--cs-font-family-ui);padding:5px 10px;border-radius:999px;cursor:pointer}
  .chips button[aria-pressed="true"]{background:var(--cs-color-brand-umber);color:var(--cs-color-text-inverse);border-color:var(--cs-color-brand-umber)}
  .chips button .n{font-family:var(--cs-font-family-mono);font-size:10px;opacity:.85;margin-inline-start:4px}
  .panel{flex:1;min-height:0;overflow:auto}
  .panel.hide{display:none}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:start;padding:8px 12px;border-block-end:1px solid var(--cs-color-border-default);vertical-align:top}
  th{position:sticky;top:0;background:var(--cs-color-surface-panel);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--cs-color-text-primary);z-index:1;font-weight:800}
  tr:hover td{background:var(--cs-color-surface-raised)}
  .swatch{display:inline-block;width:14px;height:14px;border-radius:4px;border:1px solid var(--cs-color-border-default);vertical-align:middle;margin-inline-end:6px}
  code{font-family:var(--cs-font-family-mono);font-size:12px}
  .path{font-family:var(--cs-font-family-mono);font-size:12px;word-break:break-all}
  .group{color:var(--cs-color-text-primary);opacity:.72;font-size:12px;font-weight:600}
  .copy{appearance:none;border:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-page);color:var(--cs-color-brand-umber);font:700 10.5px var(--cs-font-family-mono);padding:3px 7px;border-radius:6px;cursor:pointer;margin-inline-start:6px}
  .copy:hover{border-color:var(--cs-color-brand-ochre)}
  .copy.ok{background:#dcfce7;color:#166534;border-color:#16a34a55}
  #raw{margin:0;padding:16px 18px;font:12px/1.5 var(--cs-font-family-mono);white-space:pre;overflow:auto;min-height:100%;background:var(--cs-color-surface-panel);color:var(--cs-color-text-primary)}
  .empty{padding:28px;color:var(--cs-color-text-primary);font-size:13.5px}
  .src{font-size:12px;color:var(--cs-color-text-primary);font-weight:600}
  .src select{font:inherit;font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-page);color:var(--cs-color-text-primary)}
  .toast{position:fixed;inset-block-end:16px;inset-inline-end:16px;background:var(--cs-color-brand-umber);color:var(--cs-color-text-inverse);font:600 12.5px var(--cs-font-family-ui);padding:8px 12px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .15s}
  .toast.on{opacity:1}
</style>
</head>
<body data-chrome="tokens-viewer">
<div class="bar">
  <h1><b>Tokens</b></h1>
  <div class="modes" role="group" aria-label="View mode">
    <button type="button" id="modeTable" aria-pressed="true">Table</button>
    <button type="button" id="modeRaw" aria-pressed="false">Raw</button>
  </div>
  <div class="filters" id="tableFilters">
    <input id="q" type="search" placeholder="Filter path or value…" autocomplete="off">
    <span class="meta" id="count"></span>
  </div>
  <div class="src">
    Source
    <select id="source" aria-label="Token source">
      <option value="tokens.dtcg.json">tokens.dtcg.json (W3C)</option>
      <option value="tokens.json">tokens.json</option>
    </select>
  </div>
</div>
<div class="chips" id="chips" aria-label="Token groups"></div>
<div class="panel" id="tablePanel">
  <table>
    <thead><tr><th>Token</th><th>Group</th><th>Value</th><th>Type</th><th>Copy</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <p class="empty hide" id="empty">No tokens match this filter.</p>
</div>
<pre class="panel hide" id="raw"></pre>
<div class="toast" id="toast" role="status">Copied</div>
<script>
const tbody=document.getElementById('tbody');
const empty=document.getElementById('empty');
const countEl=document.getElementById('count');
const qEl=document.getElementById('q');
const sourceEl=document.getElementById('source');
const rawEl=document.getElementById('raw');
const tablePanel=document.getElementById('tablePanel');
const tableFilters=document.getElementById('tableFilters');
const modeTable=document.getElementById('modeTable');
const modeRaw=document.getElementById('modeRaw');
const chipsEl=document.getElementById('chips');
const toast=document.getElementById('toast');

let rows=[];
let rawText='';
let mode='table';
let activeGroup='';
let lastCopied='';

function isColor(v){
  if(typeof v!=='string') return false;
  return /^#([0-9a-f]{3,8})$/i.test(v.trim()) || /^rgba?\(/i.test(v) || /^oklch\(/i.test(v) || /^hsl/i.test(v);
}
function fmt(v){
  if(v==null) return '';
  if(typeof v==='object') return JSON.stringify(v);
  return String(v);
}
function flattenDtcg(obj, path='', group=''){
  const out=[];
  if(!obj || typeof obj!=='object') return out;
  const hasValue = Object.prototype.hasOwnProperty.call(obj,'$value') || Object.prototype.hasOwnProperty.call(obj,'value');
  if(hasValue){
    const value = obj.$value!==undefined ? obj.$value : obj.value;
    const type = obj.$type || obj.type || '';
    out.push({path: path || '(root)', group: group || path.split('.')[0] || '', value, type});
    return out;
  }
  for(const [k,v] of Object.entries(obj)){
    if(k.startsWith('$')) continue;
    const nextPath = path ? path+'.'+k : k;
    const nextGroup = path ? group : k;
    if(v && typeof v==='object') out.push(...flattenDtcg(v, nextPath, nextGroup || k));
    else out.push({path: nextPath, group: nextGroup || k, value: v, type: typeof v});
  }
  return out;
}
function flattenTokensJson(data){
  const out=[];
  const root = data.root || data;
  if(!root || typeof root!=='object') return out;
  for(const [group, bag] of Object.entries(root)){
    if(group.startsWith('$')) continue;
    if(!bag || typeof bag!=='object'){
      out.push({path: group, group: 'root', value: bag, type: typeof bag});
      continue;
    }
    for(const [name, value] of Object.entries(bag)){
      if(name.startsWith('$')) continue;
      if(value && typeof value==='object' && !Array.isArray(value) && (value.value!==undefined || value.$value!==undefined)){
        out.push({path: name, group, value: value.value!==undefined?value.value:value.$value, type: value.type||value.$type||''});
      } else {
        out.push({path: name, group, value, type: typeof value});
      }
    }
  }
  for(const scope of ['themes','elements']){
    const block = data[scope];
    if(!block || typeof block!=='object') continue;
    for(const [scopeName, bag] of Object.entries(block)){
      if(!bag || typeof bag!=='object') continue;
      for(const [name, value] of Object.entries(bag)){
        out.push({path: name, group: scope+'.'+scopeName, value, type: typeof value});
      }
    }
  }
  return out;
}
function setMode(next){
  mode=next;
  modeTable.setAttribute('aria-pressed', mode==='table'?'true':'false');
  modeRaw.setAttribute('aria-pressed', mode==='raw'?'true':'false');
  tablePanel.classList.toggle('hide', mode!=='table');
  rawEl.classList.toggle('hide', mode!=='raw');
  tableFilters.style.visibility = mode==='table'?'visible':'hidden';
  chipsEl.style.display = mode==='table'?'flex':'none';
}
function showToast(msg){
  toast.textContent=msg;
  toast.classList.add('on');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>toast.classList.remove('on'),1200);
}
async function copyText(text, label){
  lastCopied=text;
  let ok=false;
  try{ await navigator.clipboard.writeText(text); ok=true; }catch(e){
    try{
      const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
      ok=document.execCommand('copy'); ta.remove();
    }catch(e2){}
  }
  showToast(ok?('Copied '+label):'Copy blocked — value selected in memory');
  window.__csTokensLastCopy={ok, text, label, at:Date.now()};
  return ok;
}
function filteredRows(){
  const q=(qEl.value||'').trim().toLowerCase();
  return rows.filter(r=>{
    if(activeGroup && r.group!==activeGroup) return false;
    if(!q) return true;
    return (r.path+' '+fmt(r.value)+' '+r.group+' '+(r.type||'')).toLowerCase().includes(q);
  });
}
function renderChips(){
  const counts=new Map();
  for(const r of rows) counts.set(r.group, (counts.get(r.group)||0)+1);
  const groups=[...counts.keys()].sort();
  chipsEl.innerHTML='';
  const all=document.createElement('button');
  all.type='button'; all.setAttribute('aria-pressed', activeGroup===''?'true':'false');
  all.innerHTML='All<span class="n">'+rows.length+'</span>';
  all.onclick=()=>{ activeGroup=''; renderChips(); renderTable(); };
  chipsEl.appendChild(all);
  for(const g of groups){
    const b=document.createElement('button');
    b.type='button'; b.setAttribute('aria-pressed', activeGroup===g?'true':'false');
    b.innerHTML=esc(g)+'<span class="n">'+counts.get(g)+'</span>';
    b.onclick=()=>{ activeGroup = activeGroup===g ? '' : g; renderChips(); renderTable(); };
    chipsEl.appendChild(b);
  }
}
function renderTable(){
  const filtered=filteredRows();
  countEl.textContent = filtered.length+' / '+rows.length;
  tbody.innerHTML='';
  empty.classList.toggle('hide', filtered.length>0);
  const frag=document.createDocumentFragment();
  for(const r of filtered){
    const tr=document.createElement('tr');
    const val=fmt(r.value);
    const sw = isColor(val) ? '<span class="swatch" style="background:'+val.replace(/"/g,'')+'"></span>' : '';
    tr.innerHTML = '<td class="path">'+esc(r.path)+'</td>'
      +'<td class="group">'+esc(r.group)+'</td>'
      +'<td>'+sw+'<code>'+esc(val)+'</code></td>'
      +'<td class="group">'+esc(r.type||'')+'</td>'
      +'<td><button type="button" class="copy" data-copy="path" data-v="'+esc(r.path)+'">path</button>'
      +'<button type="button" class="copy" data-copy="value" data-v="'+esc(val)+'">value</button></td>';
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
  tbody.querySelectorAll('.copy').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const ok=await copyText(btn.getAttribute('data-v')||'', btn.getAttribute('data-copy')||'token');
      if(ok){ btn.classList.add('ok'); setTimeout(()=>btn.classList.remove('ok'),900); }
    });
  });
  window.__csTokensViewer={rows:rows.length, filtered:filtered.length, group:activeGroup||null, mode, lastCopied};
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
async function load(){
  const file=sourceEl.value;
  const r=await fetch('./'+file,{cache:'no-store'});
  rawText=await r.text();
  rawEl.textContent=rawText;
  let data;
  try{ data=JSON.parse(rawText); }catch(e){ rows=[]; renderChips(); renderTable(); return; }
  rows = file.includes('dtcg') ? flattenDtcg(data) : flattenTokensJson(data);
  rows.sort((a,b)=>a.path.localeCompare(b.path) || a.group.localeCompare(b.group));
  activeGroup='';
  renderChips();
  renderTable();
}
modeTable.onclick=()=>setMode('table');
modeRaw.onclick=()=>setMode('raw');
qEl.addEventListener('input',()=>{ clearTimeout(qEl._t); qEl._t=setTimeout(renderTable,120); });
sourceEl.addEventListener('change',load);
setMode('table');
load().catch(e=>{ rawEl.textContent=String(e); rows=[]; renderChips(); renderTable(); });
</script>
</body>
</html>
