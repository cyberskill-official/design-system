<!-- @dsCard group="Colors" viewport="700x210" name="Brand anchors" subtitle="Umber + Ochre — immutable" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; font-family: var(--cs-font-family-ui); }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--cs-radius-lg); padding: 16px; min-height: 132px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--cs-color-border-default); }
  .umber { background: #45210E; color: #F4BA17; }
  .ochre { background: #F4BA17; color: #45210E; }
  .nm { font-weight: 800; font-size: 20px; letter-spacing: -.01em; }
  .hex { font-family: var(--cs-font-family-mono); font-size: 13px; margin-top: 4px; opacity: .95; }
  .ok { font-family: var(--cs-font-family-mono); font-size: 11px; opacity: .8; }
</style></head>
<body>
<div class="row">
  <div class="sw umber"><div class="nm">Umber</div><div class="hex">#45210E</div><div class="ok">oklch(0.265 0.073 44.3) · primary brand</div></div>
  <div class="sw ochre"><div class="nm">Ochre</div><div class="hex">#F4BA17</div><div class="ok">oklch(0.811 0.162 83.7) · accent</div></div>
</div>
</body></html>
