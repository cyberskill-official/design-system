<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Redirect · Live is Storybook</title>
<meta name="robots" content="noindex" />
<script>
(function () {
  // Permanent move: Live View shell → Storybook hub at /playground/
  var path = location.pathname || '';
  var base = path.replace(/guidelines\/live-view\.html.*$/i, '');
  if (!/\/$/.test(base) && base.length) base += '/';
  var target = base + 'playground/' + (location.search || '') + (location.hash || '');
  location.replace(target);
})();
</script>
<meta http-equiv="refresh" content="0;url=../playground/" />
<link rel="canonical" href="../playground/" />
</head>
<body>
<p>Live View is now Storybook. <a href="../playground/">Continue to Live →</a></p>
<p>Portable Atomic View (zero-build): <a href="atomic-view.html">guidelines/atomic-view.html</a></p>
</body>
</html>
