<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing scale" subtitle="4px base grid · 0–96" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; font-family: var(--cs-font-family-ui); color: var(--cs-color-text-primary); }
  .r { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .bar { height: 16px; background: var(--cs-color-brand-ochre); border-radius: 3px; }
  .tok { font-family: var(--cs-font-family-mono); font-size: 11px; color: var(--cs-color-text-muted); width: 132px; flex: none; }
</style></head>
<body>
  <div class="r"><span class="tok">space-1 · 4</span><span class="bar" style="width:4px"></span></div>
  <div class="r"><span class="tok">space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="r"><span class="tok">space-3 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="r"><span class="tok">space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="r"><span class="tok">space-6 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="r"><span class="tok">space-8 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="r"><span class="tok">space-12 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="r"><span class="tok">space-16 · 64</span><span class="bar" style="width:64px"></span></div>
  <div class="r" style="margin-bottom:0"><span class="tok">space-24 · 96</span><span class="bar" style="width:96px"></span></div>
</body></html>
