<!-- @dsCard group="Type" viewport="700x230" name="Typefaces" subtitle="Be Vietnam Pro (UI) · JetBrains Mono (code)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; color: var(--cs-color-text-primary); }
  .fam { margin-bottom: 18px; }
  .k { font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); margin-bottom: 6px; }
  .ui { font-family: var(--cs-font-family-ui); }
  .mono { font-family: var(--cs-font-family-mono); }
  .big { font-size: 30px; font-weight: 700; letter-spacing: -.01em; }
  .set { font-size: 15px; color: var(--cs-color-text-muted); margin-top: 2px; }
</style></head>
<body>
<div class="fam">
  <div class="k">Be Vietnam Pro — UI / display</div>
  <div class="ui big">Turn Your Will Into Real</div>
  <div class="ui set">Hiện Thực Hoá Ý Chí · 300 400 500 600 700 800 · full Vietnamese diacritics</div>
</div>
<div class="fam" style="margin-bottom:0">
  <div class="k">JetBrains Mono — code / data</div>
  <div class="mono big" style="font-size:24px">--cs-color-brand-ochre</div>
  <div class="mono set">0123456789 · v1.5.1 · {} =&gt; () · 400 500 700</div>
</div>
</body></html>
