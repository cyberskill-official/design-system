<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--cs-font-family-ui); }
  .stage { min-height: 200px; padding: 32px 34px; display: flex; flex-direction: column; justify-content: center; }
  .k { font: 700 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .12em; color: var(--cs-color-brand-ochre); }
  .h { font-size: 30px; font-weight: 800; letter-spacing: -.02em; color: var(--cs-color-brand-ochre); margin: 8px 0 4px; }
  .p { font-size: 14px; opacity: .9; margin: 0; max-width: 460px; }
  .tok { font-family: var(--cs-font-family-mono); font-size: 12px; opacity: .8; margin-top: 12px; }
</style></head>
<body>
<div class="stage cs-aurora">
  <div class="k">Signature hero wash</div>
  <div class="h">Turn Your Will Into Real</div>
  <p class="p">Warm gold particle light over deep umber — the brand's hero background, CSS-only (no image needed).</p>
  <div class="tok">class="cs-aurora"</div>
</div>
</body></html>
