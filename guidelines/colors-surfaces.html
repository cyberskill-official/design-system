<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces" subtitle="Warm paper → panel → raised" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; font-family: var(--cs-font-family-ui); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--cs-radius-md); min-height: 96px; border: 1px solid var(--cs-color-border-default); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .nm { font-weight: 700; font-size: 13px; color: var(--cs-color-text-primary); }
  .hex { font-family: var(--cs-font-family-mono); font-size: 12px; color: var(--cs-color-text-muted); margin-top: 2px; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#FFFDF8"><div class="nm">surface-page</div><div class="hex">#FFFDF8</div></div>
  <div class="sw" style="background:#FFFFFF"><div class="nm">surface-panel</div><div class="hex">#FFFFFF</div></div>
  <div class="sw" style="background:#FBF4E9"><div class="nm">surface-raised</div><div class="hex">#FBF4E9</div></div>
  <div class="sw" style="background:#E7D9C6"><div class="nm">border-default</div><div class="hex">#E7D9C6</div></div>
</div>
</body></html>
