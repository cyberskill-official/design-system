<!DOCTYPE html>

<link rel="stylesheet" href="../styles.css" />
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--cs-font-family-ui);color:var(--cs-color-text-primary);background:var(--cs-color-surface-raised)}
  .app{display:grid;grid-template-columns:264px 1fr;min-height:100vh}
  /* --- chrome (always base brand, never reskinned) --- */
  .nav{position:sticky;top:0;align-self:start;height:100vh;overflow:auto;border-inline-end:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-panel);padding:16px 12px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;color:var(--cs-color-text-primary);padding:4px 8px 12px}
  .brand small{font-weight:600;font-size:10.5px;color:var(--cs-color-text-muted);letter-spacing:.04em;text-transform:uppercase}
  .navsearch{width:100%;border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-md);background:var(--cs-color-surface-raised);padding:8px 10px;font:inherit;font-size:13px;margin-bottom:10px;color:var(--cs-color-text-primary)}
  .navgroup{border-top:1px solid var(--cs-color-border-default);margin-top:6px;padding-top:2px}
  .navgroup:first-of-type{border-top:0;margin-top:0}
  .navtier{width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;font:700 10.5px/1.4 var(--cs-font-family-ui);text-transform:uppercase;letter-spacing:.1em;color:var(--cs-color-text-muted);padding:10px 8px 6px;background:none;border:0;cursor:pointer;text-align:start}
  .navtier:hover{color:var(--cs-color-text-primary)}
  .navtier em{font-style:normal;font-family:var(--cs-font-family-mono);font-size:10px;opacity:.8}
  .navlink{display:flex;justify-content:space-between;gap:8px;text-decoration:none;color:var(--cs-color-text-primary);font-size:13px;padding:5px 8px;border-radius:var(--cs-radius-sm)}
  .navlink:hover{background:var(--cs-color-surface-raised)}
  .navlink em{color:var(--cs-color-text-muted);font-style:normal;font-family:var(--cs-font-family-mono);font-size:10.5px}
  main{min-width:0}
  .toolbar{position:sticky;top:0;z-index:20;display:flex;flex-wrap:wrap;align-items:center;gap:14px 18px;padding:12px 22px;background:color-mix(in oklab,var(--cs-color-surface-panel) 88%,transparent);backdrop-filter:blur(8px);border-block-end:1px solid var(--cs-color-border-default)}
  .toolbar h1{font-size:15px;margin:0;letter-spacing:-.01em}
  .ctl{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--cs-color-text-muted)}
  .ctl select{font:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-sm);background:var(--cs-color-surface-panel);color:var(--cs-color-text-primary)}
  .count{margin-inline-start:auto;font-size:12px;color:var(--cs-color-text-muted);font-family:var(--cs-font-family-mono)}
  /* --- canvas (reskinned by the axis attrs) --- */
  #canvas{background:var(--cs-color-surface-page);padding:8px 22px 60px;min-height:calc(100vh - 52px)}
  .tierhead{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:30px 0 4px;padding-top:10px;scroll-margin-top:64px}
  .tierhead .sub{display:block;font-size:12.5px;font-weight:500;color:var(--cs-color-text-muted);letter-spacing:0}
  .story{border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);background:var(--cs-color-surface-panel);margin:16px 0;overflow:hidden;scroll-margin-top:64px}
  .story>header{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:11px 16px;border-block-end:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-raised)}
  .story h3{margin:0;font-size:14.5px;font-weight:700}
  .story .grp{font-size:11px;color:var(--cs-color-text-muted)}
  .story .exp{margin-inline-start:auto;font-family:var(--cs-font-family-mono);font-size:10.5px;color:var(--cs-color-text-muted)}
  .story .perma{text-decoration:none;color:var(--cs-color-text-muted);font-family:var(--cs-font-family-mono);font-size:12px;padding:0 4px;border-radius:4px}
  .story .perma:hover{color:var(--cs-color-brand-umber);background:var(--cs-color-surface-raised)}
  .canvasbox{padding:20px 18px}
  .framed{position:relative;z-index:0;min-height:250px;overflow:hidden;background:var(--cs-color-surface-raised);border-radius:var(--cs-radius-md)}
  .framed .cs-dialog-layer,.framed .cs-drawer-scrim,.framed .cs-drawer,.framed .cs-toast-stack,.framed .cs-popover-layer{position:absolute}
  .framed .cs-cmdk-scrim{position:static;inset:auto;background:transparent;padding:0;display:block;min-block-size:0}
  .framed .cs-cmdk{inline-size:100%;box-shadow:none;position:static;margin:0}
  .framed .cs-drawer-scrim,.framed .cs-drawer{animation:none}
  .framed .cs-dialog{top:22px}
  .srow{display:flex;flex-wrap:wrap;align-items:center;gap:12px}
  .scol{display:grid;gap:14px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px 22px;align-items:start}
  .icells{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:9px}
  .icell{display:grid;place-items:center;gap:7px;padding:12px 4px;border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-md);background:var(--cs-color-surface-panel)}
  .icell span{font-family:var(--cs-font-family-mono);font-size:10.5px;color:var(--cs-color-text-muted)}
  .miss{color:var(--cs-color-semantic-danger);font-size:13px;font-family:var(--cs-font-family-mono)}
  .pglabel{font:700 10px/1 var(--cs-font-family-mono);text-transform:uppercase;letter-spacing:.08em;color:var(--cs-color-text-muted);margin-bottom:8px}
  .controls{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;padding:10px 12px;margin-bottom:14px;border:1px dashed var(--cs-color-border-default);border-radius:var(--cs-radius-md);background:var(--cs-color-surface-raised)}
  .controls label{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--cs-color-text-muted)}
  .controls select,.controls input[type=text]{font:inherit;font-size:12px;padding:3px 6px;border:1px solid var(--cs-color-border-default);border-radius:4px;background:var(--cs-color-surface-panel);color:var(--cs-color-text-primary)}
  .cstage{padding:4px 0 16px;border-bottom:1px dashed var(--cs-color-border-default);margin-bottom:16px}
  .tpltier{display:grid;gap:16px}
  .tpl{border:1px solid var(--cs-color-border-default);border-radius:var(--cs-radius-lg);overflow:hidden;background:var(--cs-color-surface-panel);scroll-margin-top:64px}
  .tpl>header{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 14px;border-block-end:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-raised);font-size:13px;font-weight:700}
  .tpl>header a{font:inherit;font-weight:600;font-size:11px;color:var(--cs-color-link);text-decoration:none}
  .tpl iframe{width:100%;height:470px;border:0;display:block;background:#fff}
  @media (max-width:820px){.app{grid-template-columns:1fr}.nav{display:none}.grid2{grid-template-columns:1fr}}
</style>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const NS = window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))] || {};
const {
  Button, Icon, Badge, Tag, Alert, Toast, ToastStack, Spinner, ProgressBar, Skeleton, StatusIndicator, EmptyState,
  TextField, Select, Checkbox, RadioGroup, Switch, Textarea, SearchField, NumberField, Slider, FileUpload, SegmentedControl,
  Tabs, Breadcrumb, Pagination, Menu, MenuItem, Sidebar, NavItem, Steps, CommandPalette,
  DataTable, Card, CardHeader, CardBody, CardFooter, Stat, Avatar, AvatarGroup, Tooltip, Divider,
  List, ListItem, DescriptionList, Timeline, Accordion, Kbd, CodeBlock, Dialog, Drawer, Popover,
  PromptInput, ChatMessage, ConfidenceMeter, AIDisclosureBadge, HumanReviewGate, PromptSuggestions, TypingIndicator, CitationList,
  LumiAvatar, Logo, Toggle, Rating, InputOTP, ButtonGroup, Combobox, InputGroup, TagInput, Calendar, DatePicker, TimePicker,
  HoverCard, Popconfirm, ContextMenu, FloatingActionButton, Result, InlineEdit, Link, Anchor, Image, Toolbar,
  Menubar, NavigationMenu, Carousel, Comment, Form, FormField, Tree, BackTop, Watermark, TreeSelect, Cascader, Transfer, Mentions,
  ColorPicker, Tour, QRCode, Masonry, Splitter, HotKeys, Dock, DataGrid, TreeTable, Sortable, Chart, Editor, Terminal
} = NS;

const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g,"-");
const Miss = ({n}) => <div className="miss">⚠ {n} not found on bundle</div>;
const has = (...c) => c.every(Boolean);

// ---- live controls panel (Storybook-style) ----
function Ctl({c,val,onCh}){
  if(c.type==="toggle") return <label><input type="checkbox" checked={val} onChange={(e)=>onCh(e.target.checked)}/>{c.k}</label>;
  if(c.type==="text") return <label>{c.k}<input type="text" value={val} onChange={(e)=>onCh(e.target.value)}/></label>;
  if(c.type==="range") return <label>{c.k}<input type="range" min={c.min} max={c.max} step={c.step} value={val} onChange={(e)=>onCh(+e.target.value)}/><b style={{fontFamily:"var(--cs-font-family-mono)",fontWeight:400,fontSize:11}}>{val}</b></label>;
  return <label>{c.k}<select value={val} onChange={(e)=>onCh(e.target.value)}>{c.options.map(o=><option key={o} value={o}>{o}</option>)}</select></label>;
}
function Controlled({spec}){
  const init={}; spec.controls.forEach(c=>init[c.k]=c.def);
  const [v,setV]=useState(init);
  return <div>
    <div className="pglabel">Playground — live props</div>
    <div className="controls">{spec.controls.map(c=><Ctl key={c.k} c={c} val={v[c.k]} onCh={(nv)=>setV(s=>({...s,[c.k]:nv}))}/>)}</div>
    <div className="cstage">{spec.renderC(v)}</div>
  </div>;
}

// ---- stateful demo wrappers (hooks must live in a stable component) ----
function TabsD({L}){ const [v,setV]=useState("board"); const V=L==="vi"; return has(Tabs)?<Tabs value={v} onChange={setV} tabs={[{value:"board",label:V?"Bảng công việc":"Board"},{value:"table",label:V?"Bảng dữ liệu":"Table",count:6},{value:"rel",label:V?"Phát hành":"Releases"}]}/>:<Miss n="Tabs"/>; }
function PaginationD(){ const [p,setP]=useState(3); return has(Pagination)?<Pagination page={p} pageCount={12} onChange={setP}/>:<Miss n="Pagination"/>; }
function SegmentedD({L}){ const [v,setV]=useState("board"); const V=L==="vi"; return has(SegmentedControl)?<SegmentedControl value={v} onChange={setV} options={[{value:"board",label:V?"Bảng công việc":"Board"},{value:"table",label:V?"Bảng dữ liệu":"Table"},{value:"rel",label:V?"Phát hành":"Releases"}]}/>:<Miss n="SegmentedControl"/>; }
function SliderD(){ const [v,setV]=useState(60); return has(Slider)?<div style={{flex:1,minWidth:200}}><Slider min={0} max={100} value={v} onChange={(e)=>setV(+e.target.value)}/></div>:<Miss n="Slider"/>; }
function SearchD({L}){ const [q,setQ]=useState("Design System"); return has(SearchField)?<div style={{flex:1,minWidth:240}}><SearchField value={q} onChange={setQ} placeholder={L==="vi"?"Tìm dự án…":"Search projects…"}/></div>:<Miss n="SearchField"/>; }
function NumberD(){ const [n,setN]=useState(3); return has(NumberField)?<NumberField value={n} onChange={setN} min={1} max={20}/>:<Miss n="NumberField"/>; }
function DateD({L}){ const [d,setD]=useState(()=>new Date(2026,6,18)); const [tm,setTm]=useState("09:30"); return <div className="srow" style={{alignItems:"flex-start",minHeight:400}}>{has(DatePicker)?<DatePicker value={d} onChange={setD}/>:<Miss n="DatePicker"/>}{has(TimePicker)?<TimePicker value={tm} onChange={setTm} step={15}/>:<Miss n="TimePicker"/>}</div>; }
function CalD({L}){ const [d,setD]=useState(()=>new Date(2026,6,18)); return has(Calendar)?<Calendar value={d} onChange={setD}/>:<Miss n="Calendar"/>; }
function ColorD({L}){ const [c,setC]=useState("#F4BA17"); return has(ColorPicker)?<div style={{minHeight:210}}><ColorPicker value={c} onChange={setC}/></div>:<Miss n="ColorPicker"/>; }
function TourD({L}){ const [on,setOn]=useState(false); return has(Tour,Button)?<div><Button size="sm" variant="secondary" onClick={()=>setOn(true)}>{L==="vi"?"Bắt đầu hướng dẫn":"Start tour"}</Button><Tour open={on} onClose={()=>setOn(false)} steps={L==="vi"?[{target:"#toggle",title:"Toggle",body:"Nút bật/tắt đứng độc lập."},{target:"#rating",title:"Rating",body:"Đánh giá sao màu Ochre."}]:[{target:"#toggle",title:"Toggle",body:"A standalone pressable button."},{target:"#rating",title:"Rating",body:"Ochre star rating."}]}/></div>:<Miss n="Tour"/>; }
function GridD({L}){ const [sel,setSel]=useState(["CDS"]); const V=L==="vi"; return has(DataGrid)?<DataGrid selectable selected={sel} onSelect={setSel} rowKey="key" height={220} columns={[{key:"key",header:V?"Mã":"Key",sortable:true},{key:"name",header:V?"Dự án":"Project",sortable:true},{key:"pct",header:V?"Tiến độ":"Progress",sortable:true,render:(r)=>r.pct+"%"}]} rows={[{key:"CDS",name:"Design System",pct:72},{key:"GENIE",name:"Lumi Genie",pct:58},{key:"SITE",name:"cyberskill.world",pct:84}]}/>:<Miss n="DataGrid"/>; }
function SortD({L}){ const [it,setIt]=useState(L==="vi"?[{key:"a",label:"Ước một điều"},{key:"b",label:"Định hình"},{key:"c",label:"Xây để ra mắt"}]:[{key:"a",label:"Make a wish"},{key:"b",label:"Shape it"},{key:"c",label:"Build to ship"}]); return has(Sortable)?<Sortable items={it} onChange={setIt}/>:<Miss n="Sortable"/>; }
function TreeSelD({L}){ const [k,setK]=useState("ds"); return has(TreeSelect)?<TreeSelect value={k} onChange={setK} nodes={L==="vi"?[{key:"p",label:"Nền tảng",children:[{key:"ds",label:"Design System"},{key:"tok",label:"Token Pipeline"}]},{key:"ai",label:"AI",children:[{key:"lumi",label:"Lumi Genie"}]}]:[{key:"p",label:"Platform",children:[{key:"ds",label:"Design System"},{key:"tok",label:"Token Pipeline"}]},{key:"ai",label:"AI",children:[{key:"lumi",label:"Lumi Genie"}]}]}/>:<Miss n="TreeSelect"/>; }
function CascD({L}){ const [p,setP]=useState(["hcm","d1"]); return has(Cascader)?<Cascader value={p} onChange={setP} nodes={[{key:"hcm",label:"TP.HCM",children:[{key:"d1",label:L==="vi"?"Quận 1":"District 1"},{key:"d3",label:L==="vi"?"Quận 3":"District 3"}]},{key:"hn",label:L==="vi"?"Hà Nội":"Hanoi",children:[{key:"hk",label:L==="vi"?"Hoàn Kiếm":"Hoan Kiem"}]}]}/>:<Miss n="Cascader"/>; }
function TransD({L}){ const [v,setV]=useState(["web"]); return has(Transfer)?<Transfer value={v} onChange={setV} items={L==="vi"?[{key:"web",label:"Ứng dụng web"},{key:"mob",label:"Ứng dụng di động"},{key:"auto",label:"Tự động hóa"},{key:"ds",label:"Design system"}]:[{key:"web",label:"Web apps"},{key:"mob",label:"Mobile apps"},{key:"auto",label:"Automation"},{key:"ds",label:"Design systems"}]}/>:<Miss n="Transfer"/>; }
function ComboD({L}){ const [v,setV]=useState("ai"); const V=L==="vi"; return has(Combobox)?<Combobox value={v} onChange={setV} label={V?"Nhóm":"Squad"} options={[{value:"plat",label:V?"Nền tảng":"Platform"},{value:"ai",label:"AI"},{value:"growth",label:V?"Tăng trưởng":"Growth"},{value:"design",label:V?"Thiết kế":"Design"}]}/>:<Miss n="Combobox"/>; }
function PromptD({L}){ const [q,setQ]=useState(L==="vi"?"Một trang thanh toán nhanh hơn cho cửa hàng":"A faster checkout for our shop"); return has(PromptInput)?<PromptInput value={q} onChange={setQ} onSubmit={()=>{}} placeholder={L==="vi"?"Ước một điều…":"Make a wish…"}/>:<Miss n="PromptInput"/>; }
function FormD({L}){ const [done,setDone]=useState(null); const V=L==="vi";
  return has(Form,FormField,TextField,Button)?<div style={{maxWidth:420}}>
    <Form rules={{email:["required",(v)=>/.+@.+\..+/.test(String(v||""))?null:(V?"Email chưa hợp lệ.":"Enter a valid email.")],wish:"required"}} onSubmit={(v)=>setDone(v)}>
      <FormField label={V?"Email công việc":"Work email"} required name="email"><TextField label={V?"Email công việc":"Work email"} placeholder="an@cyberskill.world"/></FormField>
      <FormField label={V?"Điều ước":"Your wish"} required name="wish" hint={V?"Một câu là đủ.":"One sentence is plenty."}><TextField label={V?"Điều ước":"Your wish"}/></FormField>
      <Button type="submit">{V?"Gửi":"Send"}</Button>
    </Form>
    {done?<p style={{font:"12px var(--cs-font-family-mono)",color:"var(--cs-color-text-muted)",marginTop:10}}>onSubmit → {JSON.stringify(done)}</p>:null}
  </div>:<Miss n="Form"/>; }

const ICONS=["close","sun","moon","arrow-right","check","sparkle","chat","sound-on","sound-off","search","sliders","upload","download","calendar","user","plus","trash","external","menu","chevron-down","chevron-up","chevron-left","chevron-right","edit","copy","info","alert-triangle"];

// ---- STORIES (grouped by atomic tier) ----
const STORIES = [
  // ============ ATOMS ============
  { tier:"Atom", name:"Button", grp:"Core", controls:[{k:"variant",type:"select",options:["primary","secondary","tertiary","ghost","danger","danger-ghost"],def:"primary"},{k:"size",type:"select",options:["xs","sm","md","lg"],def:"md"},{k:"disabled",type:"toggle",def:false},{k:"loading",type:"toggle",def:false}], renderC:(v)=> has(Button)?<Button variant={v.variant} size={v.size} disabled={v.disabled} loading={v.loading} icon={has(Icon)?<Icon name="sparkle"/>:null}>Make a wish</Button>:<Miss n="Button"/>, render:()=> has(Button)?<div className="scol">
      <div className="srow"><Button>Primary</Button><Button variant="secondary">Secondary</Button><Button variant="tertiary">Tertiary</Button><Button variant="ghost">Ghost</Button><Button variant="danger">Danger</Button><Button variant="danger-ghost">Danger ghost</Button></div>
      <div className="srow"><Button size="xs">XS</Button><Button size="sm">Small</Button><Button size="md">Medium</Button><Button size="lg">Large</Button></div>
      <div className="srow">{has(Icon)&&<Button icon={<Icon name="sparkle"/>}>Make a wish</Button>}<Button loading>Sending</Button><Button disabled>Disabled</Button></div>
    </div>:<Miss n="Button"/> },
  { tier:"Atom", name:"Toggle", grp:"Forms", controls:[{k:"disabled",type:"toggle",def:false}], renderC:(v)=> has(Toggle)?<Toggle disabled={v.disabled} icon={has(Icon)?<Icon name="sparkle" size="sm"/>:null}>Aurora wash</Toggle>:<Miss n="Toggle"/>, render:(L)=> has(Toggle)?<div className="srow"><Toggle defaultPressed>{L==="vi"?"Đậm":"Bold"}</Toggle><Toggle>{L==="vi"?"Nghiêng":"Italic"}</Toggle><Toggle disabled>{L==="vi"?"Vô hiệu":"Disabled"}</Toggle></div>:<Miss n="Toggle"/> },
  { tier:"Atom", name:"Link", grp:"Navigation", render:(L)=> has(Link)?<div className="srow" style={{gap:20}}><Link href="#" onClick={(e)=>e.preventDefault()}>{L==="vi"?"Chính sách":"Privacy"}</Link><Link href="#" variant="muted" onClick={(e)=>e.preventDefault()}>{L==="vi"?"Điều khoản":"Terms"}</Link><Link href="#" variant="standalone" onClick={(e)=>e.preventDefault()}>{L==="vi"?"Xem dự án":"See our work"}</Link><Link href="https://cyberskill.world" external>cyberskill.world</Link></div>:<Miss n="Link"/> },

// Force every axis on an external artifact via attribute-scoping on its <html>, so
// Templates/Pages honor the SAME toolbar as components (owner: axes on all artifacts).
function applyAxis(ifr, ax){
  try{
    const d=ifr.contentDocument, h=d&&d.documentElement; if(!h) return;
    (ax.theme&&ax.theme!=="light")?h.setAttribute("data-theme",ax.theme):h.removeAttribute("data-theme");
    ax.elm?h.setAttribute("data-cs-element",ax.elm):h.removeAttribute("data-cs-element");
    ax.elv?h.setAttribute("data-cs-variant",ax.elv):h.removeAttribute("data-cs-variant");
    if(ax.lang) h.setAttribute("lang", ax.lang);
    const w=ifr.contentWindow;
    if(ax.lang && w && w.__dcSetProps && w.__dcRootName){ const r=w.__dcRootName&&w.__dcRootName(); if(r) w.__dcSetProps(r,{language: ax.lang==="vi"?"Tiếng Việt":"English"}); }
  }catch(e){}
}
function Tile({ item, ax }){
  const ref=useRef(null);
  useEffect(()=>{ if(ref.current) applyAxis(ref.current, ax); });
  return <div className="tpl" id={"tpl-"+slug(item.name)}><header><span>{item.name}</span><a href={item.src} target="_blank" rel="noopener">open ↗</a></header>
    <iframe ref={ref} src={item.src} loading="lazy" title={item.name} onLoad={(e)=>applyAxis(e.target, ax)}></iframe></div>;
}
function ArtifactTier({ items, ax }){ return <div className="tpltier">{items.map(it=><Tile key={it.src} item={it} ax={ax}/>)}</div>; }

function Perma({id}){
  const [ok,setOk]=useState(false);
  return <a className="perma" href={"#"+id} title="Copy permalink" onClick={()=>{ const url=location.href.split("#")[0]+"#"+id; try{ navigator.clipboard.writeText(url).then(()=>{ setOk(true); setTimeout(()=>setOk(false),1200); }).catch(()=>{}); }catch(e){} }}>{ok?"\u2713":"#"}</a>;
}
function Story({ s, lang }){
  const L = lang === "vi" ? "vi" : "en";
  return (
    <section className="story" id={slug(s.name)}>
      <header><h3>{s.name}</h3><span className="grp">{s.grp}</span><span className="exp">{s.tier}</span><Perma id={slug(s.name)}/></header>
      <div className="canvasbox">
        {s.controls?<Controlled spec={s}/>:null}
        <div className={s.framed?"framed":""}>{s.render(L)}</div>
      </div>
    </section>
  );
}

  const [q,setQ]=useState("");

          </label>
          <label className="ctl">Language
            <select value={lang} onChange={(e)=>setLang(e.target.value)}>{LANGS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
          </label>
          <span className="count">{shown.length}/{STORIES.length}</span>
        </div>
        <div id="canvas" {...axis}>
          <div key={"lang-"+(lang||"def")}>
          {TIERS.map(t=>{ const items=shown.filter(s=>s.tier===t.id); if(!items.length) return null; return (
            <div key={t.id}>
              <h2 className="tierhead">{t.label}<span className="sub">{t.sub}</span></h2>
              {items.map(s=><Story s={s} key={s.name} lang={lang}/>)}
            </div>
          ); })}
          </div>
          {shownTpls.length>0 && <div><h2 className="tierhead" id="tier-templates">Templates<span className="sub">Starting-point artifacts ({shownTpls.length}) — live, and reskinned by the toolbar above (Theme · Element · Language).</span></h2><ArtifactTier items={shownTpls} ax={artifactAx}/></div>}
          {shownPages.length>0 && <div><h2 className="tierhead" id="tier-pages">Pages<span className="sub">Full product recreations (UI kits) — the same axes applied to whole apps.</span></h2><ArtifactTier items={shownPages} ax={artifactAx}/></div>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
