<!-- @dsCard group="Surfaces" viewport="700x180" name="Shadows" subtitle="Warm, umber-tinted elevation" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 26px 24px; font-family: var(--cs-font-family-ui); color: var(--cs-color-text-primary); }
  .row { display: flex; gap: 22px; align-items: center; }
  .item { text-align: center; }
  .box { width: 108px; height: 74px; background: var(--cs-color-surface-panel); border-radius: var(--cs-radius-md); }
  .l { font-family: var(--cs-font-family-mono); font-size: 11px; color: var(--cs-color-text-muted); margin-top: 12px; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--cs-shadow-xs)"></div><div class="l">xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--cs-shadow-sm)"></div><div class="l">sm · card</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--cs-shadow-md)"></div><div class="l">md · popover</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--cs-shadow-lg)"></div><div class="l">lg · heavy</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--cs-shadow-xl)"></div><div class="l">xl · dialog</div></div>
</div>
</body></html>
