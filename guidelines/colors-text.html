<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; font-family: var(--cs-font-family-ui); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
  .item { display: flex; align-items: center; gap: 12px; }
  .chip { width: 40px; height: 40px; border-radius: var(--cs-radius-md); border: 1px solid var(--cs-color-border-default); flex: none; }
  .t { font-weight: 700; font-size: 15px; }
  .m { font-family: var(--cs-font-family-mono); font-size: 12px; color: var(--cs-color-text-muted); }
</style></head>
<body>
<div class="grid">
  <div class="item"><span class="chip" style="background:#45210E"></span><div><div class="t" style="color:#45210E">text-primary · Aa</div><div class="m">#45210E</div></div></div>
  <div class="item"><span class="chip" style="background:#6E5A4C"></span><div><div class="t" style="color:#6E5A4C">text-muted · Aa</div><div class="m">#6E5A4C</div></div></div>
  <div class="item"><span class="chip" style="background:#6E3B0E"></span><div><div class="t" style="color:#6E3B0E">text-accent · Aa</div><div class="m">#6E3B0E · links</div></div></div>
  <div class="item"><span class="chip" style="background:#45210E;display:grid;place-items:center;color:#fff;font-weight:700">Aa</span><div><div class="t" style="color:#45210E">text-inverse</div><div class="m">#FFFFFF on umber</div></div></div>
</div>
</body></html>
