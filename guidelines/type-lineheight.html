<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; color: var(--cs-color-text-primary); font-family: var(--cs-font-family-ui); }
  .k { font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); margin-bottom: 4px; }
  .heading { font-size: 21px; font-weight: 700; line-height: 1.35; max-width: 560px; margin-bottom: 16px; }
  .body { font-size: 15px; line-height: 1.5; max-width: 560px; color: var(--cs-color-text-primary); }
</style></head>
<body>
  <div class="k">heading · 1.35</div>
  <div class="heading">Hiện thực hoá ý chí — biến điều ước rõ thành phần mềm chạy thật.</div>
  <div class="k">body · 1.5</div>
  <div class="body">Diacritics stack above and below the baseline (ầ ế ộ ữ ỹ), so line-heights stay generous. Stacked marks never collide between lines.</div>
</body></html>
