<!-- @dsCard group="Colors" viewport="700x170" name="Semantic" subtitle="Success, danger, warning, info" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; font-family: var(--cs-font-family-ui); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--cs-radius-md); min-height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; color: #fff; }
  .nm { font-weight: 700; font-size: 13px; }
  .hex { font-family: var(--cs-font-family-mono); font-size: 12px; opacity: .9; margin-top: 2px; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#166534"><div class="nm">success</div><div class="hex">#166534</div></div>
  <div class="sw" style="background:#B42318"><div class="nm">danger</div><div class="hex">#B42318</div></div>
  <div class="sw" style="background:#92400E"><div class="nm">warning</div><div class="hex">#92400E</div></div>
  <div class="sw" style="background:#1D4ED8"><div class="nm">info</div><div class="hex">#1D4ED8</div></div>
</div>
</body></html>
