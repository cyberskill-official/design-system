<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; font-family: var(--cs-font-family-ui); }
  .stage { position: relative; min-height: 230px; background-image: url("../assets/aurora-gold.jpg"); background-size: cover; background-position: center; padding: 22px 24px; display: flex; gap: 14px; align-items: center; }
  .m { flex: 1; border-radius: var(--cs-radius-lg); padding: 16px 14px; min-height: 128px; display: flex; flex-direction: column; justify-content: flex-end; color: var(--cs-color-text-primary); }
  .nm { font-weight: 700; font-size: 14px; }
  .d { font-size: 12px; color: var(--cs-color-text-muted); margin-top: 3px; }
  .solid-note { color: var(--cs-color-text-muted); }
</style></head>
<body>
<div class="stage">
  <div class="m cs-surface-whisper"><div class="nm">Whisper</div><div class="d">hero washes</div></div>
  <div class="m cs-surface-light"><div class="nm">Light</div><div class="d">nav · sidebar</div></div>
  <div class="m cs-surface-standard"><div class="nm">Standard</div><div class="d">cards</div></div>
  <div class="m cs-surface-heavy"><div class="nm">Heavy</div><div class="d">modals · popovers</div></div>
  <div class="m cs-surface-solid"><div class="nm">Solid</div><div class="d solid-note">dense · tables</div></div>
</div>
</body></html>
