<!-- @dsCard group="Spacing" viewport="700x150" name="Breakpoints" subtitle="Mobile-first · sm → 2xl" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; font-family: var(--cs-font-family-ui); color: var(--cs-color-text-primary); }
  .row { display: flex; gap: 8px; }
  .bp { flex: 1; border: 1px solid var(--cs-color-border-default); border-radius: var(--cs-radius-md); padding: 12px 10px; background: var(--cs-color-surface-panel); }
  .n { font-weight: 700; font-size: 14px; }
  .v { font-family: var(--cs-font-family-mono); font-size: 12px; color: var(--cs-color-text-muted); margin-top: 2px; }
</style></head>
<body>
<div class="row">
  <div class="bp"><div class="n">sm</div><div class="v">640</div></div>
  <div class="bp"><div class="n">md</div><div class="v">768</div></div>
  <div class="bp"><div class="n">lg</div><div class="v">1024</div></div>
  <div class="bp"><div class="n">xl</div><div class="v">1280</div></div>
  <div class="bp"><div class="n">2xl</div><div class="v">1536</div></div>
</div>
</body></html>
