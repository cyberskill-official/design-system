<!-- @dsCard group="Type" viewport="700x180" name="Weights" subtitle="Regular → Extrabold" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; color: var(--cs-color-text-primary); font-family: var(--cs-font-family-ui); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .c { border: 1px solid var(--cs-color-border-default); border-radius: var(--cs-radius-md); padding: 12px; background: var(--cs-color-surface-panel); }
  .g { font-size: 30px; letter-spacing: -.01em; }
  .l { font-family: var(--cs-font-family-mono); font-size: 11px; color: var(--cs-color-text-muted); margin-top: 6px; }
</style></head>
<body>
<div class="grid">
  <div class="c"><div class="g" style="font-weight:400">Aa</div><div class="l">400 regular</div></div>
  <div class="c"><div class="g" style="font-weight:500">Aa</div><div class="l">500 medium</div></div>
  <div class="c"><div class="g" style="font-weight:600">Aa</div><div class="l">600 semibold</div></div>
  <div class="c"><div class="g" style="font-weight:700">Aa</div><div class="l">700 bold</div></div>
  <div class="c"><div class="g" style="font-weight:800">Aa</div><div class="l">800 extrabold</div></div>
</div>
</body></html>
