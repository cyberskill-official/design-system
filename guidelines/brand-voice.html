<!-- @dsCard group="Brand" viewport="700x260" name="Slogan & voice" subtitle="Turn Your Will Into Real · warm/direct/honest/respectful" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--cs-font-family-ui); }
  .hero { background: var(--cs-color-brand-umber); color: #fff; padding: 22px 24px; }
  .slog { font-size: 30px; font-weight: 800; letter-spacing: -.01em; color: var(--cs-color-brand-ochre); }
  .vn { font-size: 17px; margin-top: 2px; opacity: .92; }
  .axes { display: flex; gap: 8px; padding: 16px 24px; background: var(--cs-color-surface-page); flex-wrap: wrap; }
  .axis { border: 1px solid var(--cs-color-border-default); background: var(--cs-color-surface-panel); border-radius: 999px; padding: 7px 16px; font-weight: 600; font-size: 14px; color: var(--cs-color-text-primary); }
  .axis b { color: var(--cs-color-text-accent); }
  .note { padding: 0 24px 18px; background: var(--cs-color-surface-page); color: var(--cs-color-text-muted); font-size: 13px; }
</style></head>
<body>
  <div class="hero"><div class="slog">Turn Your Will Into Real</div><div class="vn">Hiện Thực Hoá Ý Chí</div></div>
  <div class="axes">
    <span class="axis"><b>Warm</b></span>
    <span class="axis"><b>Direct</b></span>
    <span class="axis"><b>Honest</b></span>
    <span class="axis"><b>Respectful</b></span>
  </div>
  <div class="note">A chord, not a slider — all four at once. Vietnamese-first: every string ships an EN + VN pair.</div>
</body></html>
