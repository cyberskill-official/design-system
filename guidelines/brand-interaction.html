<!-- @dsCard group="Brand" viewport="700x200" name="Interaction states" subtitle="Hover brighten · press nudge · Ochre focus ring" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; font-family: var(--cs-font-family-ui); color: var(--cs-color-text-primary); }
  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .item { text-align: center; }
  .l { font-size: 12px; color: var(--cs-color-text-muted); margin-top: 8px; }
  .b { font: 700 15px/1 var(--cs-font-family-ui); background: var(--cs-component-button-primary-bg); color: #fff; border: 1px solid transparent; border-radius: var(--cs-radius-md); padding: 12px 20px; }
  .b.hover { filter: brightness(1.08); }
  .b.press { transform: translateY(1px); filter: brightness(1.05); }
  .b.focus { outline: 3px solid var(--cs-color-accent-ochre); outline-offset: 2px; }
  .b.dis { opacity: .58; }
</style></head>
<body>
<div class="row">
  <div class="item"><span class="b">Default</span><div class="l">rest</div></div>
  <div class="item"><span class="b hover">Hover</span><div class="l">brightness 1.08</div></div>
  <div class="item"><span class="b press">Pressed</span><div class="l">nudge 1px</div></div>
  <div class="item"><span class="b focus">Focus</span><div class="l">3px Ochre ring</div></div>
  <div class="item"><span class="b dis">Disabled</span><div class="l">opacity .58</div></div>
</div>
</body></html>
