<!-- @dsCard group="Brand" viewport="700x260" name="Imagery & mascot" subtitle="Warm gold particle light · Lumi the golden genie" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--cs-font-family-ui); }
  .stage { position: relative; min-height: 260px; background-image: url("../assets/aurora-gold.jpg"); background-size: cover; background-position: center; overflow: hidden; }
  .lumi { position: absolute; right: 34px; bottom: -6px; height: 250px; filter: drop-shadow(0 18px 40px rgba(0,0,0,.45)); }
  .copy { position: absolute; left: 26px; top: 24px; max-width: 340px; color: #fff; }
  .k { font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .1em; color: var(--cs-color-brand-ochre); }
  .h { font-size: 22px; font-weight: 800; margin: 8px 0 6px; letter-spacing: -.01em; }
  .p { font-size: 13px; line-height: 1.5; opacity: .9; }
</style></head>
<body>
<div class="stage">
  <div class="copy">
    <div class="k">Brand imagery</div>
    <div class="h">Warm gold, deep umber dark, particle light.</div>
    <div class="p">Photography and washes glow from within — never cold, never flat. Lumi, the golden genie, is the guide who turns a wish into working software.</div>
  </div>
  <img class="lumi" src="../assets/lumi-poster.webp" alt="Lumi, the golden genie mascot" />
</div>
</body></html>
