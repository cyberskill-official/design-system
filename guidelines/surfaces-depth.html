<!-- @dsCard group="Surfaces" viewport="700x210" name="Depth / z-index" subtitle="bg → toast · glass tier per layer" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 24px; font-family: var(--cs-font-family-ui); color: var(--cs-color-text-primary); }
  .stack { position: relative; height: 150px; }
  .card { position: absolute; border-radius: var(--cs-radius-md); border: 1px solid var(--cs-color-border-default); background: var(--cs-color-surface-panel); box-shadow: var(--cs-shadow-sm); padding: 8px 12px; font-size: 12px; }
  .card b { font-family: var(--cs-font-family-mono); }
  .c0 { left: 0; top: 96px; width: 300px; background: var(--cs-color-surface-raised); }
  .c1 { left: 26px; top: 74px; width: 300px; }
  .c2 { left: 52px; top: 52px; width: 300px; }
  .c3 { left: 78px; top: 30px; width: 300px; }
  .c4 { left: 104px; top: 8px; width: 300px; box-shadow: var(--cs-shadow-lg); }
  .leg { position:absolute; right: 0; top: 0; font-size: 12px; color: var(--cs-color-text-muted); line-height: 1.9; }
  .leg b { font-family: var(--cs-font-family-mono); color: var(--cs-color-text-primary); }
</style></head>
<body>
<div class="stack">
  <div class="card c0"><b>bg 0</b> — page · hero</div>
  <div class="card c1"><b>section 5</b> — matte sections</div>
  <div class="card c2"><b>card 10</b> — Standard Glass</div>
  <div class="card c3"><b>nav 50</b> — Light Glass</div>
  <div class="card c4"><b>modal 100</b> · <b>toast 200</b> — Heavy Glass</div>
  <div class="leg"><b>0</b> bg<br/><b>5</b> section<br/><b>10</b> card<br/><b>50</b> nav<br/><b>100</b> modal<br/><b>200</b> toast</div>
</div>
</body></html>
