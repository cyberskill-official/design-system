<!-- @dsCard group="Website" viewport="1200x820" name="cyberskill.world — Lumi chat" subtitle="Full-page AI assistant: prompt, messages, citations, review gate" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CyberSkill · Lumi</title>
<link rel="icon" href="../../assets/favicon.svg" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="site.css" />
<style>
  html, body { margin: 0; height: 100%; }
  .lumi-page { display: grid; grid-template-columns: 288px 1fr; height: 100vh; background: var(--cs-color-surface-page); font-family: var(--cs-font-family-ui); color: var(--cs-color-text-primary); }
  .lumi-side { border-right: 1px solid var(--cs-color-border-default); background: var(--cs-color-surface-panel); display: flex; flex-direction: column; padding: 16px 14px; gap: 4px; }
  .lumi-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 17px; color: var(--cs-color-brand-umber); padding: 6px 10px 14px; }
  .lumi-brand img { width: 30px; height: 30px; }
  .lumi-new { margin: 0 4px 12px; }
  .lumi-conv-label { font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); padding: 10px 12px 4px; }
  .lumi-side-foot { margin-top: auto; padding: 12px 8px 4px; border-top: 1px solid var(--cs-color-border-default); }
  .lumi-main { display: flex; flex-direction: column; min-width: 0; }
  .lumi-top { display: flex; align-items: center; gap: 12px; padding: 14px 28px; border-bottom: 1px solid var(--cs-color-border-default); background: color-mix(in oklab, var(--cs-color-surface-panel) 82%, transparent); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .lumi-top h1 { font-size: 17px; margin: 0; }
  .lumi-top .sub { font-size: 12.5px; color: var(--cs-color-text-muted); }
  .lumi-thread { flex: 1; overflow: auto; padding: 28px; }
  .lumi-thread-inner { max-width: 760px; margin: 0 auto; display: grid; gap: 18px; }
  .lumi-compose { border-top: 1px solid var(--cs-color-border-default); padding: 16px 28px 22px; background: var(--cs-color-surface-page); }
  .lumi-compose-inner { max-width: 760px; margin: 0 auto; display: grid; gap: 12px; }
  .lumi-answer-card { background: var(--cs-color-surface-raised); border: 1px solid var(--cs-color-border-default); border-radius: 14px; padding: 16px 18px; display: grid; gap: 14px; }
  .lumi-answer-card p { margin: 0; font-size: 15px; line-height: 1.6; }
  .lumi-answer-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  @media (max-width: 820px) { .lumi-page { grid-template-columns: 1fr; } .lumi-side { display: none; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const CS = window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))] || {};
const { LumiAvatar, PromptInput, PromptSuggestions, ChatMessage, TypingIndicator, CitationList, AIDisclosureBadge, ConfidenceMeter, Button, Sidebar, NavItem, Badge } = CS;
const { useState, useRef, useEffect } = React;

function LumiPage() {
  const [msgs, setMsgs] = useState([
    { who: "lumi", kind: "intro" },
  ]);
  const [typing, setTyping] = useState(false);
  const threadRef = useRef(null);
  useEffect(() => { const t = threadRef.current; if (t) t.scrollTop = t.scrollHeight; }, [msgs, typing]);

  function ask(text) {
    const m = (text || "").trim(); if (!m) return;
    setMsgs((c) => [...c, { who: "user", text: m }]);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMsgs((c) => [...c, { who: "lumi", kind: "answer", text: m }]);
    }, 1100);
  }

  return (
    <div className="lumi-page">
      <aside className="lumi-side">
        <div className="lumi-brand"><img src="../../assets/logo-mark.svg" alt="" />CyberSkill</div>
        <div className="lumi-new"><Button variant="primary" size="sm" fullWidth onClick={() => setMsgs([{ who: "lumi", kind: "intro" }])}>✦ New wish</Button></div>
        <div className="lumi-conv-label">Recent</div>
        <Sidebar>
          <NavItem active>A faster checkout</NavItem>
          <NavItem>Internal ops console</NavItem>
          <NavItem>Bilingual design system</NavItem>
        </Sidebar>
        <div className="lumi-side-foot">
          <NavItem icon={<LumiAvatar size="sm" />}>Lumi · genie mode</NavItem>
        </div>
      </aside>

      <main className="lumi-main">
        <header className="lumi-top">
          <LumiAvatar src="../../assets/lumi-poster.webp" size="md" ring />
          <div><h1>Lumi</h1><div className="sub">Golden genie · replies, then hands clear wishes to a human</div></div>
          <span style={{ marginLeft: "auto" }}><Badge variant="info">AI-native</Badge></span>
        </header>

        <div className="lumi-thread" ref={threadRef}>
          <div className="lumi-thread-inner">
            {msgs.map((m, i) => {
              if (m.who === "user") return <ChatMessage key={i} role="user">{m.text}</ChatMessage>;
              if (m.kind === "intro") return (
                <div key={i}>
                  <ChatMessage role="lumi" avatar={<LumiAvatar size="sm" />}>
                    Hello, I’m Lumi. Tell me a wish, and I’ll share plain advice before asking for anything. When a wish is clear, it goes to a real person on the team.
                  </ChatMessage>
                  <div style={{ marginTop: 12, marginLeft: 42 }}>
                    <PromptSuggestions suggestions={["A web app", "An internal tool", "A design system"]} onSelect={ask} />
                  </div>
                </div>
              );
              return (
                <ChatMessage key={i} role="lumi" avatar={<LumiAvatar size="sm" />}>
                  <div className="lumi-answer-card">
                    <p>A wish worth granting. For “{m.text}”, I’d start with a two-week shaping sprint — scope, a clickable prototype, and an honest estimate. Shall I hand this to the team?</p>
                    <div className="lumi-answer-meta">
                      <ConfidenceMeter value={0.82} label="Confidence" />
                      <AIDisclosureBadge label="AI assisted" details="Draft plan generated by Lumi from your wish, reviewed before handoff." sources={["Services", "Process"]} />
                    </div>
                    <CitationList label="Grounded in" items={[{ title: "What we build", source: "Services" }, { title: "The arc of a wish", source: "Process" }]} />
                    <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                      <Button size="sm">Hand to the team</Button>
                      <Button variant="secondary" size="sm">Keep refining</Button>
                    </div>
                  </div>
                </ChatMessage>
              );
            })}
            {typing && <ChatMessage role="lumi" avatar={<LumiAvatar size="sm" />}><TypingIndicator /></ChatMessage>}
          </div>
        </div>

        <div className="lumi-compose">
          <div className="lumi-compose-inner">
            <PromptInput onSubmit={ask} placeholder="Make a wish…" sendLabel="Send" />
          </div>
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<LumiPage />);
</script>
</body>
</html>
