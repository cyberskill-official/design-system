<!-- @dsCard group="Status Hub" viewport="1280x760" name="Status Hub — sign in" subtitle="Umber split login with brand panel + form controls" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CyberSkill · Sign in</title>
<link rel="icon" href="../../assets/favicon.svg" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; min-height: 100vh; }
  .login { display: grid; grid-template-columns: 1.05fr 1fr; min-height: 100vh; }
  .pane-brand { position: relative; overflow: hidden; background: var(--cs-color-brand-umber); color: #fff; padding: 56px 60px; display: flex; flex-direction: column; }
  .pane-brand::before { content: ""; position: absolute; inset: 0; background-image: url("../../assets/aurora-gold.jpg"); background-size: cover; background-position: center; opacity: .42; }
  .pane-brand::after { content: ""; position: absolute; inset: 0; background: linear-gradient(160deg, rgba(26,17,8,.35), rgba(26,17,8,.8)); }
  .pane-brand > * { position: relative; z-index: 1; }
  .brand-lock { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 20px; }
  .brand-lock img { width: 40px; height: 40px; }
  .pane-brand h2 { font-size: 40px; font-weight: 800; letter-spacing: -.02em; line-height: 1.08; color: var(--cs-color-brand-ochre); margin: auto 0 8px; }
  .pane-brand p { font-size: 17px; opacity: .9; margin: 0; max-width: 420px; }
  .pane-form { display: grid; place-items: center; padding: 40px 24px; background: var(--cs-color-surface-page); }
  .box { width: min(400px, 100%); }
  .box h1 { font-size: 30px; font-weight: 800; letter-spacing: -.02em; margin: 0 0 4px; }
  .box .sub { color: var(--cs-color-text-muted); margin: 0 0 28px; }
  form { display: grid; gap: 16px; }
  .rowbetween { display: flex; align-items: center; justify-content: space-between; }
  .fine { text-align: center; font-size: 13px; color: var(--cs-color-text-muted); margin-top: 4px; }
  @media (max-width: 820px) { .login { grid-template-columns: 1fr; } .pane-brand { display: none; } }
</style>
</head>
<body>
<div class="login">
  <div class="pane-brand">
    <div class="brand-lock"><img src="../../assets/logo-mark.svg" alt="" />CyberSkill</div>
    <h2>Turn Your Will Into Real</h2>
    <p>Sign in to the Status Hub — one page, three lenses across every wish in flight.</p>
  </div>
  <div class="pane-form">
    <div class="box">
      <h1>Sign in</h1>
      <p class="sub">Welcome back. Đăng nhập để tiếp tục.</p>
      <form onsubmit="return false">
        <label class="cs-field"><span class="cs-field__label">Work email</span><input class="cs-field__control" type="email" placeholder="you@cyberskill.world" /></label>
        <label class="cs-field"><span class="cs-field__label">Password</span><input class="cs-field__control" type="password" placeholder="••••••••" value="wishgranted" /></label>
        <div class="rowbetween">
          <label class="cs-switch"><input type="checkbox" role="switch" checked /><span class="cs-switch__track"></span><span class="cs-switch__label">Remember me</span></label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="cs-button cs-button--primary cs-button--full">Sign in</button>
        <button type="button" class="cs-button cs-button--ghost cs-button--full">✦ Talk to Lumi instead</button>
      </form>
      <p class="fine">New here? <a href="#">Ask for access</a></p>
    </div>
  </div>
</div>
<button id="themeToggle" aria-label="Toggle theme" style="position:fixed;right:20px;bottom:20px;z-index:60;border:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-panel);color:var(--cs-color-text-primary);width:44px;height:44px;border-radius:999px;cursor:pointer;box-shadow:var(--cs-shadow-md)">☾</button>
<script>
  document.getElementById("themeToggle").addEventListener("click", function () {
    var el = document.documentElement, dark = el.getAttribute("data-theme") === "dark";
    el.setAttribute("data-theme", dark ? "light" : "dark");
    this.textContent = dark ? "☾" : "☀";
  });
</script>
</body>
</html>
