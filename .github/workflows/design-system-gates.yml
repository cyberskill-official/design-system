name: Design System Gates
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch: {}
  schedule:
    # Nightly deep path (same whole-set job also runs on every PR — owner decision B).
    - cron: '0 3 * * *'

permissions:
  contents: read

# Reusable Node + Playwright install (browser cache).
# Jobs below copy the same steps so each job stays self-contained.

jobs:
  fast-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-chromium
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Serve the repo statically
        run: npx --yes serve@14 -l 8080 . &
      - name: Wait for server
        run: npx --yes wait-on@7 http://127.0.0.1:8080/dashboard.html
      - name: Playwright pixel compare (hard — feeds board Pixel CI row)
        run: node _audit/ci/pixel-diff.mjs http://127.0.0.1:8080
      - name: Run the fast gate board (headless)
        run: node _audit/ci/run-gates.mjs http://127.0.0.1:8080/_audit/run.html
      - name: Upload import report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with: { name: import-report, path: _audit/ci/import-report.txt }

  token-provenance:
    runs-on: ubuntu-latest
    needs: fast-gates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify tokens/native/ is in lockstep with tokens.dtcg.json (fast, no browser)
        run: node _audit/ci/check-token-provenance.mjs

  unit-tests:
    # npm run test:unit — 7 plain-Node contract tests (nav model, health/tokens UI,
    # form paths, Storybook contract, Figma helpers, Code Connect helpers, native samples).
    # Wired into CI by the Jul 2026 hardening (previously local-only). No browser.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit

  node-prechecks:
    # Browser-free Node gates that the run.html board does not own:
    #   • bundle freshness — the Node script is the source of truth (it also
    #     discovers NEW source files; the board's bundle-freshness row only
    #     re-hashes files already recorded in the bundle header)
    #   • DESIGN.md freshness — byte-identical regeneration from DTCG + manifest
    #     (the board's design-md-parity row proves the same in-browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install npm dependencies (esbuild needed by the bundle checker)
        run: npm ci
      - name: _ds_bundle.js built from current sources
        run: node _audit/ci/check-bundle-freshness.mjs
      - name: DESIGN.md is a fresh regeneration
        run: node scripts/generate-design-md.mjs --check

  docs-consistency-blocker:
    runs-on: ubuntu-latest
    needs: fast-gates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-chromium
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Serve the repo statically
        run: npx --yes serve@14 -l 8080 . &
      - name: Wait for server
        run: npx --yes wait-on@7 http://127.0.0.1:8080/dashboard.html
      - name: docs-consistency must be green to merge
        run: node _audit/ci/run-single-gate.mjs http://127.0.0.1:8080/_audit/docs-consistency.html __docs
      - name: bilingual-parity must be green to merge
        run: node _audit/ci/run-single-gate.mjs http://127.0.0.1:8080/_audit/bilingual-parity.html __bilingual

  whole-set-audits:
    # Owner decision B: every push/PR + nightly + manual. ~15–20 min wall time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-chromium
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Serve the repo statically
        run: npx --yes serve@14 -l 8080 . &
      - name: Wait for server
        run: npx --yes wait-on@7 http://127.0.0.1:8080/dashboard.html
      - name: responsive-overflow (all 84 templates)
        run: node _audit/ci/run-single-gate.mjs http://127.0.0.1:8080/_audit/responsive-overflow.html __overflow 360000
      - name: language-overflow (all 84 templates, forced VN)
        run: node _audit/ci/run-single-gate.mjs http://127.0.0.1:8080/_audit/language-overflow.html __language 360000
      - name: theme-overflow (all 84 templates, forced dark — overflow + contrast hard; REVIEWED_OK allowlist)
        run: node _audit/ci/run-single-gate.mjs http://127.0.0.1:8080/_audit/theme-overflow.html __theme 360000

  pixel-diff:
    # Hard gate: % drift above threshold fails the job (and blocks merge).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-chromium
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Serve the repo statically
        run: npx --yes serve@14 -l 8080 . &
      - name: Wait for server
        run: npx --yes wait-on@7 http://127.0.0.1:8080/dashboard.html
      - name: Playwright pixel compare (hard)
        run: node _audit/ci/pixel-diff.mjs http://127.0.0.1:8080
      - name: Upload pixel-diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pixel-diff-report
          path: _audit/ci/pixel-diff-report.json
          if-no-files-found: ignore
      - name: Refresh baselines from this runner (on drift)
        if: failure()
        run: node _audit/ci/pixel-diff.mjs --update http://127.0.0.1:8080
      - name: Upload Linux baselines (on drift)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pixel-baselines-linux
          path: _audit/baselines/*.png
          if-no-files-found: ignore

  regenerate-tokens:
    # Only when DTCG / generator / native targets can drift. Deterministic output → no-op commit when clean.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.DS_PUSH_TOKEN || github.token }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Detect token-related path changes
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "${BASE:-}" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "No usable base SHA — always regenerate."
            exit 0
          fi
          if git diff --name-only "$BASE" HEAD | grep -E '^(tokens/tokens\.dtcg\.json|tokens/native/|_audit/ci/generate-native-tokens\.mjs|VERSION)$' >/dev/null; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Token-related paths changed."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No token-related path changes — skip regenerate."
          fi
      - name: Regenerate native token targets from tokens.dtcg.json
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || steps.filter.outputs.run == 'true'
        run: node _audit/ci/generate-native-tokens.mjs
      - name: Check for generated drift
        id: drift
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || steps.filter.outputs.run == 'true'
        run: |
          if git diff --quiet -- tokens/native tokens/provenance.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Native tokens already match DTCG — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat -- tokens/native tokens/provenance.json
          fi
      - name: Commit regenerated files if they changed
        if: steps.drift.outputs.changed == 'true'
        run: |
          set -euo pipefail
          BRANCH="${{ github.head_ref || github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"
          node _audit/ci/generate-native-tokens.mjs
          if git diff --quiet -- tokens/native tokens/provenance.json; then
            echo "After sync, natives already match remote — nothing to push."
            exit 0
          fi
          git add tokens/native/CSTokens.swift tokens/native/CSTokens.kt tokens/native/cs_tokens.dart tokens/provenance.json
          git commit -m "chore: regenerate tokens/native/* from tokens.dtcg.json [skip ci]"
          git push origin "HEAD:$BRANCH"

  figma-variables-push:
    # Soft-skips when Variables API is Enterprise-only (owner decision A: non-Enterprise for now).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Require Figma secrets
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: |
          missing=0
          if [ -z "$FIGMA_TOKEN" ]; then
            echo "::error::FIGMA_TOKEN is empty — Actions did not inject it."
            missing=1
          else
            echo "FIGMA_TOKEN: present (length ${#FIGMA_TOKEN}, value not printed)"
          fi
          if [ -z "$FIGMA_FILE_KEY" ]; then
            echo "::error::FIGMA_FILE_KEY is empty — Actions did not inject it."
            missing=1
          else
            echo "FIGMA_FILE_KEY: present (length ${#FIGMA_FILE_KEY}, value not printed)"
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Add repository secrets FIGMA_TOKEN and FIGMA_FILE_KEY, or omit this job's secrets until Enterprise."
            echo "Owner decision A: non-Enterprise soft-skip is fine once secrets exist; empty secrets still fail closed here."
            exit 1
          fi
      - name: Dry-run colour token plan
        run: node _audit/ci/push-figma-variables.mjs --dry-run
      - name: Push colour variables to Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: node _audit/ci/push-figma-variables.mjs
      - name: Upload Figma push report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figma-push-report
          path: _audit/ci/figma-push-report.json
          if-no-files-found: ignore

  code-connect:
    # Decision 1C: live Code Connect path; soft-skip when secrets missing or API 403/404/429.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Code Connect dry-run (config + 99 mappings, no secrets)
        run: node _audit/ci/code-connect-publish.mjs --dry-run
      - name: Code Connect publish (soft-skip without secrets / on 403·404·429)
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: node _audit/ci/code-connect-publish.mjs
      - name: Upload Code Connect report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-connect-report
          path: _audit/ci/code-connect-report.json
          if-no-files-found: ignore
