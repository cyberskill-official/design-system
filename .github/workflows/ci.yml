name: CI

# Wires every Phase 2 gate per RFC 2026-005 + roadmap-to-l5.md §4.
# Runs on every PR and every push to main. Fails the build only on:
#   - typecheck error
#   - eslint error
#   - DESIGN.md staleness (must be regenerated when doctrine changes)
#   - pre-review BLOCK findings (banned phrases, broken cross-refs, div-as-button, etc.)
# Coverage drops are reported as warnings only until Phase 2 Wave 2 ratchets
# the floors per migration plan A4.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # for the pre-review comment poster

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for `git diff`

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (root SPA)
        run: pnpm typecheck

      - name: Lint (root SPA)
        run: pnpm lint

  doctrine-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      # Per RFC 2026-005 § Severity & blocking — block-class findings fail
      - name: Pre-review lint (RFC 2026-005)
        id: prereview
        run: pnpm pre-review > pr-comment.md
        continue-on-error: true

      - name: Post pre-review comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr-comment.md

      - name: Fail if pre-review blocks
        if: steps.prereview.outcome == 'failure'
        run: exit 1

      # Per §15 cross-cutting commitment 12: DESIGN.md is generated, not hand-edited.
      - name: DESIGN.md staleness check
        run: pnpm check:design-md

      # Per migration plan A4 + roadmap §4.5 — adoption metrics published over time
      - name: Coverage report (warn only — Wave 2 ratchets the floors)
        run: pnpm coverage:check
        continue-on-error: true

      # Per audit A9.1 → 5 path. Hard fail on bundle-size regressions.
      - name: Bundle-size budgets
        run: pnpm check:bundle-size

      # Per Part 18 §6 + audit A3.7 → 4. Hard fail on broken xrefs.
      - name: Doc freshness + cross-reference walk
        run: pnpm check:doc-freshness

      - name: Upload coverage + size + freshness artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            docs/_audit/coverage.json
            docs/_audit/bundle-size.json
            docs/_audit/doc-freshness.json
            docs/_audit/doc-freshness.md
          retention-days: 90

  build-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build multi-platform tokens (CSS / JS / TS / Swift / Android)
        run: pnpm build:tokens
      - name: Upload token artefacts
        uses: actions/upload-artifact@v4
        with:
          name: tokens-dist
          path: packages/tokens/dist/
          retention-days: 30

  build-cdn:
    runs-on: ubuntu-latest
    needs: build-tokens
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build tokens (prerequisite for CDN bundle)
        run: pnpm build:tokens
      - name: Build CDN bundle (RFC 2026-002)
        run: pnpm build:cdn
      - name: Upload CDN artefacts
        uses: actions/upload-artifact@v4
        with:
          name: cdn-dist
          path: dist-cdn/
          retention-days: 30

  build-spa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build wiki SPA
        run: pnpm build
      - name: Upload SPA artefact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: dist/
          retention-days: 30

  test-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test @cyberskill/primitives
        run: cd packages/primitives && node --test src/*.test.mjs

  # Storybook visual regression via Chromatic (Phase 2 Wave 2 — requires
  # CHROMATIC_PROJECT_TOKEN secret; off by default).
  visual-regression:
    runs-on: ubuntu-latest
    if: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build-storybook
          onlyChanged: true
