name: Release

# Per RFC 2026-002 § Implementation outline (CDN distribution) and RFC 2026-003
# (multi-package npm). Triggered by a v* tag on main. Phase 2 Wave 2 fills in
# the actual CDN upload step (Cloudflare R2) once the cdn.cyberskill.dev DNS
# is provisioned. The workflow stub below documents the intended sequence.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write   # for npm provenance (per audit A5.5 path to 5)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build everything
        run: |
          pnpm build:tokens
          pnpm build
          pnpm build-storybook

      - name: Re-run audit checks (no regressions on release)
        run: |
          pnpm typecheck
          pnpm lint
          pnpm check:design-md
          pnpm pre-review

      - name: Publish to npm (workspace packages)
        # NPM_TOKEN secret required. All packages are private (publishConfig).
        # When the team is ready to public-publish, flip publishConfig in each
        # package.json and remove `--access restricted`.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm -r --filter './packages/*' publish --no-git-checks --provenance
        continue-on-error: ${{ secrets.NPM_TOKEN == '' }}

      # Phase 2 Wave 2 — CDN distribution per RFC 2026-002.
      # Wave 1 stubs the upload; the actual Cloudflare R2 step is filled in
      # once cdn.cyberskill.dev is provisioned.
      - name: Build CDN bundle (RFC 2026-002 — Wave 2)
        run: |
          echo "[release] CDN bundle build — placeholder for Phase 2 Wave 2."
          echo "[release] When wired, this step produces a single bundle of"
          echo "[release]   @cyberskill/web-components/loader.js"
          echo "[release] and computes the SRI hash published in .integrity.json."

      - name: Upload CDN bundle to Cloudflare R2 (RFC 2026-002 — Wave 2)
        if: ${{ secrets.CLOUDFLARE_R2_TOKEN != '' }}
        run: |
          echo "[release] Cloudflare R2 upload — placeholder for Phase 2 Wave 2."
          # When wired:
          # rclone copyto dist-cdn/loader.js r2:cdn-cyberskill/v1/loader.js
          # rclone copyto dist-cdn/loader.js r2:cdn-cyberskill/v${TAG}/loader.js

      - name: Append release row to audit history
        run: |
          echo "[release] Audit history register update — Phase 2 Wave 2 wires."
          # Hook into _audit/_history.md per §10.7 of the framework.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/tokens/dist/tokens.css
            packages/tokens/dist/tokens.mjs
            packages/tokens/dist/tokens.d.ts
            packages/tokens/dist/Tokens.swift
            packages/tokens/dist/tokens.xml
