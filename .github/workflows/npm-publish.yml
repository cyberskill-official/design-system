# npm publish — Trusted Publishing (OIDC) primary; optional NPM_TOKEN fallback
#
# Triggers: workflow_dispatch, or push of version tags (v*).
# Requires npm Trusted Publisher on @cyberskill/design for workflow file npm-publish.yml
# (org cyberskill-official / repo design-system). Soft-skip on auth/404/403/conflict.
# Version stays pinned at 1.0.0 until LAUNCH — license remains UNLICENSED (explicit grant required).

name: npm-publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # OIDC for npm Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # Do not cache for release publishes (npm Trusted Publishing guidance)
          cache: npm
      - name: Ensure npm CLI supports Trusted Publishing
        run: npm install -g npm@latest
      - name: Install npm dependencies
        run: npm ci
      - name: Pack dry-run (always)
        run: node _audit/ci/npm-publish.mjs --dry-run
      - name: Publish to npm (OIDC Trusted Publishing)
        # Do not set NODE_AUTH_TOKEN / NPM_TOKEN here — that forces classic token auth
        # and can reintroduce EOTP. Optional fallback: set NPM_TOKEN only if OIDC is unavailable.
        run: node _audit/ci/npm-publish.mjs
      - name: Upload npm-publish report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-publish-report
          path: _audit/ci/npm-publish-report.json
          if-no-files-found: ignore
