# npm publish — Decision 1C soft-skip when NPM_TOKEN is absent
#
# Triggers: workflow_dispatch, or push of version tags (v*).
# Soft-skip (exit 0 + report artifact) when NPM_TOKEN is missing or registry returns auth/404/403.
# Version stays pinned at 1.0.0 until LAUNCH — license remains UNLICENSED (explicit grant required).

name: npm-publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - name: Install npm dependencies
        run: npm ci
      - name: Pack dry-run (always)
        run: node _audit/ci/npm-publish.mjs --dry-run
      - name: Publish to npm (soft-skip without NPM_TOKEN)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node _audit/ci/npm-publish.mjs
      - name: Upload npm-publish report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-publish-report
          path: _audit/ci/npm-publish-report.json
          if-no-files-found: ignore
