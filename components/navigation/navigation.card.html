<!-- @dsCard group="Components" viewport="700x300" name="Navigation" subtitle="Tabs, Breadcrumb, Pagination, Menu" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; }
  .stack { display: grid; gap: 22px; max-width: 620px; }
  .lbl { font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Tabs, Breadcrumb, Pagination, Menu, MenuItem } = (window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))]||{});
function Demo() {
  const [lens, setLens] = React.useState("board");
  const [page, setPage] = React.useState(3);
  return (
    <div className="stack">
      <div><div className="lbl">Breadcrumb</div>
        <Breadcrumb items={[{label:"Status Hub",href:"#"},{label:"Platform",href:"#"},{label:"Design System v1.6"}]} />
      </div>
      <div><div className="lbl">Tabs</div>
        <Tabs value={lens} onChange={setLens} tabs={[{value:"board",label:"Board"},{value:"table",label:"Table",count:6},{value:"releases",label:"Releases"}]} />
      </div>
      <div className="row">
        <div><div className="lbl">Pagination</div><Pagination page={page} pageCount={12} onChange={setPage} /></div>
        <div><div className="lbl">Menu</div>
          <Menu trigger={<button className="cs-button cs-button--secondary cs-button--sm">Actions ▾</button>}>
            <MenuItem>Duplicate</MenuItem>
            <MenuItem>Export EN + VN</MenuItem>
            <div className="cs-menu__sep" />
            <MenuItem danger>Delete</MenuItem>
          </Menu>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
