<!-- @dsCard group="Components" viewport="700x360" name="Data & layout" subtitle="Card, Stat, Avatar, Tooltip, Divider" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; }
  .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; max-width: 640px; align-items: start; }
  .stats { display: flex; gap: 26px; align-items: center; }
  .lbl { font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); margin-bottom: 10px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Card, CardHeader, CardBody, CardFooter, Stat, Avatar, AvatarGroup, Tooltip, Divider, Badge } = (window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))]||{});
function Demo() {
  return (
    <div className="grid">
      <Card>
        <CardHeader title="Design System v1.6" subtitle="Platform squad" />
        <CardBody>Liquid Glass component bindings + 15 element packs, verified.</CardBody>
        <CardFooter><Badge variant="ochre">Now</Badge><AvatarGroup><Avatar name="An Le" size="sm" /><Avatar name="Bao Vu" size="sm" /><Avatar name="Chi Tran" size="sm" /></AvatarGroup></CardFooter>
      </Card>
      <div>
        <div className="lbl">Stats</div>
        <div className="stats">
          <Stat label="Projects" value="6" />
          <Stat label="Avg progress" value="70%" delta="+6" trend="up" />
        </div>
        <Divider label="team" />
        <div className="lbl">Avatar &amp; tooltip</div>
        <div className="stats">
          <Avatar name="Nguyễn Vũ" size="lg" />
          <Tooltip label="Blocked on infra"><span className="cs-badge cs-badge--danger">Blocked</span></Tooltip>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
