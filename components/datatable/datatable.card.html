<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; }
  .wrap { border: 1px solid var(--cs-color-border-default); border-radius: var(--cs-radius-lg); padding: 6px 16px 10px; background: var(--cs-color-surface-panel); max-width: 640px; }
  .pill { display: inline-block; font: 700 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .04em; padding: 3px 9px; border-radius: 999px; }
  .pill.done { background: var(--cs-color-semantic-success); color: #fff; }
  .pill.active { background: var(--cs-color-brand-ochre); color: var(--cs-color-brand-umber); }
  .pill.hold { background: var(--cs-color-semantic-danger); color: #fff; }
  .mono { font-family: var(--cs-font-family-mono); font-weight: 600; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DataTable } = window.CyberSkillDesignSystem_847b3c;
const rows = [
  { ver: "v1.5.1", ships: "Shipped", status: "done", note: "Style packs" },
  { ver: "v1.6.0", ships: "This week", status: "active", note: "Glass bindings" },
  { ver: "v1.7.0", ships: "Q3 2026", status: "hold", note: "Awaiting RFC" },
];
function Demo() {
  return (
    <div className="wrap">
      <DataTable
        caption="Releases"
        rowKey="ver"
        columns={[
          { key: "ver", header: "Version", render: (r) => <span className="mono">{r.ver}</span> },
          { key: "ships", header: "Ships" },
          { key: "note", header: "Notes" },
          { key: "status", header: "Status", render: (r) => <span className={"pill " + r.status}>{r.status}</span> },
        ]}
        rows={rows}
      />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
