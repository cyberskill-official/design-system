<!-- @dsCard group="Components" viewport="700x420" name="Feedback & status" subtitle="Badge, Tag, Alert, Toast, Spinner, Progress, Skeleton" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; }
  .stack { display: grid; gap: 18px; max-width: 620px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .lbl { width: 100%; font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); }
  .frame { position: relative; height: 96px; border: 1px solid var(--cs-color-border-default); border-radius: var(--cs-radius-md); background: var(--cs-color-surface-raised); }
  .frame .cs-toast-stack { position: absolute; inset-block-end: 12px; inset-inline-end: 12px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Badge, Tag, Alert, Toast, ToastStack, Spinner, ProgressBar, Skeleton } = (window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))]||{});
function Demo() {
  return (
    <div className="stack">
      <div className="row"><span className="lbl">Badges &amp; tags</span>
        <Badge>Planned</Badge><Badge variant="ochre">Now</Badge><Badge variant="success" dot>Shipped</Badge>
        <Badge variant="danger">Blocked</Badge><Badge variant="info">AI</Badge>
        <Tag>Web apps</Tag><Tag onRemove={()=>{}}>TASK-DS-041</Tag>
      </div>
      <div className="row"><span className="lbl">Alert</span>
        <div style={{flex:1,minWidth:280}}><Alert variant="warning" title="Blocked">Provenance ledger needs the signing service.</Alert></div>
      </div>
      <div className="row"><span className="lbl">Progress · spinner · skeleton</span>
        <div style={{flex:"1 1 200px"}}><ProgressBar value={72} label="v1.6 progress" /></div>
        <Spinner size={24} />
        <div style={{flex:"1 1 120px"}}><Skeleton lines={2} /></div>
      </div>
      <div className="row"><span className="lbl">Toast</span>
        <div className="frame"><ToastStack><Toast variant="success" title="Saved" onClose={()=>{}}>Your wish is on its way.</Toast></ToastStack></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
