<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; }
  .row { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; margin-bottom: 18px; }
  .lbl { width: 100%; font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); }
  .frame { border: 1px solid var(--cs-color-border-default); border-radius: var(--cs-radius-lg); background: var(--cs-color-surface-panel); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { StatusIndicator, EmptyState, Button } = window.CyberSkillDesignSystem_847b3c;
function Demo() {
  return (
    <div>
      <div className="row"><span className="lbl">Status</span>
        <StatusIndicator status="online" pulse>All systems go</StatusIndicator>
        <StatusIndicator status="busy">Deploying</StatusIndicator>
        <StatusIndicator status="error">Blocked</StatusIndicator>
        <StatusIndicator status="offline">Idle</StatusIndicator>
      </div>
      <div className="lbl" style={{marginBottom:8}}>Empty state</div>
      <div className="frame">
        <EmptyState title="No projects yet" actions={<Button size="sm">✦ Make a wish</Button>}>
          Start by telling Lumi what you'd like to build.
        </EmptyState>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
