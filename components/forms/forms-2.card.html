<!-- @dsCard group="Components" viewport="700x360" name="Form controls II" subtitle="Search, NumberField, Slider, FileUpload, SegmentedControl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; }
  .stack { display: grid; gap: 18px; max-width: 620px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .lbl { width: 100%; font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { SearchField, NumberField, Slider, FileUpload, SegmentedControl } = window.CyberSkillDesignSystem_847b3c;
const { useState } = React;
function Demo() {
  const [q, setQ] = useState("Design System");
  const [n, setN] = useState(3);
  const [v, setV] = useState(60);
  const [seg, setSeg] = useState("board");
  return (
    <div className="stack">
      <div className="row"><span className="lbl">Search</span><div style={{flex:1,minWidth:260}}><SearchField value={q} onChange={setQ} placeholder="Search projects…" /></div></div>
      <div className="row"><span className="lbl">Number &amp; slider</span><NumberField value={n} onChange={setN} min={1} max={20} /><div style={{flex:1,minWidth:180}}><Slider min={0} max={100} value={v} onChange={(e)=>setV(+e.target.value)} /></div></div>
      <div className="row"><span className="lbl">Segmented</span><SegmentedControl value={seg} onChange={setSeg} options={[{value:"board",label:"Board"},{value:"table",label:"Table"},{value:"releases",label:"Releases"}]} /></div>
      <div className="row"><span className="lbl">File upload</span><div style={{flex:1}}><FileUpload /></div></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
