<!-- @dsCard group="Components" viewport="700x200" name="LumiAvatar" subtitle="Golden-genie mascot avatar — sizes + ring" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; }
  .row { display: flex; align-items: center; gap: 24px; }
  .cap { font: 500 12px/1.4 var(--cs-font-family-ui); color: var(--cs-color-text-muted); margin-top: 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { LumiAvatar } = (window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))]||{});
function Demo() {
  return (
    <div>
      <div className="row">
        <LumiAvatar src="../../assets/lumi-poster.webp" size="lg" ring />
        <LumiAvatar src="../../assets/lumi-poster.webp" size="md" />
        <LumiAvatar size="md" />
        <LumiAvatar size="sm" />
      </div>
      <p className="cap">With the real mascot image (left) or the ✦ "wish" glyph fallback. Use for chat, assistants, and AI touchpoints.</p>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
