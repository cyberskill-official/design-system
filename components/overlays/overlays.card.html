<!-- @dsCard group="Components" viewport="700x360" name="Overlays — Popover & Drawer" subtitle="Anchored popover + slide-in drawer" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--cs-color-surface-page); padding: 22px 24px; }
  .lbl { font: 600 11px/1 var(--cs-font-family-ui); text-transform: uppercase; letter-spacing: .09em; color: var(--cs-color-text-muted); margin-bottom: 10px; }
  .cols { display: grid; grid-template-columns: 1fr 1.2fr; gap: 24px; align-items: start; }
  .frame { position: relative; overflow: hidden; height: 260px; border: 1px solid var(--cs-color-border-default); border-radius: var(--cs-radius-lg); background: var(--cs-color-surface-raised); }
  .frame .cs-drawer-scrim, .frame .cs-drawer { position: absolute; animation: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Popover, Drawer, Button, RadioGroup, DescriptionList, Badge } = (window[Object.keys(window).find(k=>/^CyberSkillDesignSystem_[0-9a-f]{6}$/.test(k))]||{});
const { useState } = React;
function Demo() {
  const [s, setS] = useState("active");
  return (
    <div className="cols">
      <div>
        <div className="lbl">Popover (open)</div>
        <Popover open={true} onOpenChange={()=>{}} trigger={<Button variant="secondary" size="sm">Filter ▾</Button>}>
          <RadioGroup legend="Status" value={s} onChange={setS} options={[{value:"active",label:"In progress"},{value:"done",label:"Shipped"},{value:"hold",label:"Blocked"}]} />
        </Popover>
      </div>
      <div>
        <div className="lbl">Drawer (contained preview)</div>
        <div className="frame">
          <Drawer open={true} onClose={()=>{}} title="Design System v1.6" actions={<Button size="sm">Open project</Button>}>
            <Badge variant="ochre">In progress</Badge>
            <p style={{color:"var(--cs-color-text-muted)",fontSize:13}}>Liquid Glass component bindings + 15 element packs.</p>
            <DescriptionList items={[{term:"Owner",value:"An Le"},{term:"Squad",value:"Platform"},{term:"Progress",value:"72%"}]} />
          </Drawer>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
