<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CyberSkill · Docs</title>
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}html,body{height:100%}
  body{margin:0;font-family:var(--cs-font-family-ui);background:var(--cs-color-surface-page);color:var(--cs-color-text-primary);display:grid;grid-template-columns:min(230px,36vw) 1fr}
  aside{border-inline-end:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-panel);overflow:auto;padding:14px 10px}
  aside h1{font-size:13px;font-weight:800;margin:2px 8px 6px;color:var(--cs-color-brand-umber)}
  [data-theme="dark"] aside h1{color:var(--cs-color-brand-ochre)}
  .langtog{display:flex;gap:4px;margin:0 8px 10px}
  .langtog button{flex:1;font:700 11px/1 var(--cs-font-family-ui);letter-spacing:.04em;padding:7px 0;border-radius:8px;border:1px solid var(--cs-color-border-default);background:var(--cs-color-surface-raised);color:var(--cs-color-text-muted);cursor:pointer}
  .langtog button.on{background:var(--cs-color-brand-umber);color:var(--cs-color-text-inverse);border-color:var(--cs-color-brand-umber)}
  [data-theme="dark"] .langtog button.on{background:var(--cs-color-brand-ochre);color:var(--cs-color-brand-umber);border-color:var(--cs-color-brand-ochre)}
  .langhint{font-size:10.5px;color:var(--cs-color-text-muted);margin:0 10px 8px;line-height:1.4}
  aside a{display:block;font-size:13px;font-weight:600;color:var(--cs-color-text-muted);text-decoration:none;padding:7px 10px;border-radius:8px}
  aside a:hover{color:var(--cs-color-text-primary);background:var(--cs-color-surface-raised)}
  aside a.on{color:var(--cs-color-brand-umber);background:var(--cs-color-surface-raised)}
  [data-theme="dark"] aside a.on{color:var(--cs-color-brand-ochre)}
  aside .grp{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--cs-color-text-muted);margin:14px 10px 5px}
  #docsearch{box-sizing:border-box;border:1px solid var(--cs-color-border-default);border-radius:8px;background:var(--cs-color-surface-raised);padding:8px 10px;font:inherit;font-size:12.5px;margin:0 8px 10px;width:calc(100% - 16px)}
  .searchres{font-size:12px;color:var(--cs-color-text-muted);padding:0 10px 6px}
  .searchhit{display:block;padding:7px 10px;border-radius:8px;text-decoration:none;color:var(--cs-color-text-primary)}
  .searchhit:hover{background:var(--cs-color-surface-raised)}
  .searchhit b{color:var(--cs-color-brand-umber)}[data-theme="dark"] .searchhit b{color:var(--cs-color-brand-ochre)}
  .searchhit .snip{display:block;font-size:11px;color:var(--cs-color-text-muted);font-weight:400;margin-top:2px}
  mark{background:var(--cs-color-brand-ochre);color:var(--cs-color-brand-umber);border-radius:2px;padding:0 1px}
  main{overflow:auto;padding:30px 38px}
  article{max-width:820px;line-height:1.62;font-size:14.5px}
  article h1{font-size:24px;letter-spacing:-.015em;margin:0 0 12px}
  article h2{font-size:18px;margin:28px 0 8px;padding-top:10px;border-top:1px solid var(--cs-color-border-default)}
  article h3{font-size:15px;margin:20px 0 6px}
  article code{font-family:var(--cs-font-family-mono);font-size:.86em;background:var(--cs-color-surface-raised);border-radius:4px;padding:1px 5px}
  article pre{background:var(--cs-color-surface-raised);border:1px solid var(--cs-color-border-default);border-radius:10px;padding:12px 14px;overflow:auto}
  article pre code{background:none;padding:0;font-size:12px;line-height:1.55}
  article table{border-collapse:collapse;margin:10px 0;width:100%}
  article th,article td{border:1px solid var(--cs-color-border-default);padding:7px 10px;text-align:start;font-size:13px;vertical-align:top}
  article th{background:var(--cs-color-surface-raised)}
  article blockquote{margin:10px 0;padding:6px 14px;border-inline-start:3px solid var(--cs-color-brand-ochre);color:var(--cs-color-text-muted);background:var(--cs-color-surface-raised);border-radius:0 8px 8px 0}
  article ul,article ol{padding-inline-start:22px}
  article li{margin:3px 0;overflow-wrap:anywhere}
  article p,article blockquote{overflow-wrap:anywhere}
  article code{white-space:break-spaces;overflow-wrap:anywhere}
  article hr{border:0;border-top:1px dashed var(--cs-color-border-default);margin:20px 0}
  article a{color:var(--cs-color-link)}article a:hover{color:var(--cs-color-link-hover)}
  #err{color:#B42318;font-family:var(--cs-font-family-mono);font-size:13px}
  @media (max-width:640px){
    body{grid-template-columns:1fr}
    aside{border-inline-end:0;border-block-end:1px solid var(--cs-color-border-default);max-height:38vh}
    main{padding:18px 16px}
  }
</style></head>
<body>
<aside id="nav"><h1>CyberSkill Docs</h1>
<div class="langtog" role="group" aria-label="Doc language"><button type="button" id="lang-en" data-lang="en">EN</button><button type="button" id="lang-vi" data-lang="vi">VI</button></div>
<p class="langhint" id="langhint">Operator docs under docs/ · entrance docs stay EN</p>
<input id="docsearch" type="search" placeholder="Search all docs…"><div id="navlinks"></div></aside>
<main><article id="doc"><p style="color:var(--cs-color-text-muted)">Loading…</p></article><p id="err" hidden></p></main>
<script>
const DOCS_EN=[
 ['Start',[['README.md','README'],['SKILL.md','SKILL (agent rules)'],['llms.txt','llms.txt'],['CONTRIBUTING.md','Contributing']]],
 ['Guides',[['docs/consuming.md','Consuming & upgrading (incl. AI-agent quick path)'],['docs/deploy.md','Deploy (Vercel/VPS)'],['docs/ci-cd.md','CI/CD automation'],['docs/template-schema-v2.md','Template content-schema v2'],['docs/conventions.md','Conventions'],['docs/sync.md','Git sync & hygiene'],['docs/storybook.md','Storybook (host playground)'],['docs/live-hub.md','Live hub (Storybook)'],['docs/decisions-pending.md','Decisions pending']]],
 ['Reference',[['docs/BACKLOG.md','Backlog'],['docs/quality-gates.md','Quality gates'],['docs/audit-2026-07.md','Audit — July 2026'],['docs/contrast-report.md','Contrast report'],['docs/products.md','Products'],['docs/design-styles.md','Design styles'],['docs/figma.md','Figma']]]
];
const DOCS_VI=[
 ['Bắt đầu',[['README.md','README (EN)'],['SKILL.md','SKILL (EN)'],['llms.txt','llms.txt (EN)'],['CONTRIBUTING.md','Contributing (EN)']]],
 ['Hướng dẫn',[['docs/consuming.md','Tiêu thụ & nâng cấp'],['docs/deploy.md','Deploy (Vercel/VPS)'],['docs/ci-cd.md','CI/CD'],['docs/template-schema-v2.md','Template schema v2'],['docs/conventions.md','Conventions'],['docs/sync.md','Đồng bộ Git'],['docs/storybook.md','Storybook (host)'],['docs/live-hub.md','Live hub (Storybook)'],['docs/decisions-pending.md','Quyết định đang mở']]],
 ['Tham chiếu',[['docs/BACKLOG.md','Backlog'],['docs/quality-gates.md','Quality gates'],['docs/audit-2026-07.md','Audit — Th7 2026'],['docs/contrast-report.md','Báo cáo contrast'],['docs/products.md','Sản phẩm'],['docs/design-styles.md','Phong cách'],['docs/figma.md','Figma']]]
];
let lang=(localStorage.getItem('cs-docs-lang')==='vi')?'vi':'en';
function DOCS(){ return lang==='vi'?DOCS_VI:DOCS_EN; }
const ALL=DOCS_EN.flatMap(g=>g[1].map(d=>d[0]));
const nav=document.getElementById('navlinks');
function syncLangUi(){
  document.getElementById('lang-en').classList.toggle('on',lang==='en');
  document.getElementById('lang-vi').classList.toggle('on',lang==='vi');
  document.getElementById('langhint').textContent=lang==='vi'
    ? 'docs/*.md → docs/vi/ · README/SKILL/llms/CONTRIBUTING vẫn EN'
    : 'Operator docs under docs/ · entrance docs stay EN';
  document.getElementById('docsearch').placeholder=lang==='vi'?'Tìm mọi docs…':'Search all docs…';
  document.documentElement.lang=lang==='vi'?'vi':'en';
}
function renderNav(){ nav.innerHTML=''; for(const [g,items] of DOCS()){ const h=document.createElement('div'); h.className='grp'; h.textContent=g; nav.appendChild(h);
  for(const [p,label] of items){ const a=document.createElement('a'); a.href='#'+p; a.dataset.p=p; a.textContent=label; nav.appendChild(a); } } }
syncLangUi(); renderNav();
document.querySelector('.langtog').addEventListener('click',(e)=>{
  const b=e.target.closest('button[data-lang]'); if(!b) return;
  lang=b.dataset.lang; localStorage.setItem('cs-docs-lang',lang);
  syncLangUi(); renderNav(); markActive();
  docCache=null; // refetch under new language
  load(cur||'README.md');
});
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function labelsNow(){ const L={}; for(const [,items] of DOCS()) for(const [p,l] of items) L[p]=l; return L; }
/** Logical nav path (docs/foo.md) → fetch path (docs/vi/foo.md when VI). Entrance docs stay EN. */
function fetchPath(p){
  if(lang==='vi' && p.startsWith('docs/') && !p.startsWith('docs/vi/')) return 'docs/vi/'+p.slice(5);
  return p;
}
let docCache=null;
async function ensureCache(){ if(docCache) return docCache; docCache={}; await Promise.all(ALL.map(async p=>{ try{ docCache[p]=await fetchDoc(fetchPath(p)); }catch(e){ docCache[p]=''; } })); return docCache; }
function snippet(text,q){ const i=text.toLowerCase().indexOf(q.toLowerCase()); if(i<0) return ''; const s=Math.max(0,i-30), e=Math.min(text.length,i+q.length+50); return (s>0?'…':'')+esc(text.slice(s,e)).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>')+(e<text.length?'…':''); }
function highlightIn(q){ if(!q) return; const doc=document.getElementById('doc'); const walker=document.createTreeWalker(doc,NodeFilter.SHOW_TEXT); const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'); let node; while((node=walker.nextNode())){ if(re.test(node.nodeValue)){ const span=document.createElement('span'); const idx=node.nodeValue.search(re); const before=node.nodeValue.slice(0,idx), match=node.nodeValue.slice(idx,idx+q.length), after=node.nodeValue.slice(idx+q.length); span.innerHTML=esc(before)+'<mark>'+esc(match)+'</mark>'+esc(after); node.replaceWith(span); span.scrollIntoView({block:'center'}); break; } } }
async function runSearch(q){
  const cache=await ensureCache();
  const LABEL=labelsNow();
  const hits=ALL.filter(p=>cache[p] && cache[p].toLowerCase().includes(q.toLowerCase()));
  nav.innerHTML='';
  const res=document.createElement('div'); res.className='searchres'; res.textContent=hits.length+' match'+(hits.length===1?'':'es')+' for “'+q+'”'; nav.appendChild(res);
  for(const p of hits){ const a=document.createElement('a'); a.className='searchhit'; a.href='#'+p;
    a.innerHTML='<b>'+esc(LABEL[p]||p)+'</b><span class="snip">'+snippet(cache[p],q)+'</span>';
    a.addEventListener('click',()=>{ setTimeout(()=>highlightIn(q),200); });
    nav.appendChild(a); }
}
const searchBox=document.getElementById('docsearch');
let searchT=null;
searchBox.addEventListener('input',()=>{ clearTimeout(searchT); const q=searchBox.value.trim(); searchT=setTimeout(()=>{ if(q.length<2){ renderNav(); markActive(); } else { runSearch(q); } },150); });
function markActive(){ document.querySelectorAll('#navlinks a').forEach(a=>a.classList.toggle('on',a.dataset.p===cur)); }
function inline(s){ return esc(s)
  .replace(/`([^`]+)`/g,(m,c)=>'<code>'+c+'</code>')
  .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
  .replace(/(^|[\s(])\*([^*\n]+)\*/g,'$1<i>$2</i>')
  .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2">$1</a>'); }
function md(src){
  src=src.replace(/\r/g,''); const fences=[];
  src=src.replace(/```[\w-]*\n([\s\S]*?)```/g,(m,c)=>{ fences.push('<pre><code>'+esc(c)+'</code></pre>'); return '@@F'+(fences.length-1)+'@@'; });
  const lines=src.split('\n'); const out=[]; let i=0;
  const grab=(re)=>{ const acc=[]; while(i<lines.length&&re.test(lines[i])){ acc.push(lines[i]); i++; } return acc; };
  while(i<lines.length){ const L=lines[i];
    if(/^@@F\d+@@\s*$/.test(L)){ out.push(L.trim()); i++; continue; }
    const h=/^(#{1,6})\s+(.*)$/.exec(L); if(h){ out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>'); i++; continue; }
    if(/^\s*(-{3,}|\*{3,})\s*$/.test(L)){ out.push('<hr>'); i++; continue; }
    if(/^\|/.test(L)){ const rows=grab(/^\|/); const cells=r=>r.replace(/^\||\|$/g,'').split('|').map(c=>inline(c.trim()));
      let hd=null,body=rows; if(rows.length>1&&/^[\s|:\-]+$/.test(rows[1])){ hd=cells(rows[0]); body=rows.slice(2); }
      out.push('<table>'+(hd?'<thead><tr>'+hd.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead>':'')+'<tbody>'+body.map(r=>'<tr>'+cells(r).map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table>'); continue; }
    if(/^\s*[-*+]\s+/.test(L)){
      const li=[];
      while(i<lines.length){
        const t=lines[i];
        const m=/^\s*[-*+]\s+(.*)$/.exec(t);
        if(m){ li.push(m[1].trim()); i++; continue; }
        // Soft-wrapped list continuation (no marker, not a new block)
        if(li.length && t.trim() && !/^(#{1,6}\s|\||>\s?|```|\s*[-*+]\s|\s*\d+\.\s)/.test(t) && !/^\s*$/.test(t) && !/^@@F\d+@@/.test(t)){
          li[li.length-1]+=' '+t.trim(); i++; continue;
        }
        break;
      }
      out.push('<ul>'+li.map(x=>'<li>'+inline(x)+'</li>').join('')+'</ul>');
      continue;
    }
    if(/^\s*\d+\.\s+/.test(L)){
      const li=[];
      while(i<lines.length){
        const t=lines[i];
        const m=/^\s*\d+\.\s+(.*)$/.exec(t);
        if(m){ li.push(m[1].trim()); i++; continue; }
        if(li.length && t.trim() && !/^(#{1,6}\s|\||>\s?|```|\s*[-*+]\s|\s*\d+\.\s)/.test(t) && !/^\s*$/.test(t) && !/^@@F\d+@@/.test(t)){
          li[li.length-1]+=' '+t.trim(); i++; continue;
        }
        break;
      }
      out.push('<ol>'+li.map(x=>'<li>'+inline(x)+'</li>').join('')+'</ol>');
      continue;
    }
    if(/^>\s?/.test(L)){
      // Soft-wrapped blockquote lines are one paragraph (join with space). Blank `>` lines split paragraphs.
      const raw=grab(/^>\s?/).map(x=>x.replace(/^>\s?/,''));
      const paras=[]; let cur=[];
      for(const row of raw){
        if(!row.trim()){ if(cur.length){ paras.push(cur.join(' ')); cur=[]; } continue; }
        cur.push(row.trim());
      }
      if(cur.length) paras.push(cur.join(' '));
      out.push('<blockquote>'+paras.map(p=>'<p style="margin:0 0 8px">'+inline(p)+'</p>').join('')+'</blockquote>');
      continue;
    }
    if(/^\s*$/.test(L)){ i++; continue; }
    const p=grab(/^(?!\s*$)(?!#{1,6}\s)(?!\|)(?!\s*[-*+]\s)(?!\s*\d+\.\s)(?!>)(?!@@F\d+@@\s*$)(?!\s*(-{3,}|\*{3,})\s*$)/);
    // Soft-wrapped prose: join with a single space so mid-sentence hard wraps never render as breaks.
    out.push('<p>'+p.map(l=>l.trim()).filter(Boolean).map(inline).join(' ')+'</p>');
  }
  return out.join('\n').replace(/@@F(\d+)@@/g,(m,n)=>fences[+n]);
}
function resolve(href,cur){ if(href.startsWith('./')) href=href.slice(2); const base=cur.includes('/')?cur.slice(0,cur.lastIndexOf('/')+1):''; let p=base+href; for(let k=0;k<6&&/(^|\/)\.\.\//.test(p);k++){ p=p.replace(/(^|\/)[^\/]+\/\.\.\//,'$1'); } return p.replace(/^\.\//,'').replace(/^\/+/,''); }
let cur='';
function docUrls(p){
  // Prefer relative-to-viewer (../README.md when viewer is in docs/), then root-relative, then same-dir.
  const base = new URL('.', location.href);
  return [
    new URL('../'+p, base).href,
    new URL('/'+p, location.origin).href,
    new URL(p, base).href,
  ];
}
async function fetchDoc(p){
  let lastErr;
  for (const u of docUrls(p)){
    try{
      const r = await fetch(u, {cache:'no-cache'});
      if(!r.ok){ lastErr = new Error(r.status+' '+r.statusText+' @ '+u); continue; }
      const ct = (r.headers.get('content-type')||'').toLowerCase();
      const text = await r.text();
      if (ct.includes('text/html') && /<!DOCTYPE html|<html[\s>]/i.test(text.slice(0,200))) {
        lastErr = new Error('hosting intercepted '+u+' (got HTML, not markdown)');
        continue;
      }
      return text;
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('all fetch paths failed');
}
async function load(p){
  cur=p; document.title='CyberSkill · '+p+(lang==='vi' && p.startsWith('docs/')?' · VI':'');
  markActive();
  const doc=document.getElementById('doc'), err=document.getElementById('err');
  err.hidden=true;
  doc.innerHTML='<p style="color:var(--cs-color-text-muted)">Loading…</p>';
  try{ doc.innerHTML=md(await fetchDoc(fetchPath(p))); document.querySelector('main').scrollTop=0; }
  catch(e){ doc.innerHTML=''; err.hidden=false; err.textContent='Could not load '+fetchPath(p)+' — '+(e && e.message || e); }
}
document.getElementById('doc').addEventListener('click',(e)=>{
  const a=e.target.closest('a'); if(!a) return; const href=a.getAttribute('href')||'';
  if(/^(https?:|mailto:)/.test(href)){ a.target='_blank'; a.rel='noopener'; return; }
  if(href.startsWith('#')) return;
  e.preventDefault(); const p=resolve(href,cur);
  if(ALL.includes(p)) location.hash=p; else window.open('../'+p,'_blank','noopener');
});
function route(){ const p=decodeURIComponent((location.hash||'').slice(1)); load(ALL.includes(p)?p:'README.md'); }
window.addEventListener('hashchange',route); route();
</script>
</body></html>
