<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyberSkill static hello</title>
  <!-- From a consumer: point href at the design-system tree -->
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body data-cs-element="tho" style="margin:0;font-family:var(--cs-font-family-ui);background:var(--cs-color-surface-page);color:var(--cs-color-text-primary);padding:40px">
  <h1 style="font:var(--cs-text-h1);margin:0 0 12px">Hello, CyberSkill</h1>
  <p style="color:var(--cs-color-text-muted);max-width:40rem">Static consumption: link <code>styles.css</code>, set Theme / Element / Language on a container, compose with <code>.cs-*</code> classes.</p>
  <p style="margin:20px 0"><button class="cs-button">Make a wish</button>
  <button class="cs-button cs-button--secondary">Secondary</button></p>
  <p lang="vi" style="color:var(--cs-color-text-muted)">Tiếng Việt: Hiện Thực Hoá Ý Chí.</p>
</body>
</html>
