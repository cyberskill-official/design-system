<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>CyberSkill Token Sync Prototype</title>
<style>
  body {
    color: #1f130b;
    font: 13px/1.5 Inter, system-ui, sans-serif;
    margin: 0;
    padding: 16px;
  }
  textarea {
    border: 1px solid #7a6658;
    border-radius: 8px;
    box-sizing: border-box;
    font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
    min-height: 280px;
    width: 100%;
  }
  button {
    background: #45210e;
    border: 0;
    border-radius: 8px;
    color: #fffaf0;
    font: inherit;
    font-weight: 700;
    margin-top: 12px;
    min-height: 40px;
    padding: 8px 12px;
  }
  output {
    display: block;
    margin-top: 12px;
    white-space: pre-wrap;
  }
</style>
<h1>CyberSkill Token Sync Prototype</h1>
<p>Paste generated Figma Variables JSON or source tokens. This prototype previews variables only; it does not yet write Figma Variables.</p>
<textarea id="tokens" aria-label="Token JSON"></textarea>
<button id="preview" type="button">Preview tokens</button>
<output id="result"></output>
<script>
  const textarea = document.getElementById("tokens");
  const result = document.getElementById("result");
  document.getElementById("preview").addEventListener("click", () => {
    parent.postMessage({ pluginMessage: { type: "preview-tokens", tokens: textarea.value } }, "*");
  });
  window.onmessage = (event) => {
    const message = event.data.pluginMessage;
    if (!message) return;
    if (message.type === "token-preview") {
      result.textContent = `${message.count} tokens parsed\n\n${message.rows.map((row) => `${row.name} (${row.type}) = ${row.value}`).join("\n")}`;
    }
    if (message.type === "token-error") {
      result.textContent = `Error: ${message.message}`;
    }
  };
</script>
